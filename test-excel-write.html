<!DOCTYPE html>
<html>
<head>
    <title>Test Excel Write</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #0f0f0f; color: white; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 10px; margin: 10px 0; border: 1px solid #333; }
        button { background: #d4af37; color: black; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
        input { padding: 10px; width: 300px; background: #333; border: 1px solid #444; color: white; border-radius: 5px; margin: 5px 0; }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        pre { background: #333; padding: 10px; border-radius: 5px; overflow: auto; }
    </style>
    <script src="js/config.js"></script>
</head>
<body>
    <h1>📊 Excel Write Test</h1>
    
    <div class="card">
        <h3>Step 1: Check API Connection</h3>
        <button onclick="testConnection()">Test Connection</button>
        <div id="connectionResult"></div>
    </div>
    
    <div class="card">
        <h3>Step 2: Write Test Order to Excel</h3>
        <button onclick="writeTestOrder()">Write Test Order to Excel</button>
        <div id="writeResult"></div>
    </div>
    
    <div class="card">
        <h3>Step 3: Read Orders from Excel</h3>
        <button onclick="readOrders()">Read Orders from Excel</button>
        <div id="readResult"></div>
    </div>
    
    <div class="card">
        <h3>Step 4: Manual Order Entry</h3>
        <input type="text" id="manualOrderId" placeholder="Enter Order ID to track">
        <button onclick="manualTrack()">Track Order</button>
        <div id="trackResult"></div>
    </div>

    <script>
        async function testConnection() {
            const result = document.getElementById('connectionResult');
            result.innerHTML = 'Testing...';
            
            try {
                const response = await fetch(`${CONFIG.API_URL}?action=test&t=${Date.now()}`);
                const text = await response.text();
                
                try {
                    const data = JSON.parse(text);
                    result.innerHTML = `<p class="success">✅ Connection successful!</p><pre>${JSON.stringify(data, null, 2)}</pre>`;
                } catch(e) {
                    result.innerHTML = `<p class="error">❌ Invalid JSON response:</p><pre>${text.substring(0, 500)}</pre>`;
                }
            } catch(error) {
                result.innerHTML = `<p class="error">❌ Connection failed: ${error.message}</p>`;
            }
        }
        
        async function writeTestOrder() {
            const result = document.getElementById('writeResult');
            result.innerHTML = 'Writing to Excel...';
            
            const testOrder = {
                action: 'placeOrder',
                name: 'Test Customer',
                phone: '9876543210',
                email: 'test@example.com',
                address: '123 Test Street, Test City - 123456',
                items: JSON.stringify([{
                    sku: 'TEST001',
                    name: 'Test Product',
                    price: 999,
                    quantity: 1
                }]),
                subtotal: 999,
                tax: 180,
                shipping: 100,
                total: 1279,
                status: 'Pending',
                date: new Date().toISOString()
            };
            
            try {
                const params = new URLSearchParams(testOrder);
                const url = `${CONFIG.API_URL}?${params}&t=${Date.now()}`;
                console.log('Sending to:', url);
                
                const response = await fetch(url);
                const text = await response.text();
                console.log('Raw response:', text);
                
                try {
                    const data = JSON.parse(text);
                    if (data.success) {
                        result.innerHTML = `
                            <p class="success">✅ Order written to Excel successfully!</p>
                            <p>Order ID: <strong>${data.orderId}</strong></p>
                            <p>Check your Excel sheet - a new order should appear in the "Orders" tab.</p>
                        `;
                    } else {
                        result.innerHTML = `<p class="error">❌ Failed: ${data.error || 'Unknown error'}</p><pre>${text}</pre>`;
                    }
                } catch(e) {
                    result.innerHTML = `<p class="error">❌ Invalid response:</p><pre>${text}</pre>`;
                }
            } catch(error) {
                result.innerHTML = `<p class="error">❌ Error: ${error.message}</p>`;
            }
        }
        
        async function readOrders() {
            const result = document.getElementById('readResult');
            result.innerHTML = 'Reading orders from Excel...';
            
            try {
                const response = await fetch(`${CONFIG.API_URL}?action=orders&t=${Date.now()}`);
                const text = await response.text();
                
                try {
                    const data = JSON.parse(text);
                    if (Array.isArray(data)) {
                        result.innerHTML = `
                            <p class="success">✅ Found ${data.length} orders in Excel</p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        `;
                    } else {
                        result.innerHTML = `<p class="error">❌ Invalid data:</p><pre>${text}</pre>`;
                    }
                } catch(e) {
                    result.innerHTML = `<p class="error">❌ Invalid JSON:</p><pre>${text.substring(0, 500)}</pre>`;
                }
            } catch(error) {
                result.innerHTML = `<p class="error">❌ Error: ${error.message}</p>`;
            }
        }
        
        async function manualTrack() {
            const orderId = document.getElementById('manualOrderId').value.trim();
            if (!orderId) {
                alert('Please enter an Order ID');
                return;
            }
            
            const result = document.getElementById('trackResult');
            result.innerHTML = 'Tracking...';
            
            try {
                const response = await fetch(`${CONFIG.API_URL}?action=track&id=${orderId}&t=${Date.now()}`);
                const text = await response.text();
                
                try {
                    const data = JSON.parse(text);
                    if (data.error) {
                        result.innerHTML = `<p class="error">❌ ${data.error}</p>`;
                    } else {
                        result.innerHTML = `<p class="success">✅ Order found!</p><pre>${JSON.stringify(data, null, 2)}</pre>`;
                    }
                } catch(e) {
                    result.innerHTML = `<p class="error">❌ Invalid response:</p><pre>${text.substring(0, 500)}</pre>`;
                }
            } catch(error) {
                result.innerHTML = `<p class="error">❌ Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
