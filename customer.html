<!DOCTYPE html>
<html>

<head>

<title>Style Of Life Jewelry</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h1>Luxury Jewelry</h1>

<div id="products"></div>

<script src="js/api.js"></script>

<script>

getProducts().then(data=>{

let html="";

data.forEach(p=>{

html+=`

<div class="product">

<img src="${p.image}">

<h3>${p.name}</h3>

<p>₹${p.price}</p>

<button>Add To Cart</button>

</div>

`;

});

document.getElementById("products").innerHTML=html;

});

</script>

</body>
</html>
