<!DOCTYPE html>
<html>
<head>
    <title>Style Of Life - Customer</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; background: #eee; }
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .product { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .product img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
        .price { color: #C5A028; font-size: 1.3rem; font-weight: bold; }
        button { padding: 10px 20px; background: #C5A028; color: white; border: none; border-radius: 5px; cursor: pointer; }
        pre { background: #333; color: #0f0; padding: 10px; border-radius: 5px; overflow: auto; }
    </style>
</head>
<body>
    <h1>Style Of Life - Customer Portal</h1>
    
    <div class="status" id="status">Loading products...</div>
    <button onclick="loadProducts()">Refresh Products</button>
    
    <h3>Products:</h3>
    <div class="products" id="products">Loading...</div>
    
    <h3>Debug Info:</h3>
    <pre id="debug">Waiting for response...</pre>

    <script>
        // YOUR CORRECT URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz6_of-vLu6MN4QDTH2EDJWCLfDjT7kls04iyo7XvF6kn3sVyo2SXN2zdQfhT-xCbIJaA/exec';
        
        function jsonpCall(action, data, callback) {
            const callbackName = 'callback_' + Date.now();
            window[callbackName] = function(response) {
                delete window[callbackName];
                document.body.removeChild(document.getElementById('jsonpScript'));
                callback(response);
            };
            
            const script = document.createElement('script');
            script.id = 'jsonpScript';
            const url = SCRIPT_URL + '?action=' + action + '&data=' + encodeURIComponent(JSON.stringify(data)) + '&callback=' + callbackName;
            script.src = url;
            
            script.onerror = function() {
                document.getElementById('debug').innerHTML = 'Connection error - Check URL';
                delete window[callbackName];
                document.body.removeChild(script);
                callback(null);
            };
            
            document.body.appendChild(script);
        }
        
        function loadProducts() {
            document.getElementById('status').innerHTML = 'Loading...';
            document.getElementById('debug').innerHTML = 'Fetching products...';
            
            jsonpCall('getProducts', {}, function(products) {
                document.getElementById('debug').innerHTML = JSON.stringify(products, null, 2);
                
                if (!products || products.length === 0) {
                    document.getElementById('products').innerHTML = '<p>No products yet. Run setup in admin panel first.</p>';
                    document.getElementById('status').innerHTML = 'No products found';
                    return;
                }
                
                let html = '';
                products.forEach(p => {
                    html += `
                        <div class="product">
                            <h3>${p.name}</h3>
                            <p class="price">₹${p.price}</p>
                            <p>Stock: ${p.stock}</p>
                            <p>ID: ${p.id}</p>
                        </div>
                    `;
                });
                
                document.getElementById('products').innerHTML = html;
                document.getElementById('status').innerHTML = `✅ Loaded ${products.length} products`;
            });
        }
        
        // Load products when page opens
        loadProducts();
    </script>
</body>
</html>
