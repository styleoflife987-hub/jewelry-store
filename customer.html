<!DOCTYPE html>
<html>
<head>
    <title>Style Of Life - Admin</title>
</head>
<body>
    <h1>Simple Admin Test</h1>
    <div id="status">Testing connection...</div>
    <button onclick="testConnection()">Test Connection</button>
    <button onclick="runSetup()">Run Setup</button>
    <pre id="result"></pre>

    <script>
        // REPLACE WITH YOUR CORRECT URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz6_of-vLu6MN4QDTH2EDJWCLfDjT7kls04iyo7XvF6kn3sVyo2SXN2zdQfhT-xCbIJaA/exec';
        
        async function testConnection() {
            document.getElementById('status').innerHTML = 'Testing...';
            document.getElementById('result').innerHTML = '';
            
            try {
                const response = await fetch(SCRIPT_URL + '?action=getDashboardStats', {
                    method: 'GET',
                    mode: 'cors'
                });
                
                const text = await response.text();
                document.getElementById('result').innerHTML = text;
                document.getElementById('status').innerHTML = '✅ Response received! Check below.';
            } catch (error) {
                document.getElementById('status').innerHTML = '❌ Error: ' + error.message;
                document.getElementById('result').innerHTML = error.toString();
            }
        }
        
        async function runSetup() {
            document.getElementById('status').innerHTML = 'Running setup...';
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'setup'})
                });
                
                const text = await response.text();
                document.getElementById('result').innerHTML = text;
                document.getElementById('status').innerHTML = '✅ Setup complete!';
            } catch (error) {
                document.getElementById('status').innerHTML = '❌ Error: ' + error.message;
                document.getElementById('result').innerHTML = error.toString();
            }
        }
    </script>
</body>
</html>
