<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin">
    <header class="admin-header">
        <div class="admin-logo">
            STYLE OF LIFE <span>ADMIN</span>
        </div>
        <nav class="admin-nav">
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html">Products</a>
            <a href="admin-orders.html" class="active">Orders</a>
            <a href="admin-design.html">Design</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="admin-container">
        <h1 style="color: var(--primary); margin-bottom: 30px;">Order Management</h1>
        
        <div class="admin-table-container">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="ordersList"></tbody>
            </table>
        </div>
    </div>

    <script>
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }

        document.addEventListener('DOMContentLoaded', function() {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const tbody = document.getElementById('ordersList');
            
            let html = '';
            orders.forEach(order => {
                const items = order.items.map(i => `${i.name} x${i.quantity}`).join('<br>');
                html += `
                    <tr>
                        <td><strong>${order.orderId}</strong></td>
                        <td>${order.name}<br><small>${order.phone}</small></td>
                        <td><small>${items}</small></td>
                        <td>₹${order.total}</td>
                        <td><span class="admin-badge admin-badge-${order.status.toLowerCase()}">${order.status}</span></td>
                        <td>${new Date(order.date).toLocaleDateString()}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html || '<tr><td colspan="6" style="text-align: center;">No orders found</td></tr>';
        });

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
