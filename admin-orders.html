<!DOCTYPE html>
<html>
<body>

<h2>Orders</h2>
<div id="orders"></div>

<script>
const orders = JSON.parse(localStorage.getItem('orders') || '[]');

let html = '';

orders.forEach(o => {
    html += `<p>${o.orderId} - ${o.name} - ₹${o.total}</p>`;
});

document.getElementById('orders').innerHTML = html;
</script>

</body>
</html>
