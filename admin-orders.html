<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
</head>
<body>
    <header>
        <div class="logo">✨ STYLE OF LIFE - ORDERS</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html">Products</a>
            <a href="admin-orders.html" class="active">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="admin-container">
        <h1 class="page-title">Order Management</h1>
        
        <div class="orders-table-container">
            <h2>All Orders</h2>
            <div id="ordersList" class="orders-list">
                <p>Loading orders...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Style Of Life Jewelry - Order Management</p>
    </footer>

    <script>
        // Check authentication
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }
        
        document.addEventListener('DOMContentLoaded', loadOrders);
        
        function loadOrders() {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            displayOrders(orders);
        }
        
        function displayOrders(orders) {
            const container = document.getElementById('ordersList');
            
            if (orders.length === 0) {
                container.innerHTML = '<p>No orders found</p>';
                return;
            }
            
            let html = `
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            orders.forEach(order => {
                const itemsList = order.items ? order.items.map(item => 
                    `${item.name} x${item.quantity}`
                ).join('<br>') : 'No items';
                
                html += `
                    <tr>
                        <td><strong>${order.orderId}</strong></td>
                        <td>
                            ${order.name}<br>
                            <small>${order.phone}</small>
                        </td>
                        <td><small>${itemsList}</small></td>
                        <td>₹${(order.total || 0).toLocaleString('en-IN')}</td>
                        <td>
                            <select onchange="updateOrderStatus('${order.orderId}', this.value)" class="status-select">
                                <option value="Pending" ${order.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option value="Processing" ${order.status === 'Processing' ? 'selected' : ''}>Processing</option>
                                <option value="Shipped" ${order.status === 'Shipped' ? 'selected' : ''}>Shipped</option>
                                <option value="Delivered" ${order.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                                <option value="Cancelled" ${order.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                            </select>
                        </td>
                        <td>${new Date(order.date).toLocaleDateString()}</td>
                        <td>
                            <button onclick="deleteOrder('${order.orderId}')" class="delete-btn">🗑️</button>
                        </td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        function updateOrderStatus(orderId, status) {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const orderIndex = orders.findIndex(o => o.orderId === orderId);
            
            if (orderIndex >= 0) {
                orders[orderIndex].status = status;
                localStorage.setItem('orders', JSON.stringify(orders));
                alert(`✅ Order ${orderId} updated to ${status}`);
                loadOrders();
            }
        }
        
        function deleteOrder(orderId) {
            if (!confirm('Delete this order?')) return;
            
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const updatedOrders = orders.filter(o => o.orderId !== orderId);
            localStorage.setItem('orders', JSON.stringify(updatedOrders));
            
            alert('✅ Order deleted');
            loadOrders();
        }
        
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
