<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .status-select { padding: 5px 10px; border-radius: 20px; border: none; font-weight: 500; cursor: pointer; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-processing { background: #d1ecf1; color: #0c5460; }
        .status-shipped { background: #d4edda; color: #155724; }
        .status-delivered { background: #c3e6cb; color: #155724; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body class="admin">
    <header class="admin-header">
        <div class="admin-logo">STYLE OF LIFE <span>ADMIN</span></div>
        <nav class="admin-nav">
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html">Products</a>
            <a href="admin-orders.html" class="active">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="admin-container">
        <div class="sync-status" style="background:#e8f5e9; margin-bottom:20px;">
            <span>🟢 Orders synced with cloud</span>
            <button class="admin-btn admin-btn-primary" onclick="refreshOrders()">Refresh</button>
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1 style="color: var(--primary);">Order Management</h1>
            <div style="display: flex; gap: 15px;">
                <div class="admin-stat-card" style="padding: 10px 20px;"><div class="admin-stat-info"><h3>Total</h3><div class="stat-number" id="totalOrders">0</div></div></div>
                <div class="admin-stat-card" style="padding: 10px 20px;"><div class="admin-stat-info"><h3>Revenue</h3><div class="stat-number" id="totalRevenue">₹0</div></div></div>
                <div class="admin-stat-card" style="padding: 10px 20px;"><div class="admin-stat-info"><h3>Pending</h3><div class="stat-number" id="pendingOrders">0</div></div></div>
            </div>
        </div>
        
        <div class="admin-table-container">
            <table class="admin-table">
                <thead><tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
                <tbody id="ordersList"></tbody>
            </table>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        if (!sessionStorage.getItem('adminLoggedIn')) window.location.href = 'login.html';
        
        document.addEventListener('DOMContentLoaded', loadOrders);
        setInterval(loadOrders, 30000);
        
        async function loadOrders() {
            const orders = await getOrders();
            displayOrders(orders);
            const total = orders.reduce((s,o)=>s+(o.total||0),0);
            document.getElementById('totalOrders').textContent = orders.length;
            document.getElementById('totalRevenue').textContent = `₹${total.toLocaleString()}`;
            document.getElementById('pendingOrders').textContent = orders.filter(o=>o.status==='Pending').length;
        }
        
        function displayOrders(orders) {
            const tbody = document.getElementById('ordersList');
            if (!orders || orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">No orders found</td></tr>';
                return;
            }
            
            let html = '';
            orders.forEach(order => {
                const itemsList = order.items.map(i => `${i.name} x${i.quantity}`).join('<br>');
                html += `
                    <tr>
                        <td><strong>${order.orderId}</strong></td>
                        <td>${order.name}<br><small>${order.phone}</small></td>
                        <td><small>${itemsList}</small></td>
                        <td>₹${order.total.toLocaleString()}</td>
                        <td>
                            <select class="status-select status-${order.status.toLowerCase()}" onchange="updateStatus('${order.orderId}', this.value)">
                                <option value="Pending" ${order.status==='Pending'?'selected':''}>Pending</option>
                                <option value="Processing" ${order.status==='Processing'?'selected':''}>Processing</option>
                                <option value="Shipped" ${order.status==='Shipped'?'selected':''}>Shipped</option>
                                <option value="Delivered" ${order.status==='Delivered'?'selected':''}>Delivered</option>
                                <option value="Cancelled" ${order.status==='Cancelled'?'selected':''}>Cancelled</option>
                            </select>
                        </td>
                        <td>${new Date(order.date).toLocaleDateString()}</td>
                        <td><button class="admin-btn admin-btn-danger" onclick="deleteOrder('${order.orderId}')">Delete</button></td>
                    </tr>`;
            });
            tbody.innerHTML = html;
        }
        
        async function updateStatus(orderId, status) {
            const result = await updateOrderStatus(orderId, status);
            if (result.success) {
                showNotification(`✅ Order ${orderId} updated to ${status}`, 'success');
                await loadOrders();
            } else {
                showNotification(`❌ Failed to update: ${result.error}`, 'error');
            }
        }
        
        async function deleteOrder(orderId) {
            if (!confirm('Delete this order?')) return;
            const result = await deleteOrder(orderId);
            if (result.success) {
                showNotification(`✅ Order ${orderId} deleted`, 'success');
                await loadOrders();
            } else {
                showNotification(`❌ Failed to delete: ${result.error}`, 'error');
            }
        }
        
        async function refreshOrders() { await loadOrders(); showNotification('Orders refreshed', 'success'); }
        function logout() { sessionStorage.removeItem('adminLoggedIn'); window.location.href = 'login.html'; }
    </script>
</body>
</html>
