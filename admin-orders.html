<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
    <script src="js/live-sync.js"></script>
</head>
<body>
    <header>
        <div class="logo">✨ STYLE OF LIFE - ORDERS</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html">Products</a>
            <a href="admin-orders.html" class="active">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="admin-container">
        <h1 class="page-title">Order Management</h1>
        
        <div class="sync-status" style="background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px;">
            <span class="status-indicator" style="color: #4CAF50;">🟢</span>
            <span>Live sync with Excel - Delete an order and it disappears instantly</span>
            <button onclick="forceSync()" style="width: auto; padding: 8px 20px; margin-left: auto;">🔄 Sync Now</button>
        </div>
        
        <div class="stats-summary" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;">
            <div style="background: #1a1a1a; padding: 20px; border-radius: 10px; text-align: center;">
                <h3 style="color: #d4af37;">Total Orders</h3>
                <p style="font-size: 24px;" id="totalOrdersCount">0</p>
            </div>
            <div style="background: #1a1a1a; padding: 20px; border-radius: 10px; text-align: center;">
                <h3 style="color: #d4af37;">Total Revenue</h3>
                <p style="font-size: 24px;" id="totalRevenueAmount">₹0</p>
            </div>
            <div style="background: #1a1a1a; padding: 20px; border-radius: 10px; text-align: center;">
                <h3 style="color: #d4af37;">Pending Orders</h3>
                <p style="font-size: 24px;" id="pendingOrdersCount">0</p>
            </div>
        </div>
        
        <div class="orders-table-container">
            <h2>All Orders from Excel</h2>
            <div id="ordersList" class="orders-list">
                <p>Loading orders...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Style Of Life Jewelry - Live Sync Active</p>
    </footer>

    <script>
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            loadOrders();
            
            window.addEventListener('syncComplete', function() {
                loadOrders();
            });
        });
        
        async function loadOrders() {
            try {
                const response = await fetch(`${CONFIG.API_URL}?action=orders&t=${Date.now()}`);
                const orders = await response.json();
                displayOrders(orders);
                updateStats(orders);
                localStorage.setItem('orders', JSON.stringify(orders));
            } catch (error) {
                const localOrders = JSON.parse(localStorage.getItem('orders') || '[]');
                displayOrders(localOrders);
                updateStats(localOrders);
            }
        }
        
        function updateStats(orders) {
            const totalOrders = orders.length;
            const totalRevenue = orders.reduce((sum, order) => sum + (order.total || 0), 0);
            const pendingOrders = orders.filter(o => o.status === 'Pending').length;
            
            document.getElementById('totalOrdersCount').textContent = totalOrders;
            document.getElementById('totalRevenueAmount').textContent = `₹${totalRevenue.toLocaleString('en-IN')}`;
            document.getElementById('pendingOrdersCount').textContent = pendingOrders;
        }
        
        function displayOrders(orders) {
            const container = document.getElementById('ordersList');
            
            if (!orders || orders.length === 0) {
                container.innerHTML = '<p>No orders found in Excel</p>';
                return;
            }
            
            let html = `<table class="orders-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>`;
            
            orders.forEach(order => {
                const itemsList = order.items ? order.items.map(item => 
                    `${item.name} x${item.quantity}`
                ).join('<br>') : 'No items';
                
                const statusColor = order.status === 'Pending' ? '#ff9800' : 
                                   order.status === 'Processing' ? '#2196f3' :
                                   order.status === 'Shipped' ? '#9c27b0' :
                                   order.status === 'Delivered' ? '#4CAF50' : '#f44336';
                
                html += `
                    <tr>
                        <td><strong>${order.orderId}</strong></td>
                        <td>${order.name}<br><small>${order.phone}</small></td>
                        <td><small>${itemsList}</small></td>
                        <td><strong>₹${(order.total || 0).toLocaleString('en-IN')}</strong></td>
                        <td>
                            <select onchange="updateOrderStatus('${order.orderId}', this.value)" 
                                    style="background: ${statusColor}; color: black; padding: 5px; border-radius: 4px; border: none;">
                                <option value="Pending" ${order.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option value="Processing" ${order.status === 'Processing' ? 'selected' : ''}>Processing</option>
                                <option value="Shipped" ${order.status === 'Shipped' ? 'selected' : ''}>Shipped</option>
                                <option value="Delivered" ${order.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                                <option value="Cancelled" ${order.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                            </select>
                        </td>
                        <td>${new Date(order.date).toLocaleDateString()}</td>
                        <td>
                            <button onclick="deleteOrder('${order.orderId}')" class="delete-btn">🗑️ Delete</button>
                        </td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        async function updateOrderStatus(orderId, status) {
            try {
                const result = await updateOrderStatusInExcel(orderId, status);
                
                if (result.success) {
                    alert(`✅ Order ${orderId} updated to ${status} in Excel`);
                    await forceSync();
                    loadOrders();
                } else {
                    alert('Error updating order');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function deleteOrder(orderId) {
            if (!confirm('Delete this order from Excel? This will remove it for all users.')) return;
            
            try {
                const result = await deleteOrderFromExcel(orderId);
                
                if (result.success) {
                    alert('✅ Order deleted from Excel');
                    await forceSync();
                    loadOrders();
                } else {
                    alert('Error: ' + (result.error || 'Unknown error'));
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
