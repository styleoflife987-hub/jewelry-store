<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">✨ STYLE OF LIFE</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="cart.html" class="active">Cart <span class="cart-count" id="cartCount">0</span></a>
            <a href="track.html">Track Order</a>
        </nav>
    </header>

    <div class="container">
        <h1 class="page-title">Shopping Cart</h1>
        
        <div id="cartItems" class="cart-container"></div>
        
        <div class="cart-summary">
            <div class="summary-row">
                <span>Subtotal:</span>
                <span>₹<span id="cartSubtotal">0</span></span>
            </div>
            <div class="summary-row">
                <span>Shipping:</span>
                <span>₹100</span>
            </div>
            <div class="summary-row">
                <span>GST (18%):</span>
                <span>₹<span id="cartTax">0</span></span>
            </div>
            <div class="summary-row total">
                <span>Total:</span>
                <span>₹<span id="cartTotal">0</span></span>
            </div>
            
            <a href="checkout.html" id="checkoutBtn" class="checkout-btn">Proceed to Checkout</a>
            <button onclick="clearCart()" class="clear-cart-btn">Clear Cart</button>
        </div>
    </div>

    <footer>
        <p>© 2026 Style Of Life Jewelry</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
