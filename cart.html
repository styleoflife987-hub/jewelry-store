<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="customer">
    <header class="customer-header">
        <div class="customer-logo">STYLE OF LIFE</div>
        <nav class="customer-nav">
            <a href="index.html">Home</a>
            <a href="cart.html" class="active">Cart <span class="cart-count" id="cartCount">0</span></a>
            <a href="track.html">Track Order</a>
        </nav>
    </header>

    <div class="cart-container">
        <h1 style="color: var(--primary); margin-bottom: 30px;">Shopping Cart</h1>
        
        <div id="cartItems"></div>
        
        <div class="cart-summary">
            <div class="summary-row">
                <span>Subtotal:</span>
                <span>₹<span id="cartSubtotal">0</span></span>
            </div>
            <div class="summary-row">
                <span>Shipping:</span>
                <span>₹100</span>
            </div>
            <div class="summary-row">
                <span>GST (18%):</span>
                <span>₹<span id="cartTax">0</span></span>
            </div>
            <div class="summary-row total">
                <span>Total:</span>
                <span>₹<span id="cartTotal">0</span></span>
            </div>
            
            <a href="checkout.html" class="checkout-btn">Proceed to Checkout</a>
            <button onclick="clearCart()" class="customer-btn" style="background: var(--danger);">Clear Cart</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
