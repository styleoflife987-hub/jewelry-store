<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
</head>
<body>

<h2>Cart</h2>
<div id="cart"></div>

<a href="checkout.html">Checkout</a>

<script src="js/cart.js"></script>

<script>
function showCart() {
    const c = getCart();
    let html = '';

    c.forEach(i => {
        html += `<p>${i.name} x${i.quantity}</p>`;
    });

    document.getElementById('cart').innerHTML = html;
}

showCart();
</script>
</body>
</html>
