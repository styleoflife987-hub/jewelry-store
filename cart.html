<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="customer">
    <header class="customer-header">
        <div class="customer-logo">STYLE OF LIFE</div>
        <nav class="customer-nav">
            <a href="index.html">Home</a>
            <a href="cart.html" class="active">Cart <span class="cart-count" id="cartCount">0</span></a>
            <a href="track.html">Track Order</a>
        </nav>
    </header>

    <div class="cart-container">
        <h1 style="color: var(--primary); margin-bottom: 30px;">Shopping Cart</h1>
        <div id="cartItems"></div>
        <div class="cart-summary">
            <div class="summary-row"><span>Subtotal:</span><span>₹<span id="cartSubtotal">0</span></span></div>
            <div class="summary-row"><span>Shipping:</span><span>₹100</span></div>
            <div class="summary-row"><span>GST (18%):</span><span>₹<span id="cartTax">0</span></span></div>
            <div class="summary-row total"><span>Total:</span><span>₹<span id="cartTotal">0</span></span></div>
            <a href="checkout.html" class="checkout-btn">Proceed to Checkout</a>
            <button onclick="clearCart()" class="customer-btn" style="background: var(--danger);">Clear Cart</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        let cart = [];
        
        document.addEventListener('DOMContentLoaded', async function() {
            await loadCart();
            displayCart();
        });
        
        async function loadCart() {
            const cartData = await getCart();
            cart = cartData.items || [];
            updateCartCount();
        }
        
        async function saveCartToCloud() {
            const total = cart.reduce((sum, i) => sum + (i.price * (i.quantity || 1)), 0);
            await saveCart(cart, total);
        }
        
        async function updateQuantity(sku, newQuantity) {
            const index = cart.findIndex(item => item.sku === sku);
            if (index === -1) return;
            newQuantity = parseInt(newQuantity);
            if (isNaN(newQuantity) || newQuantity < 1) {
                cart.splice(index, 1);
            } else {
                if (newQuantity > 10) newQuantity = 10;
                cart[index].quantity = newQuantity;
            }
            await saveCartToCloud();
            displayCart();
        }
        
        async function removeFromCart(sku) {
            cart = cart.filter(item => item.sku !== sku);
            await saveCartToCloud();
            displayCart();
        }
        
        async function clearCart() {
            if (cart.length === 0) return alert('Cart is empty');
            if (confirm('Clear cart?')) {
                cart = [];
                await saveCartToCloud();
                displayCart();
            }
        }
        
        function updateCartCount() {
            const count = cart.reduce((total, item) => total + (item.quantity || 1), 0);
            document.querySelectorAll('.cart-count, #cartCount').forEach(el => {
                if (el) {
                    el.textContent = count;
                    el.style.display = count > 0 ? 'inline-block' : 'none';
                }
            });
        }
        
        function displayCart() {
            const container = document.getElementById('cartItems');
            const subtotalEl = document.getElementById('cartSubtotal');
            const taxEl = document.getElementById('cartTax');
            const totalEl = document.getElementById('cartTotal');
            
            if (!container) return;
            
            if (cart.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 60px;">Your cart is empty</div>';
                if (subtotalEl) subtotalEl.textContent = '0';
                if (taxEl) taxEl.textContent = '0';
                if (totalEl) totalEl.textContent = '0';
                return;
            }
            
            let html = '', subtotal = 0;
            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;
                html += `
                    <div class="cart-item">
                        ${item.image ? `<img src="${item.image}" alt="${item.name}">` : '<div style="width:100px; height:100px; background:#f8f9fa;"></div>'}
                        <div><h4>${item.name}</h4><p style="color:#6c757d;">SKU: ${item.sku}</p></div>
                        <div style="color:var(--primary); font-weight:600;">₹${item.price.toLocaleString()}</div>
                        <div><input type="number" value="${item.quantity}" min="1" max="10" onchange="updateQuantity('${item.sku}', this.value)" style="width:60px; padding:5px; border:1px solid #dee2e6; border-radius:4px;"></div>
                        <div style="font-weight:600;">₹${itemTotal.toLocaleString()}</div>
                        <button onclick="removeFromCart('${item.sku}')" style="background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
                    </div>`;
            });
            container.innerHTML = html;
            
            const tax = Math.round(subtotal * 0.18);
            const total = subtotal + tax + 100;
            if (subtotalEl) subtotalEl.textContent = subtotal.toLocaleString();
            if (taxEl) taxEl.textContent = tax.toLocaleString();
            if (totalEl) totalEl.textContent = total.toLocaleString();
        }
        
        window.displayCart = displayCart;
        window.updateCartCount = updateCartCount;
        window.clearCart = clearCart;
        window.removeFromCart = removeFromCart;
        window.updateQuantity = updateQuantity;
    </script>
</body>
</html>
