<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Settings - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin">
    <header class="admin-header">
        <div class="admin-logo">
            STYLE OF LIFE <span>ADMIN</span>
        </div>
        <nav class="admin-nav">
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html">Products</a>
            <a href="admin-orders.html">Orders</a>
            <a href="admin-design.html" class="active">Design</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="admin-container">
        <h1 style="color: var(--primary); margin-bottom: 30px;">Website Design Settings</h1>
        
        <div class="admin-card">
            <h2 style="color: var(--primary); margin-bottom: 20px;">Site Settings</h2>
            
            <div style="max-width: 500px;">
                <div class="form-group">
                    <label>Site Name</label>
                    <input type="text" id="siteName" class="admin-input" value="Style Of Life Jewelry">
                </div>
                
                <div class="form-group">
                    <label>Primary Color (Gold)</label>
                    <input type="color" id="primaryColor" class="admin-input" value="#d4af37" style="height: 50px;">
                </div>
            </div>
            
            <button class="admin-btn admin-btn-primary" onclick="saveSettings()" style="margin-top: 20px;">Save Settings</button>
        </div>
    </div>

    <script>
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }

        function saveSettings() {
            alert('Settings saved! (Demo version)');
        }

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
