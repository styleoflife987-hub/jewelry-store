<!-- Make sure your Excel Products sheet has data like this: -->
<!-- 
id | sku | name | category | price | stock | description
1  | SKU001 | Gold Necklace | Necklaces | 25000 | 10 | 22k Gold Necklace
2  | SKU002 | Diamond Ring | Rings | 45000 | 5 | Diamond Ring
-->

<!-- The add product function in admin-products.html should work: -->
<script>
async function addProduct() {
    const sku = document.getElementById('sku').value.trim() || `SKU${Date.now()}`;
    const name = document.getElementById('name').value.trim();
    const category = document.getElementById('category').value;
    const price = document.getElementById('price').value;
    const stock = document.getElementById('stock').value || 10;
    const description = document.getElementById('description').value.trim() || '';
    
    if (!name || !price) {
        alert('Please fill required fields');
        return;
    }
    
    const btn = document.getElementById('addProductBtn');
    btn.disabled = true;
    btn.textContent = 'Adding...';
    
    try {
        const params = new URLSearchParams({
            action: 'addProduct',
            sku: sku,
            name: name,
            category: category,
            price: price,
            stock: stock,
            description: description
        });
        
        const response = await fetch(`${CONFIG.API_URL}?${params}`);
        const data = await response.json();
        
        if (data.success) {
            alert('✅ Product added to Excel successfully!');
            
            // Clear form
            document.getElementById('sku').value = '';
            document.getElementById('name').value = '';
            document.getElementById('price').value = '';
            document.getElementById('description').value = '';
            
            // Refresh product list
            loadProducts();
        } else {
            alert('Error: ' + (data.error || 'Unknown error'));
        }
    } catch (error) {
        alert('Error adding product: ' + error.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '➕ Add Product to Excel';
    }
}
</script>
