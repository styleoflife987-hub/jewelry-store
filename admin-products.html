<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #d4af37; --primary-dark: #b8962e; --dark: #1a1a1a; --darker: #0a0a0a; --light: #ffffff; --gray-100: #f8f9fa; --gray-200: #e9ecef; --gray-600: #6c757d; --danger: #dc3545; --success: #28a745; }
        body { font-family: 'Inter', sans-serif; background: var(--gray-100); }
        header { background: var(--darker); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 600; color: var(--primary); }
        .logo span { background: var(--primary); color: var(--darker); padding: 4px 8px; border-radius: 4px; }
        nav a { color: #aaa; text-decoration: none; margin-left: 20px; padding: 8px 15px; border-radius: 6px; }
        nav a:hover, nav a.active { background: rgba(212,175,55,0.1); color: var(--primary); }
        .container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        h1 { color: var(--primary); margin-bottom: 30px; }
        .toolbar { display: flex; justify-content: flex-end; margin-bottom: 30px; }
        .btn { background: var(--primary); color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
        .form-card { background: white; border-radius: 12px; padding: 30px; margin-bottom: 30px; border: 1px solid var(--gray-200); }
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 14px; }
        .image-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 15px 0; }
        .image-slot { background: var(--gray-100); border: 1px solid var(--gray-200); border-radius: 6px; padding: 8px; text-align: center; }
        .image-slot input { width: 100%; padding: 5px; font-size: 11px; margin-top: 5px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid var(--gray-200); }
        .product-card img { width: 100%; height: 180px; object-fit: cover; }
        .product-info { padding: 15px; }
        .product-info h4 { margin-bottom: 5px; }
        .product-price { color: var(--primary); font-weight: bold; margin: 10px 0; }
        .edit-btn, .delete-btn { width: 48%; padding: 8px; margin-top: 10px; border: none; border-radius: 4px; cursor: pointer; }
        .edit-btn { background: #2196f3; color: white; }
        .delete-btn { background: var(--danger); color: white; }
        .empty-state { text-align: center; padding: 50px; color: var(--gray-600); }
        footer { background: var(--darker); color: white; text-align: center; padding: 30px; margin-top: 60px; }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } .image-grid { grid-template-columns: repeat(2, 1fr); } header { flex-direction: column; gap: 15px; padding: 15px; } }
    </style>
</head>
<body>
    <header>
        <div class="logo">STYLE OF LIFE <span>ADMIN</span></div>
        <nav>
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html" class="active">Products</a>
            <a href="admin-orders.html">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="container">
        <h1>Product Management</h1>
        <div class="toolbar"><button class="btn" onclick="toggleForm()">+ Add New Product</button></div>
        
        <div id="addForm" class="form-card" style="display: none;">
            <h2 style="margin-bottom: 20px;">Add New Product</h2>
            <div class="form-grid">
                <input type="text" id="sku" placeholder="SKU *">
                <input type="text" id="name" placeholder="Product Name *">
                <input type="text" id="category" placeholder="Category *">
            </div>
            <div class="form-grid">
                <input type="number" id="price" placeholder="Price *">
                <input type="number" id="stock" placeholder="Stock *">
            </div>
            <textarea id="description" rows="2" placeholder="Description"></textarea>
            <h3 style="margin: 15px 0;">Image URLs (5 images)</h3>
            <div class="image-grid">
                <div class="image-slot">Image 1<br><input type="url" id="img1" placeholder="https://..."></div>
                <div class="image-slot">Image 2<br><input type="url" id="img2" placeholder="https://..."></div>
                <div class="image-slot">Image 3<br><input type="url" id="img3" placeholder="https://..."></div>
                <div class="image-slot">Image 4<br><input type="url" id="img4" placeholder="https://..."></div>
                <div class="image-slot">Image 5<br><input type="url" id="img5" placeholder="https://..."></div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn" onclick="saveProduct()">Save Product</button>
                <button class="btn" onclick="toggleForm()" style="background: #6c757d;">Cancel</button>
            </div>
        </div>
        
        <div id="productsGrid" class="product-grid">
            <div class="empty-state">Loading products...</div>
        </div>
    </div>

    <footer><p>© 2026 STYLE OF LIFE</p></footer>

    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        if (!sessionStorage.getItem('adminLoggedIn')) window.location.href = 'login.html';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        
        async function loadProducts() {
            const { data, error } = await supabase.from('products').select('*').order('id');
            if (error) { console.error(error); return; }
            displayProducts(data || []);
        }
        
        function displayProducts(products) {
            const grid = document.getElementById('productsGrid');
            if (products.length === 0) {
                grid.innerHTML = '<div class="empty-state">No products found. Click "Add New Product" to get started.</div>';
                return;
            }
            
            let html = '';
            products.forEach(p => {
                const img = p.images?.[0] || 'https://via.placeholder.com/300x200?text=No+Image';
                html += `
                    <div class="product-card">
                        <img src="${img}" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
                        <div class="product-info">
                            <h4>${p.name}</h4>
                            <div style="color:#6c757d;">${p.sku} | ${p.category}</div>
                            <div class="product-price">₹${Number(p.price).toLocaleString()}</div>
                            <div>Stock: ${p.stock}</div>
                            <div style="display: flex; gap: 5px;">
                                <button class="edit-btn" onclick="editProduct(${p.id})">Edit</button>
                                <button class="delete-btn" onclick="deleteProduct(${p.id})">Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }
        
        window.toggleForm = function() {
            const form = document.getElementById('addForm');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        };
        
        window.saveProduct = async function() {
            const sku = document.getElementById('sku').value.trim();
            const name = document.getElementById('name').value.trim();
            const category = document.getElementById('category').value.trim();
            const price = document.getElementById('price').value.trim();
            const stock = document.getElementById('stock').value.trim();
            
            if (!sku || !name || !category || !price || !stock) {
                alert('Please fill all required fields');
                return;
            }
            
            const images = [1,2,3,4,5].map(i => document.getElementById(`img${i}`).value.trim());
            
            const { error } = await supabase.from('products').insert([{
                sku, name, category, price: Number(price), stock: Number(stock),
                description: document.getElementById('description').value.trim(),
                images: images
            }]);
            
            if (error) {
                alert('Error: ' + error.message);
                return;
            }
            
            alert('✅ Product added successfully! Customers can now see it.');
            toggleForm();
            await loadProducts();
            ['sku','name','category','price','stock','description','img1','img2','img3','img4','img5'].forEach(id => document.getElementById(id).value = '');
        };
        
        window.editProduct = async function(id) {
            const { data } = await supabase.from('products').select('*').eq('id', id);
            const product = data?.[0];
            if (!product) return;
            
            const newName = prompt('Edit product name:', product.name);
            if (newName && newName !== product.name) {
                const { error } = await supabase.from('products').update({ name: newName }).eq('id', id);
                if (error) alert('Error: ' + error.message);
                else await loadProducts();
            }
        };
        
        window.deleteProduct = async function(id) {
            if (!confirm('Delete this product? This will remove it from customer view.')) return;
            const { error } = await supabase.from('products').delete().eq('id', id);
            if (error) { alert('Error: ' + error.message); return; }
            alert('✅ Product deleted. No longer visible to customers.');
            await loadProducts();
        };
        
        window.logout = function() { sessionStorage.removeItem('adminLoggedIn'); window.location.href = 'login.html'; };
        
        loadProducts();
    </script>
</body>
</html>
