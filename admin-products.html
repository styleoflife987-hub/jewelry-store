<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">✨ STYLE OF LIFE - PRODUCTS</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html" class="active">Products</a>
            <a href="admin-orders.html">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="admin-container">
        <h1 class="page-title">Product Management</h1>
        
        <div class="add-product-form">
            <h2>Add New Product</h2>
            
            <div class="form-grid">
                <div class="form-group">
                    <label for="sku">SKU *</label>
                    <input type="text" id="sku" placeholder="e.g., SKU001" required>
                </div>
                
                <div class="form-group">
                    <label for="name">Product Name *</label>
                    <input type="text" id="name" placeholder="e.g., Gold Necklace" required>
                </div>
                
                <div class="form-group">
                    <label for="category">Category *</label>
                    <input type="text" id="category" placeholder="e.g., Necklaces" required>
                </div>
                
                <div class="form-group">
                    <label for="price">Price (₹) *</label>
                    <input type="number" id="price" placeholder="e.g., 25000" required>
                </div>
                
                <div class="form-group">
                    <label for="stock">Stock Quantity *</label>
                    <input type="number" id="stock" placeholder="e.g., 10" value="10" required>
                </div>
                
                <div class="form-group full-width">
                    <label for="description">Description</label>
                    <textarea id="description" rows="2" placeholder="Product description"></textarea>
                </div>
                
                <div class="form-group full-width">
                    <label for="image">Image URL</label>
                    <input type="url" id="image" placeholder="https://example.com/image.jpg" value="https://images.unsplash.com/photo-1515562141207-7a88fb7ce338">
                </div>
            </div>
            
            <button onclick="addProduct()" class="submit-btn" id="addProductBtn">
                ➕ Add Product
            </button>
        </div>
        
        <div class="products-list-section">
            <h2>Current Products</h2>
            <div id="productsList" class="products-grid-admin">
                <p>Loading products...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Style Of Life Jewelry - Product Management</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    
    <script>
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }
        
        document.addEventListener('DOMContentLoaded', loadProducts);
        
        function loadProducts() {
            const products = JSON.parse(localStorage.getItem('products') || '[]');
            displayProducts(products);
        }
        
        function displayProducts(products) {
            const container = document.getElementById('productsList');
            
            if (products.length === 0) {
                container.innerHTML = '<p>No products found. Add your first product above.</p>';
                return;
            }
            
            let html = '';
            products.forEach(product => {
                html += `
                    <div class="product-card-admin" data-product-id="${product.id}">
                        <div style="display: flex; gap: 15px; width: 100%;">
                            <img src="${product.image || 'https://images.unsplash.com/photo-1515562141207-7a88fb7ce338'}" 
                                 style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px;"
                                 onerror="this.src='https://via.placeholder.com/80'">
                            <div class="product-card-info" style="flex: 1;">
                                <h4>${product.name}</h4>
                                <p class="product-sku">SKU: ${product.sku}</p>
                                <p class="product-category">${product.category}</p>
                                <p class="product-price">₹${Number(product.price).toLocaleString('en-IN')}</p>
                                <p class="product-stock">Stock: ${product.stock}</p>
                            </div>
                            <div class="product-card-actions">
                                <button onclick="deleteProduct('${product.id}')" class="delete-btn">🗑️ Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function addProduct() {
            const sku = document.getElementById('sku').value.trim();
            const name = document.getElementById('name').value.trim();
            const category = document.getElementById('category').value.trim();
            const price = document.getElementById('price').value.trim();
            const stock = document.getElementById('stock').value.trim();
            const description = document.getElementById('description').value.trim();
            const image = document.getElementById('image').value.trim();
            
            if (!sku || !name || !category || !price || !stock) {
                alert('Please fill all required fields');
                return;
            }
            
            const newProduct = {
                id: Date.now(),
                sku: sku,
                name: name,
                category: category,
                price: Number(price),
                stock: Number(stock),
                description: description || '',
                image: image || 'https://images.unsplash.com/photo-1515562141207-7a88fb7ce338'
            };
            
            const products = JSON.parse(localStorage.getItem('products') || '[]');
            products.push(newProduct);
            localStorage.setItem('products', JSON.stringify(products));
            
            alert('✅ Product added successfully!');
            
            document.getElementById('sku').value = '';
            document.getElementById('name').value = '';
            document.getElementById('category').value = '';
            document.getElementById('price').value = '';
            document.getElementById('stock').value = '10';
            document.getElementById('description').value = '';
            
            loadProducts();
        }
        
        function deleteProduct(id) {
            if (!confirm('Delete this product?')) return;
            
            const products = JSON.parse(localStorage.getItem('products') || '[]');
            const updatedProducts = products.filter(p => p.id != id);
            localStorage.setItem('products', JSON.stringify(updatedProducts));
            
            alert('✅ Product deleted');
            loadProducts();
        }
        
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
