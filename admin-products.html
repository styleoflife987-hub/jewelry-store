<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            overflow-y: auto;
        }
        
        .modal-content {
            background: #1a1a1a;
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #d4af37;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }
        
        .modal-header h2 {
            color: #d4af37;
            margin: 0;
        }
        
        .close-btn {
            background: transparent;
            color: #888;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        
        .close-btn:hover {
            color: #f44336;
        }
        
        .current-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            border: 2px solid #d4af37;
            margin: 10px 0;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-actions button {
            flex: 1;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">✨ STYLE OF LIFE - PRODUCTS</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html" class="active">Products</a>
            <a href="admin-orders.html">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <!-- Edit Product Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✏️ Edit Product</h2>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            
            <input type="hidden" id="editProductId">
            
            <div class="form-group">
                <label for="editSku">SKU *</label>
                <input type="text" id="editSku" required>
            </div>
            
            <div class="form-group">
                <label for="editName">Product Name *</label>
                <input type="text" id="editName" required>
            </div>
            
            <div class="form-group">
                <label for="editCategory">Category *</label>
                <input type="text" id="editCategory" required>
            </div>
            
            <div class="form-group">
                <label for="editPrice">Price (₹) *</label>
                <input type="number" id="editPrice" required>
            </div>
            
            <div class="form-group">
                <label for="editStock">Stock Quantity *</label>
                <input type="number" id="editStock" required>
            </div>
            
            <div class="form-group">
                <label for="editDescription">Description</label>
                <textarea id="editDescription" rows="2"></textarea>
            </div>
            
            <div class="form-group">
                <label>Current Image</label>
                <img id="editCurrentImage" class="current-image" src="" alt="Current product image">
            </div>
            
            <div class="form-group">
                <label for="editImage">Change Image (optional)</label>
                <input type="file" id="editImage" accept="image/*">
            </div>
            
            <div class="modal-actions">
                <button onclick="saveEdit()" style="background: #4CAF50;">💾 Save Changes</button>
                <button onclick="closeEditModal()" style="background: #666;">❌ Cancel</button>
            </div>
        </div>
    </div>

    <div class="admin-container">
        <h1 class="page-title">Product Management</h1>
        
        <!-- Add Product Form -->
        <div class="add-product-form">
            <h2>Add New Product</h2>
            
            <div class="form-grid">
                <div class="form-group">
                    <label for="sku">SKU *</label>
                    <input type="text" id="sku" placeholder="e.g., SKU001" required>
                </div>
                
                <div class="form-group">
                    <label for="name">Product Name *</label>
                    <input type="text" id="name" placeholder="e.g., Gold Necklace" required>
                </div>
                
                <div class="form-group">
                    <label for="category">Category *</label>
                    <input type="text" id="category" placeholder="e.g., Necklaces" required>
                </div>
                
                <div class="form-group">
                    <label for="price">Price (₹) *</label>
                    <input type="number" id="price" placeholder="e.g., 25000" required>
                </div>
                
                <div class="form-group">
                    <label for="stock">Stock Quantity *</label>
                    <input type="number" id="stock" placeholder="e.g., 10" value="10" required>
                </div>
                
                <div class="form-group full-width">
                    <label for="description">Description</label>
                    <textarea id="description" rows="2" placeholder="Product description"></textarea>
                </div>
                
                <div class="form-group full-width">
                    <label for="productImage">Product Image</label>
                    <input type="file" id="productImage" accept="image/*">
                    <p style="color: #888; font-size: 12px; margin-top: 5px;">Optional - if no image, a default will be used</p>
                </div>
            </div>
            
            <button onclick="addProduct()" class="submit-btn" id="addProductBtn">
                ➕ Add Product
            </button>
        </div>
        
        <!-- Products List -->
        <div class="products-list-section">
            <h2>Current Products</h2>
            <div id="productsList" class="products-grid-admin">
                <p>Loading products...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Style Of Life Jewelry - Product Management</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    
    <script>
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }
        
        const imageMap = {
            'Necklaces': 'https://images.unsplash.com/photo-1515562141207-7a88fb7ce338',
            'Rings': 'https://images.unsplash.com/photo-1605100804763-247f67b3557e',
            'Earrings': 'https://images.unsplash.com/photo-1535632066927-ab7c9ab60908',
            'Bracelets': 'https://images.unsplash.com/photo-1611591437281-460bfbe1220a',
            'Bangles': 'https://images.unsplash.com/photo-1573408301185-9146fe634ad0'
        };
        
        document.addEventListener('DOMContentLoaded', loadProducts);
        
        function loadProducts() {
            const products = JSON.parse(localStorage.getItem('products') || '[]');
            displayProducts(products);
        }
        
        function displayProducts(products) {
            const container = document.getElementById('productsList');
            
            if (products.length === 0) {
                container.innerHTML = '<p>No products found. Add your first product above.</p>';
                return;
            }
            
            let html = '';
            products.forEach(product => {
                html += `
                    <div class="product-card-admin">
                        <div style="display: flex; gap: 20px; width: 100%;">
                            <img src="${product.image || CONFIG.PLACEHOLDER_IMAGE}" 
                                 style="width: 100px; height: 100px; object-fit: cover; border-radius: 8px; border: 2px solid #d4af37;"
                                 onerror="this.src='${CONFIG.PLACEHOLDER_IMAGE}'">
                            <div style="flex: 1;">
                                <h4>${product.name}</h4>
                                <p style="color: #888;">SKU: ${product.sku}</p>
                                <p style="color: #d4af37;">Category: ${product.category}</p>
                                <p style="color: #d4af37; font-weight: bold;">₹${Number(product.price).toLocaleString('en-IN')}</p>
                                <p>Stock: ${product.stock}</p>
                            </div>
                            <div>
                                <button onclick="editProduct('${product.id}')" style="background: #2196f3; width: auto; padding: 8px 15px; margin-bottom: 5px;">✏️ Edit</button>
                                <button onclick="deleteProduct('${product.id}')" style="background: #f44336; width: auto; padding: 8px 15px;">🗑️ Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function addProduct() {
            const sku = document.getElementById('sku').value.trim();
            const name = document.getElementById('name').value.trim();
            const category = document.getElementById('category').value.trim();
            const price = document.getElementById('price').value.trim();
            const stock = document.getElementById('stock').value.trim();
            const description = document.getElementById('description').value.trim();
            
            if (!sku || !name || !category || !price || !stock) {
                alert('Please fill all required fields');
                return;
            }
            
            // Get image based on category or use placeholder
            const imageUrl = imageMap[category] || CONFIG.PLACEHOLDER_IMAGE;
            
            const newProduct = {
                id: Date.now(),
                sku: sku,
                name: name,
                category: category,
                price: Number(price),
                stock: Number(stock),
                description: description || '',
                image: imageUrl
            };
            
            const products = JSON.parse(localStorage.getItem('products') || '[]');
            products.push(newProduct);
            localStorage.setItem('products', JSON.stringify(products));
            
            alert('✅ Product added successfully!');
            
            // Clear form
            document.getElementById('sku').value = '';
            document.getElementById('name').value = '';
            document.getElementById('category').value = '';
            document.getElementById('price').value = '';
            document.getElementById('stock').value = '10';
            document.getElementById('description').value = '';
            document.getElementById('productImage').value = '';
            
            loadProducts();
        }
        
        function editProduct(id) {
            const products = JSON.parse(localStorage.getItem('products') || '[]');
            const product = products.find(p => p.id == id);
            
            if (!product) return;
            
            document.getElementById('editProductId').value = product.id;
            document.getElementById('editSku').value = product.sku || '';
            document.getElementById('editName').value = product.name || '';
            document.getElementById('editCategory').value = product.category || '';
            document.getElementById('editPrice').value = product.price || '';
            document.getElementById('editStock').value = product.stock || '';
            document.getElementById('editDescription').value = product.description || '';
            document.getElementById('editCurrentImage').src = product.image || CONFIG.PLACEHOLDER_IMAGE;
            
            document.getElementById('editModal').style.display = 'block';
        }
        
        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }
        
        function saveEdit() {
            const id = document.getElementById('editProductId').value;
            const sku = document.getElementById('editSku').value.trim();
            const name = document.getElementById('editName').value.trim();
            const category = document.getElementById('editCategory').value.trim();
            const price = document.getElementById('editPrice').value.trim();
            const stock = document.getElementById('editStock').value.trim();
            const description = document.getElementById('editDescription').value.trim();
            
            if (!sku || !name || !category || !price || !stock) {
                alert('Please fill all required fields');
                return;
            }
            
            const products = JSON.parse(localStorage.getItem('products') || '[]');
            const index = products.findIndex(p => p.id == id);
            
            if (index === -1) return;
            
            // Update product
            products[index] = {
                ...products[index],
                sku: sku,
                name: name,
                category: category,
                price: Number(price),
                stock: Number(stock),
                description: description || ''
            };
            
            localStorage.setItem('products', JSON.stringify(products));
            
            alert('✅ Product updated successfully!');
            closeEditModal();
            loadProducts();
        }
        
        function deleteProduct(id) {
            if (!confirm('Delete this product?')) return;
            
            const products = JSON.parse(localStorage.getItem('products') || '[]');
            const updatedProducts = products.filter(p => p.id != id);
            localStorage.setItem('products', JSON.stringify(updatedProducts));
            
            alert('✅ Product deleted');
            loadProducts();
        }
        
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        }
        
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target == modal) {
                closeEditModal();
            }
        }
    </script>
</body>
</html>
