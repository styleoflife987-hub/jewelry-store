<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
    <script src="js/drive-upload.js"></script>
</head>
<body>
    <header>
        <div class="logo">✨ STYLE OF LIFE - PRODUCTS</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html" class="active">Products</a>
            <a href="admin-orders.html">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="admin-container">
        <h1 class="page-title">Product Management</h1>
        
        <!-- Edit Product Modal -->
        <div id="editModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; overflow-y: auto;">
            <div style="background: #1a1a1a; max-width: 600px; margin: 50px auto; padding: 30px; border-radius: 15px; border: 2px solid #d4af37;">
                <h2 style="color: #d4af37; margin-bottom: 20px;">Edit Product</h2>
                
                <input type="hidden" id="editProductId">
                
                <div class="form-group">
                    <label>SKU</label>
                    <input type="text" id="editSku" required>
                </div>
                
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="editName" required>
                </div>
                
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="editCategory" required>
                </div>
                
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="editPrice" required>
                </div>
                
                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" id="editStock" required>
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="editDescription" rows="2"></textarea>
                </div>
                
                <div class="form-group">
                    <label>Current Image</label>
                    <img id="editCurrentImage" src="" style="max-width: 200px; max-height: 200px; display: block; margin: 10px 0; border-radius: 8px;">
                </div>
                
                <div class="form-group">
                    <label>Upload New Image (optional)</label>
                    <input type="file" id="editImage" accept="image/*">
                    <div id="editImagePreview"></div>
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button onclick="saveEdit()" class="submit-btn" style="flex: 1;">💾 Save Changes</button>
                    <button onclick="closeEditModal()" class="submit-btn" style="flex: 1; background: #666;">❌ Cancel</button>
                </div>
            </div>
        </div>
        
        <!-- Add Product Form -->
        <div class="add-product-form">
            <h2>Add New Product</h2>
            
            <div class="form-grid">
                <div class="form-group">
                    <label for="sku">SKU *</label>
                    <input type="text" id="sku" placeholder="e.g., SKU001" required>
                </div>
                
                <div class="form-group">
                    <label for="name">Product Name *</label>
                    <input type="text" id="name" placeholder="e.g., Gold Necklace" required>
                </div>
                
                <div class="form-group">
                    <label for="category">Category *</label>
                    <input type="text" id="category" placeholder="e.g., Necklaces" required>
                </div>
                
                <div class="form-group">
                    <label for="price">Price (₹) *</label>
                    <input type="number" id="price" placeholder="e.g., 25000" required>
                </div>
                
                <div class="form-group">
                    <label for="stock">Stock Quantity *</label>
                    <input type="number" id="stock" placeholder="e.g., 10" value="10" required>
                </div>
                
                <div class="form-group full-width">
                    <label for="description">Description</label>
                    <textarea id="description" rows="2" placeholder="Product description"></textarea>
                </div>
                
                <div class="form-group full-width">
                    <label>Product Image *</label>
                    <div style="display: flex; gap: 20px; align-items: center; flex-wrap: wrap;">
                        <input type="file" id="productImage" accept="image/*" style="width: auto; background: transparent; border: none;">
                        <div id="imagePreview"></div>
                    </div>
                    <p style="color: #888; font-size: 12px; margin-top: 5px;">Upload image to Google Drive (JPG, PNG, GIF)</p>
                </div>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button onclick="addProduct()" class="submit-btn" id="addProductBtn">
                    ➕ Add Product
                </button>
                <button onclick="clearForm()" class="submit-btn" style="background: #666;">
                    🗑️ Clear Form
                </button>
            </div>
        </div>
        
        <!-- Products List -->
        <div class="products-list-section">
            <h2>Current Products</h2>
            <div id="productsList" class="products-grid-admin">
                <p>Loading products...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Style Of Life Jewelry - Product Management</p>
    </footer>

    <script>
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
            
            document.getElementById('productImage').addEventListener('change', function(e) {
                if (e.target.files[0]) {
                    createImagePreview(e.target.files[0], 'imagePreview');
                }
            });
            
            document.getElementById('editImage').addEventListener('change', function(e) {
                if (e.target.files[0]) {
                    createImagePreview(e.target.files[0], 'editImagePreview');
                }
            });
        });
        
        function loadProducts() {
            const products = JSON.parse(localStorage.getItem('products') || '[]');
            displayProducts(products);
        }
        
        function displayProducts(products) {
            const container = document.getElementById('productsList');
            
            if (products.length === 0) {
                container.innerHTML = '<p>No products found. Add your first product above.</p>';
                return;
            }
            
            let html = '';
            products.forEach(product => {
                html += `
                    <div class="product-card-admin" data-product-id="${product.id}">
                        <div style="display: flex; gap: 20px; width: 100%;">
                            <img src="${product.image || CONFIG.PLACEHOLDER_IMAGE}" 
                                 style="width: 100px; height: 100px; object-fit: cover; border-radius: 8px; border: 2px solid #d4af37;"
                                 onerror="this.src='${CONFIG.PLACEHOLDER_IMAGE}'">
                            <div class="product-card-info" style="flex: 1;">
                                <h4>${product.name}</h4>
                                <p class="product-sku">SKU: ${product.sku}</p>
                                <p class="product-category">${product.category}</p>
                                <p class="product-price">₹${Number(product.price).toLocaleString('en-IN')}</p>
                                <p class="product-stock">Stock: ${product.stock}</p>
                                ${product.image ? '<p style="color: #4CAF50; font-size: 12px;">✅ Image in Drive</p>' : ''}
                            </div>
                            <div class="product-card-actions">
                                <button onclick="editProduct('${product.id}')" class="edit-btn" style="background: #2196f3; width: auto; padding: 8px 15px; margin-bottom: 5px;">✏️ Edit</button>
                                <button onclick="deleteProduct('${product.id}')" class="delete-btn" style="width: auto; padding: 8px 15px;">🗑️ Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function clearForm() {
            document.getElementById('sku').value = '';
            document.getElementById('name').value = '';
            document.getElementById('category').value = '';
            document.getElementById('price').value = '';
            document.getElementById('stock').value = '10';
            document.getElementById('description').value = '';
            document.getElementById('productImage').value = '';
            document.getElementById('imagePreview').innerHTML = '';
        }
        
        // Edit Product Functions
        function editProduct(id) {
            const products = JSON.parse(localStorage.getItem('products') || '[]');
            const product = products.find(p => p.id == id);
            
            if (!product) return;
            
            document.getElementById('editProductId').value = product.id;
            document.getElementById('editSku').value = product.sku || '';
            document.getElementById('editName').value = product.name || '';
            document.getElementById('editCategory').value = product.category || '';
            document.getElementById('editPrice').value = product.price || '';
            document.getElementById('editStock').value = product.stock || '';
            document.getElementById('editDescription').value = product.description || '';
            document.getElementById('editCurrentImage').src = product.image || CONFIG.PLACEHOLDER_IMAGE;
            document.getElementById('editImagePreview').innerHTML = '';
            document.getElementById('editImage').value = '';
            
            document.getElementById('editModal').style.display = 'block';
        }
        
        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }
        
        async function saveEdit() {
            const id = document.getElementById('editProductId').value;
            const sku = document.getElementById('editSku').value.trim();
            const name = document.getElementById('editName').value.trim();
            const category = document.getElementById('editCategory').value.trim();
            const price = document.getElementById('editPrice').value.trim();
            const stock = document.getElementById('editStock').value.trim();
            const description = document.getElementById('editDescription').value.trim();
            const imageFile = document.getElementById('editImage').files[0];
            
            if (!sku || !name || !category || !price || !stock) {
                alert('Please fill all required fields');
                return;
            }
            
            const products = JSON.parse(localStorage.getItem('products') || '[]');
            const index = products.findIndex(p => p.id == id);
            
            if (index === -1) return;
            
            let imageUrl = products[index].image;
            
            // Upload new image if selected
            if (imageFile) {
                try {
                    const uploadResult = await uploadImageToDrive(imageFile);
                    if (uploadResult.success) {
                        imageUrl = uploadResult.directUrl;
                    }
                } catch (error) {
                    console.error('Image upload failed:', error);
                    alert('Image upload failed, but product will be updated without new image');
                }
            }
            
            // Update product
            products[index] = {
                ...products[index],
                sku: sku,
                name: name,
                category: category,
                price: Number(price),
                stock: Number(stock),
                description: description || '',
                image: imageUrl
            };
            
            localStorage.setItem('products', JSON.stringify(products));
            
            alert('✅ Product updated successfully!');
            closeEditModal();
            loadProducts();
        }
        
        async function addProduct() {
            const sku = document.getElementById('sku').value.trim();
            const name = document.getElementById('name').value.trim();
            const category = document.getElementById('category').value.trim();
            const price = document.getElementById('price').value.trim();
            const stock = document.getElementById('stock').value.trim();
            const description = document.getElementById('description').value.trim();
            const imageFile = document.getElementById('productImage').files[0];
            
            if (!sku || !name || !category || !price || !stock) {
                alert('Please fill all required fields');
                return;
            }
            
            if (!imageFile) {
                alert('Please select an image to upload');
                return;
            }
            
            const btn = document.getElementById('addProductBtn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Uploading image to Drive...';
            
            try {
                const uploadResult = await uploadImageToDrive(imageFile);
                
                if (!uploadResult.success) {
                    throw new Error('Image upload failed');
                }
                
                btn.textContent = 'Saving product...';
                
                const newProduct = {
                    id: Date.now(),
                    sku: sku,
                    name: name,
                    category: category,
                    price: Number(price),
                    stock: Number(stock),
                    description: description || '',
                    image: uploadResult.directUrl,
                    driveFileId: uploadResult.fileId,
                    driveUrl: uploadResult.fileUrl
                };
                
                const products = JSON.parse(localStorage.getItem('products') || '[]');
                products.push(newProduct);
                localStorage.setItem('products', JSON.stringify(products));
                
                alert('✅ Product added successfully! Image saved to Google Drive.');
                clearForm();
                loadProducts();
                
            } catch (error) {
                console.error('Upload error:', error);
                alert('Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }
        
        function deleteProduct(id) {
            if (!confirm('Delete this product?')) return;
            
            const products = JSON.parse(localStorage.getItem('products') || '[]');
            const updatedProducts = products.filter(p => p.id != id);
            localStorage.setItem('products', JSON.stringify(updatedProducts));
            
            alert('✅ Product deleted');
            loadProducts();
        }
        
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
