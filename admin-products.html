<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
    <script src="js/admin.js"></script>
</head>
<body onload="checkAdminAuth(); loadProducts()">
    <header>
        <div class="logo">STYLE OF LIFE - PRODUCTS</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html">Products</a>
            <a href="admin-orders.html">Orders</a>
            <a href="admin-images.html">Images</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div style="max-width:1000px; margin:40px auto; padding:20px">
        <h1 style="color:#d4af37; margin-bottom:30px">Manage Products</h1>
        
        <!-- Add Product Form -->
        <div style="background:#1a1a1a; padding:30px; border-radius:15px; margin-bottom:30px">
            <h3 style="color:#d4af37; margin-bottom:20px">Add New Product</h3>
            
            <div style="margin-bottom:15px">
                <label style="color:#d4af37">SKU</label>
                <input type="text" id="sku" placeholder="e.g., SKU001" 
                       style="width:100%; padding:12px; background:#333; border:1px solid #444; border-radius:6px; color:white">
            </div>
            
            <div style="margin-bottom:15px">
                <label style="color:#d4af37">Product Name *</label>
                <input type="text" id="name" placeholder="e.g., Gold Necklace" 
                       style="width:100%; padding:12px; background:#333; border:1px solid #444; border-radius:6px; color:white">
            </div>
            
            <div style="margin-bottom:15px">
                <label style="color:#d4af37">Category</label>
                <input type="text" id="category" placeholder="e.g., Necklaces" 
                       style="width:100%; padding:12px; background:#333; border:1px solid #444; border-radius:6px; color:white">
            </div>
            
            <div style="margin-bottom:15px">
                <label style="color:#d4af37">Price *</label>
                <input type="number" id="price" placeholder="e.g., 25000" 
                       style="width:100%; padding:12px; background:#333; border:1px solid #444; border-radius:6px; color:white">
            </div>
            
            <div style="margin-bottom:15px">
                <label style="color:#d4af37">Stock</label>
                <input type="number" id="stock" value="10" 
                       style="width:100%; padding:12px; background:#333; border:1px solid #444; border-radius:6px; color:white">
            </div>
            
            <div style="margin-bottom:15px">
                <label style="color:#d4af37">Description</label>
                <textarea id="description" rows="3" placeholder="Product description" 
                          style="width:100%; padding:12px; background:#333; border:1px solid #444; border-radius:6px; color:white"></textarea>
            </div>
            
            <button onclick="addProduct()">Add Product</button>
        </div>
        
        <!-- Products List -->
        <div style="background:#1a1a1a; padding:30px; border-radius:15px">
            <h3 style="color:#d4af37; margin-bottom:20px">Current Products</h3>
            <div id="productsList"></div>
        </div>
    </div>
</body>
</html>
