<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #d4af37; --primary-dark: #b8962e; --dark: #1a1a1a; --darker: #0a0a0a; --light: #ffffff; --gray-100: #f8f9fa; --gray-200: #e9ecef; --gray-600: #6c757d; --danger: #dc3545; --success: #28a745; }
        body { font-family: 'Inter', sans-serif; background: var(--gray-100); }
        header { background: var(--darker); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 600; color: var(--primary); }
        .logo span { background: var(--primary); color: var(--darker); padding: 4px 8px; border-radius: 4px; }
        nav a { color: #aaa; text-decoration: none; margin-left: 20px; padding: 8px 15px; border-radius: 6px; }
        nav a:hover, nav a.active { background: rgba(212,175,55,0.1); color: var(--primary); }
        .container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        h1 { color: var(--primary); margin-bottom: 20px; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .btn { background: var(--primary); color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.3s; }
        .btn:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-danger { background: var(--danger); }
        .search-box input { padding: 10px 15px; border: 1px solid var(--gray-200); border-radius: 6px; width: 250px; }
        
        .form-card { background: white; border-radius: 12px; padding: 30px; margin-bottom: 30px; border: 1px solid var(--gray-200); }
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 15px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 14px; }
        
        .image-upload-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin: 20px 0; }
        .image-upload-card { background: var(--gray-100); border: 2px dashed var(--gray-200); border-radius: 12px; padding: 15px; text-align: center; transition: all 0.3s; }
        .image-upload-card:hover { border-color: var(--primary); background: #fff; }
        .image-upload-card .image-preview { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .image-upload-card .image-label { font-size: 12px; color: var(--gray-600); margin-bottom: 8px; display: block; }
        .image-upload-card input { width: 100%; padding: 8px; font-size: 12px; border: 1px solid var(--gray-200); border-radius: 6px; background: white; }
        .image-upload-card .remove-img-btn { background: var(--danger); color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-top: 8px; width: 100%; }
        .image-upload-card .remove-img-btn:hover { background: #c82333; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; margin-top: 20px; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid var(--gray-200); transition: all 0.3s; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-color: var(--primary); }
        .product-image { width: 100%; height: 200px; object-fit: cover; background: var(--gray-100); }
        .product-info { padding: 20px; }
        .product-info h4 { font-size: 18px; font-weight: 600; margin-bottom: 5px; }
        .product-sku { font-size: 12px; color: var(--gray-600); margin-bottom: 5px; }
        .product-category { color: var(--primary); font-size: 13px; margin-bottom: 10px; }
        .product-price { font-size: 22px; font-weight: 700; color: var(--primary); margin: 10px 0; }
        .product-stock { font-size: 14px; margin-bottom: 15px; padding: 4px 8px; border-radius: 20px; display: inline-block; }
        .stock-high { background: #d4edda; color: #155724; }
        .stock-low { background: #fff3cd; color: #856404; }
        .stock-out { background: #f8d7da; color: #721c24; }
        .product-actions { display: flex; gap: 10px; margin-top: 15px; }
        .edit-btn, .delete-btn { flex: 1; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
        .edit-btn { background: #2196f3; color: white; }
        .delete-btn { background: var(--danger); color: white; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; }
        .modal-content { background: white; max-width: 700px; margin: 50px auto; padding: 30px; border-radius: 16px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--primary); }
        .modal-header h2 { color: var(--primary); }
        .close-modal { background: none; border: none; font-size: 28px; cursor: pointer; color: var(--gray-600); }
        .close-modal:hover { color: var(--danger); }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        
        .empty-state { text-align: center; padding: 60px; background: white; border-radius: 12px; border: 1px solid var(--gray-200); }
        .spinner { width: 40px; height: 40px; border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #28a745; color: white; padding: 12px 24px; border-radius: 8px; z-index: 3000; animation: slideIn 0.3s; }
        .toast.error { background: #dc3545; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } .image-upload-grid { grid-template-columns: repeat(2, 1fr); } header { flex-direction: column; gap: 15px; } .toolbar { flex-direction: column; } .search-box input { width: 100%; } }
    </style>
</head>
<body>
    <header>
        <div class="logo">STYLE OF LIFE <span>ADMIN</span></div>
        <nav>
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html" class="active">Products</a>
            <a href="admin-orders.html">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="container">
        <h1>📦 Product Management</h1>
        
        <div class="toolbar">
            <button class="btn" onclick="showAddForm()">+ Add New Product</button>
            <div class="search-box"><input type="text" id="searchInput" placeholder="Search by name or SKU..." onkeyup="searchProducts()"></div>
        </div>
        
        <!-- Add Product Form -->
        <div id="addForm" class="form-card" style="display: none;">
            <h2 style="color: var(--primary); margin-bottom: 20px;">✨ Add New Product</h2>
            <div class="form-grid">
                <div><label>SKU *</label><input type="text" id="sku" placeholder="e.g., GOLD001"></div>
                <div><label>Product Name *</label><input type="text" id="name" placeholder="e.g., Gold Necklace"></div>
                <div><label>Category *</label>
                    <select id="category"><option value="Necklaces">Necklaces</option><option value="Rings">Rings</option><option value="Earrings">Earrings</option><option value="Bracelets">Bracelets</option><option value="Bangles">Bangles</option></select>
                </div>
            </div>
            <div class="form-grid">
                <div><label>Price (₹) *</label><input type="number" id="price" placeholder="e.g., 25000"></div>
                <div><label>Stock Quantity *</label><input type="number" id="stock" placeholder="e.g., 10" value="10"></div>
            </div>
            <div><label>Description</label><textarea id="description" rows="2" placeholder="Product description..."></textarea></div>
            
            <h3 style="margin: 20px 0 10px;">📸 Upload Images (JPEG, PNG, GIF)</h3>
            <div class="image-upload-grid" id="imageUploadGrid">
                <!-- 5 image upload slots will be added here -->
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn" id="saveBtn" onclick="saveProduct()">💾 Save Product</button>
                <button class="btn btn-danger" onclick="hideAddForm()">Cancel</button>
            </div>
        </div>
        
        <!-- Edit Product Modal -->
        <div id="editModal" class="modal">
            <div class="modal-content">
                <div class="modal-header"><h2>✏️ Edit Product</h2><button class="close-modal" onclick="closeEditModal()">&times;</button></div>
                <input type="hidden" id="editId">
                <div class="form-grid">
                    <div><label>SKU</label><input type="text" id="editSku"></div>
                    <div><label>Product Name</label><input type="text" id="editName"></div>
                    <div><label>Category</label><select id="editCategory"><option value="Necklaces">Necklaces</option><option value="Rings">Rings</option><option value="Earrings">Earrings</option><option value="Bracelets">Bracelets</option><option value="Bangles">Bangles</option></select></div>
                </div>
                <div class="form-grid">
                    <div><label>Price (₹)</label><input type="number" id="editPrice"></div>
                    <div><label>Stock</label><input type="number" id="editStock"></div>
                </div>
                <div><label>Description</label><textarea id="editDescription" rows="2"></textarea></div>
                <h3 style="margin: 15px 0 10px;">📸 Product Images</h3>
                <div id="editImagesGrid" class="image-upload-grid"></div>
                <div class="modal-actions"><button class="btn" id="updateBtn" onclick="updateProduct()">💾 Save Changes</button><button class="btn btn-danger" onclick="closeEditModal()">Cancel</button></div>
            </div>
        </div>
        
        <div id="productsGrid" class="product-grid"><div class="empty-state"><div class="spinner"></div><p>Loading products...</p></div></div>
    </div>

    <footer><p>© 2026 STYLE OF LIFE</p></footer>

    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        import { uploadImage as uploadImageToStorage } from './js/supabase-client.js';
        
        if (!sessionStorage.getItem('adminLoggedIn')) window.location.href = 'login.html';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let allProducts = [];
        let currentImageFiles = { add: [], edit: [] };
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function createImageUploadSlot(slotIndex, existingImage = null, isEdit = false) {
            const containerId = isEdit ? 'editImagesGrid' : 'imageUploadGrid';
            const slotId = `${isEdit ? 'edit' : 'add'}_img_${slotIndex}`;
            
            return `
                <div class="image-upload-card" data-slot="${slotIndex}">
                    ${existingImage ? `<img src="${existingImage}" class="image-preview" id="preview_${slotId}">` : '<div class="image-preview" style="background:#e9ecef; display:flex; align-items:center; justify-content:center;">No Image</div>'}
                    <label class="image-label">Image ${slotIndex + 1} ${slotIndex === 0 ? '(Main)' : ''}</label>
                    <input type="file" id="${slotId}" accept="image/jpeg,image/png,image/gif,image/webp" onchange="previewImage(this, '${slotId}', ${slotIndex}, ${isEdit})">
                    ${existingImage ? `<button class="remove-img-btn" onclick="removeImage(${slotIndex}, ${isEdit})">Remove</button>` : ''}
                </div>
            `;
        }
        
        window.previewImage = function(input, slotId, slotIndex, isEdit) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const previewDiv = document.querySelector(`#${isEdit ? 'editImagesGrid' : 'imageUploadGrid'} .image-upload-card[data-slot="${slotIndex}"]`);
                    if (previewDiv) {
                        let previewImg = previewDiv.querySelector('.image-preview');
                        if (!previewImg || previewImg.tagName !== 'IMG') {
                            previewImg = document.createElement('img');
                            previewImg.className = 'image-preview';
                            previewDiv.insertBefore(previewImg, previewDiv.firstChild);
                        }
                        previewImg.src = e.target.result;
                    }
                };
                reader.readAsDataURL(input.files[0]);
                
                if (isEdit) {
                    currentImageFiles.edit[slotIndex] = input.files[0];
                } else {
                    currentImageFiles.add[slotIndex] = input.files[0];
                }
            }
        };
        
        window.removeImage = function(slotIndex, isEdit) {
            if (isEdit) {
                delete currentImageFiles.edit[slotIndex];
                const slotDiv = document.querySelector(`#editImagesGrid .image-upload-card[data-slot="${slotIndex}"]`);
                if (slotDiv) {
                    const preview = slotDiv.querySelector('.image-preview');
                    if (preview) preview.src = '';
                    const input = slotDiv.querySelector('input[type="file"]');
                    if (input) input.value = '';
                    slotDiv.innerHTML = `
                        <div class="image-preview" style="background:#e9ecef; display:flex; align-items:center; justify-content:center;">No Image</div>
                        <label class="image-label">Image ${slotIndex + 1} ${slotIndex === 0 ? '(Main)' : ''}</label>
                        <input type="file" accept="image/jpeg,image/png,image/gif,image/webp" onchange="previewImage(this, 'edit_img_${slotIndex}', ${slotIndex}, true)">
                    `;
                }
            } else {
                delete currentImageFiles.add[slotIndex];
                const slotDiv = document.querySelector(`#imageUploadGrid .image-upload-card[data-slot="${slotIndex}"]`);
                if (slotDiv) {
                    const preview = slotDiv.querySelector('.image-preview');
                    if (preview) preview.src = '';
                    const input = slotDiv.querySelector('input[type="file"]');
                    if (input) input.value = '';
                }
            }
        };
        
        async function uploadImages(imageFiles, productId) {
            const uploadedUrls = [];
            for (let i = 0; i < 5; i++) {
                if (imageFiles[i]) {
                    try {
                        const result = await uploadImageToStorage(imageFiles[i], productId, i);
                        if (result.success) {
                            uploadedUrls[i] = result.url;
                        }
                    } catch (err) {
                        console.error('Upload failed:', err);
                    }
                }
            }
            return uploadedUrls;
        }
        
        async function loadProducts() {
            const { data, error } = await supabase.from('products').select('*').order('id');
            if (error) return;
            allProducts = data || [];
            displayProducts(allProducts);
        }
        
        function getStockClass(stock) { if (stock > 20) return 'stock-high'; if (stock > 0) return 'stock-low'; return 'stock-out'; }
        function getStockText(stock) { if (stock > 20) return `In Stock (${stock})`; if (stock > 0) return `Low Stock (${stock})`; return 'Out of Stock'; }
        
        function displayProducts(products) {
            const grid = document.getElementById('productsGrid');
            if (!products.length) { grid.innerHTML = '<div class="empty-state"><h3>📭 No Products Found</h3><p>Click "Add New Product" to get started.</p></div>'; return; }
            
            let html = '';
            for (let p of products) {
                const img = p.images?.[0] || 'https://via.placeholder.com/300x200?text=No+Image';
                html += `
                    <div class="product-card" data-id="${p.id}">
                        <img src="${img}" class="product-image" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
                        <div class="product-info">
                            <h4>${escapeHtml(p.name)}</h4>
                            <div class="product-sku">SKU: ${p.sku}</div>
                            <div class="product-category">${p.category || 'Uncategorized'}</div>
                            <div class="product-price">₹${Number(p.price).toLocaleString('en-IN')}</div>
                            <div class="product-stock ${getStockClass(p.stock)}">${getStockText(p.stock)}</div>
                            <div class="product-actions">
                                <button class="edit-btn" onclick="openEditModal(${p.id})">✏️ Edit</button>
                                <button class="delete-btn" onclick="deleteProduct(${p.id})">🗑️ Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            grid.innerHTML = html;
        }
        
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m]; }); }
        
        window.searchProducts = function() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term) || p.sku.toLowerCase().includes(term));
            displayProducts(filtered);
        };
        
        window.showAddForm = function() {
            currentImageFiles.add = [];
            document.getElementById('imageUploadGrid').innerHTML = '';
            for (let i = 0; i < 5; i++) {
                document.getElementById('imageUploadGrid').innerHTML += createImageUploadSlot(i, null, false);
            }
            document.getElementById('addForm').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        
        window.hideAddForm = function() {
            document.getElementById('addForm').style.display = 'none';
            document.getElementById('sku').value = ''; document.getElementById('name').value = ''; document.getElementById('price').value = '';
            document.getElementById('stock').value = '10'; document.getElementById('description').value = '';
            document.getElementById('category').value = 'Necklaces';
            currentImageFiles.add = [];
        };
        
        window.saveProduct = async function() {
            const sku = document.getElementById('sku').value.trim();
            const name = document.getElementById('name').value.trim();
            const category = document.getElementById('category').value;
            const price = document.getElementById('price').value.trim();
            const stock = document.getElementById('stock').value.trim();
            
            if (!sku || !name || !price || !stock) { showToast('Please fill all required fields', true); return; }
            
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.textContent = 'Saving...';
            
            // Create product first
            const { data, error } = await supabase.from('products').insert([{
                sku, name, category, price: Number(price), stock: Number(stock),
                description: document.getElementById('description').value.trim(),
                images: []
            }]).select();
            
            if (error) { showToast('Error: ' + error.message, true); btn.disabled = false; btn.textContent = '💾 Save Product'; return; }
            
            const productId = data[0].id;
            
            // Upload images
            const uploadedUrls = await uploadImages(currentImageFiles.add, productId);
            
            // Update product with image URLs
            await supabase.from('products').update({ images: uploadedUrls }).eq('id', productId);
            
            showToast('✅ Product added successfully!');
            hideAddForm();
            await loadProducts();
            btn.disabled = false;
            btn.textContent = '💾 Save Product';
        };
        
        window.openEditModal = async function(id) {
            const { data } = await supabase.from('products').select('*').eq('id', id);
            const p = data?.[0];
            if (!p) return;
            
            document.getElementById('editId').value = p.id;
            document.getElementById('editSku').value = p.sku || '';
            document.getElementById('editName').value = p.name || '';
            document.getElementById('editCategory').value = p.category || 'Necklaces';
            document.getElementById('editPrice').value = p.price || '';
            document.getElementById('editStock').value = p.stock || '';
            document.getElementById('editDescription').value = p.description || '';
            
            currentImageFiles.edit = [];
            const editGrid = document.getElementById('editImagesGrid');
            editGrid.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                editGrid.innerHTML += createImageUploadSlot(i, p.images?.[i], true);
            }
            
            document.getElementById('editModal').style.display = 'block';
        };
        
        window.updateProduct = async function() {
            const id = document.getElementById('editId').value;
            const sku = document.getElementById('editSku').value.trim();
            const name = document.getElementById('editName').value.trim();
            const category = document.getElementById('editCategory').value;
            const price = document.getElementById('editPrice').value.trim();
            const stock = document.getElementById('editStock').value.trim();
            const description = document.getElementById('editDescription').value.trim();
            
            if (!sku || !name || !price || !stock) { showToast('Please fill all required fields', true); return; }
            
            const btn = document.getElementById('updateBtn');
            btn.disabled = true;
            btn.textContent = 'Updating...';
            
            // Get current product to keep existing images
            const { data: currentProduct } = await supabase.from('products').select('images').eq('id', id);
            let currentImages = currentProduct?.[0]?.images || [];
            
            // Upload new images
            const newImages = [...currentImages];
            for (let i = 0; i < 5; i++) {
                if (currentImageFiles.edit[i]) {
                    const result = await uploadImageToStorage(currentImageFiles.edit[i], id, i);
                    if (result.success) {
                        newImages[i] = result.url;
                    }
                }
            }
            
            const { error } = await supabase.from('products').update({
                sku, name, category, price: Number(price), stock: Number(stock), description,
                images: newImages
            }).eq('id', id);
            
            btn.disabled = false;
            btn.textContent = '💾 Save Changes';
            
            if (error) { showToast('Error: ' + error.message, true); return; }
            
            showToast('✅ Product updated successfully!');
            closeEditModal();
            await loadProducts();
        };
        
        window.deleteProduct = async function(id) {
            if (!confirm('⚠️ Delete this product permanently? This cannot be undone.')) return;
            
            const { error } = await supabase.from('products').delete().eq('id', id);
            if (error) { showToast('Error: ' + error.message, true); return; }
            
            showToast('✅ Product deleted permanently!');
            await loadProducts();
        };
        
        window.closeEditModal = function() { document.getElementById('editModal').style.display = 'none'; };
        window.logout = function() { sessionStorage.removeItem('adminLoggedIn'); window.location.href = 'login.html'; };
        window.onclick = function(event) { const modal = document.getElementById('editModal'); if (event.target === modal) closeEditModal(); };
        
        loadProducts();
    </script>
</body>
</html>
