<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
    <script src="js/live-sync.js"></script>
</head>
<body>
    <header>
        <div class="logo">✨ STYLE OF LIFE - PRODUCTS</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html" class="active">Products</a>
            <a href="admin-orders.html">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="admin-container">
        <h1 class="page-title">Product Management</h1>
        
        <div class="sync-status" style="background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px;">
            <span class="status-indicator" style="color: #4CAF50;">🟢</span>
            <span id="syncStatus">Live sync with Excel active</span>
            <button onclick="forceSync()" style="width: auto; padding: 8px 20px; margin-left: auto;">🔄 Sync Now</button>
        </div>
        
        <div class="add-product-form">
            <h2>Add New Product</h2>
            
            <div class="form-grid">
                <div class="form-group">
                    <label for="sku">SKU *</label>
                    <input type="text" id="sku" placeholder="e.g., SKU001" required>
                </div>
                
                <div class="form-group">
                    <label for="name">Product Name *</label>
                    <input type="text" id="name" placeholder="e.g., Gold Necklace" required>
                </div>
                
                <div class="form-group">
                    <label for="category">Category *</label>
                    <input type="text" id="category" placeholder="e.g., Necklaces" required>
                </div>
                
                <div class="form-group">
                    <label for="price">Price (₹) *</label>
                    <input type="number" id="price" placeholder="e.g., 25000" required>
                </div>
                
                <div class="form-group">
                    <label for="stock">Stock Quantity *</label>
                    <input type="number" id="stock" placeholder="e.g., 10" value="10" required>
                </div>
                
                <div class="form-group full-width">
                    <label for="description">Description</label>
                    <textarea id="description" rows="2" placeholder="Product description"></textarea>
                </div>
            </div>
            
            <button onclick="addProduct()" class="submit-btn" id="addProductBtn">
                ➕ Add Product to Excel
            </button>
        </div>
        
        <div class="products-list-section">
            <h2>Current Products in Excel</h2>
            <div id="productsList" class="products-grid-admin">
                <p>Loading products...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Style Of Life Jewelry - Live Sync Active</p>
    </footer>

    <script>
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
            
            // Listen for sync updates
            window.addEventListener('syncComplete', function() {
                loadProducts();
            });
            
            window.addEventListener('productsUpdated', function(e) {
                displayProducts(e.detail);
            });
        });
        
        async function loadProducts() {
            try {
                const response = await fetch(`${CONFIG.API_URL}?action=products&t=${Date.now()}`);
                const products = await response.json();
                displayProducts(products);
                localStorage.setItem('products', JSON.stringify(products));
            } catch (error) {
                const localProducts = JSON.parse(localStorage.getItem('products') || '[]');
                displayProducts(localProducts);
            }
        }
        
        function displayProducts(products) {
            const container = document.getElementById('productsList');
            
            if (!products || products.length === 0) {
                container.innerHTML = '<p>No products found in Excel</p>';
                return;
            }
            
            let html = '';
            products.forEach(product => {
                html += `
                    <div class="product-card-admin" data-product-id="${product.id}">
                        <div class="product-card-info">
                            <h4>${product.name}</h4>
                            <p class="product-sku">SKU: ${product.sku}</p>
                            <p class="product-category">${product.category}</p>
                            <p class="product-price">₹${Number(product.price).toLocaleString('en-IN')}</p>
                            <p class="product-stock">Stock: ${product.stock}</p>
                        </div>
                        <div class="product-card-actions">
                            <button onclick="deleteProduct('${product.id}')" class="delete-btn">🗑️ Delete from Excel</button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        async function addProduct() {
            const sku = document.getElementById('sku').value.trim();
            const name = document.getElementById('name').value.trim();
            const category = document.getElementById('category').value.trim();
            const price = document.getElementById('price').value.trim();
            const stock = document.getElementById('stock').value.trim();
            const description = document.getElementById('description').value.trim();
            
            if (!sku || !name || !category || !price || !stock) {
                alert('Please fill all required fields');
                return;
            }
            
            const btn = document.getElementById('addProductBtn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Adding to Excel...';
            
            try {
                const result = await addProductToExcel({
                    sku: sku,
                    name: name,
                    category: category,
                    price: price,
                    stock: stock,
                    description: description || ''
                });
                
                if (result.success) {
                    alert('✅ Product added to Excel successfully!');
                    
                    document.getElementById('sku').value = '';
                    document.getElementById('name').value = '';
                    document.getElementById('category').value = '';
                    document.getElementById('price').value = '';
                    document.getElementById('stock').value = '10';
                    document.getElementById('description').value = '';
                    
                    await forceSync();
                    loadProducts();
                } else {
                    alert('Error: ' + (result.error || 'Unknown error'));
                }
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }
        
        async function deleteProduct(id) {
            if (!confirm('Delete this product from Excel? This will sync to all users.')) return;
            
            try {
                const result = await deleteProductFromExcel(id);
                
                if (result.success) {
                    alert('✅ Product deleted from Excel');
                    await forceSync();
                    loadProducts();
                } else {
                    alert('Error: ' + (result.error || 'Unknown error'));
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
