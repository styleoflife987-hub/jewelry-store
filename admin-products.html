<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .image-upload-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .image-slot {
            background: var(--gray-100);
            border: 2px dashed var(--gray-300);
            border-radius: var(--radius-md);
            padding: 10px;
            text-align: center;
        }
        .url-input {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-sm);
            font-size: 12px;
        }
        .sync-status {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body class="admin">
    <header class="admin-header">
        <div class="admin-logo">
            STYLE OF LIFE <span>ADMIN</span>
        </div>
        <nav class="admin-nav">
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html" class="active">Products</a>
            <a href="admin-orders.html">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="admin-container">
        <div class="sync-status" id="syncStatus">
            <span>🟢 Connected to Cloud</span>
            <button class="admin-btn admin-btn-primary" onclick="syncNow()" style="padding: 5px 15px;">Sync Now</button>
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1 style="color: var(--primary);">Product Management</h1>
            <button class="admin-btn admin-btn-primary" onclick="showAddForm()">➕ Add New Product</button>
        </div>

        <!-- Add Product Form -->
        <div id="addForm" class="admin-card" style="display: none;">
            <h2 style="color: var(--primary); margin-bottom: 20px;">Add New Product</h2>
            
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 15px;">
                <input type="text" id="newSku" class="admin-input" placeholder="SKU">
                <input type="text" id="newName" class="admin-input" placeholder="Product Name">
                <input type="text" id="newCategory" class="admin-input" placeholder="Category">
            </div>
            
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 15px;">
                <input type="number" id="newPrice" class="admin-input" placeholder="Price">
                <input type="number" id="newStock" class="admin-input" placeholder="Stock">
            </div>
            
            <div style="margin-bottom: 15px;">
                <textarea id="newDescription" class="admin-input" placeholder="Description" rows="3"></textarea>
            </div>
            
            <h3 style="color: var(--primary); margin: 20px 0 10px;">Image URLs (5 images)</h3>
            <div class="image-upload-grid">
                <div class="image-slot">
                    <label>Image 1 (Main)</label>
                    <input type="url" id="newImg1" class="url-input" placeholder="https://...">
                </div>
                <div class="image-slot">
                    <label>Image 2</label>
                    <input type="url" id="newImg2" class="url-input" placeholder="https://...">
                </div>
                <div class="image-slot">
                    <label>Image 3</label>
                    <input type="url" id="newImg3" class="url-input" placeholder="https://...">
                </div>
                <div class="image-slot">
                    <label>Image 4</label>
                    <input type="url" id="newImg4" class="url-input" placeholder="https://...">
                </div>
                <div class="image-slot">
                    <label>Image 5</label>
                    <input type="url" id="newImg5" class="url-input" placeholder="https://...">
                </div>
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="admin-btn admin-btn-primary" onclick="saveNewProduct()">Save Product</button>
                <button class="admin-btn admin-btn-danger" onclick="hideAddForm()">Cancel</button>
            </div>
        </div>

        <!-- Products Grid -->
        <div id="productsGrid" class="admin-product-grid"></div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/cloud-sync.js"></script>
    <script>
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }

        document.addEventListener('DOMContentLoaded', async function() {
            await loadProducts();
        });

        async function loadProducts() {
            const products = await loadProductsFromCloud();
            if (products) {
                displayProducts(products);
            } else {
                const localProducts = JSON.parse(localStorage.getItem('products') || '[]');
                displayProducts(localProducts);
            }
        }

        function displayProducts(products) {
            const grid = document.getElementById('productsGrid');
            
            if (products.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px;">No products found. Click "Add New Product" to get started.</div>';
                return;
            }
            
            let html = '';
            
            products.forEach(product => {
                const images = product.images || [];
                const mainImage = images[0] || 'https://via.placeholder.com/300x300?text=No+Image';
                
                html += `
                    <div class="admin-product-card">
                        <img src="${mainImage}" class="admin-product-image" alt="${product.name}" onerror="this.src='https://via.placeholder.com/300x300?text=No+Image'">
                        <div class="admin-product-info">
                            <h4>${product.name}</h4>
                            <div class="admin-product-sku">SKU: ${product.sku}</div>
                            <div style="color: var(--gray-600);">${product.category}</div>
                            <div class="admin-product-price">₹${Number(product.price).toLocaleString('en-IN')}</div>
                            <div style="margin: 10px 0; color: ${product.stock > 0 ? 'var(--success)' : 'var(--danger)'};">Stock: ${product.stock}</div>
                            <div style="display: flex; gap: 10px;">
                                <button class="admin-btn admin-btn-primary" onclick="editProduct('${product.id}')" style="flex: 1;">Edit</button>
                                <button class="admin-btn admin-btn-danger" onclick="deleteProduct('${product.id}')" style="flex: 1;">Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }

        function showAddForm() {
            document.getElementById('addForm').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function hideAddForm() {
            document.getElementById('addForm').style.display = 'none';
            ['newSku','newName','newCategory','newPrice','newStock','newDescription','newImg1','newImg2','newImg3','newImg4','newImg5'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
        }

        async function saveNewProduct() {
            const sku = document.getElementById('newSku').value.trim();
            const name = document.getElementById('newName').value.trim();
            const category = document.getElementById('newCategory').value.trim();
            const price = document.getElementById('newPrice').value.trim();
            const stock = document.getElementById('newStock').value.trim();
            
            if (!sku || !name || !category || !price || !stock) {
                alert('Please fill all required fields');
                return;
            }
            
            const images = [
                document.getElementById('newImg1').value.trim(),
                document.getElementById('newImg2').value.trim(),
                document.getElementById('newImg3').value.trim(),
                document.getElementById('newImg4').value.trim(),
                document.getElementById('newImg5').value.trim()
            ];
            
            const products = JSON.parse(localStorage.getItem('products') || '[]');
            const newProduct = {
                id: Date.now(),
                sku: sku,
                name: name,
                category: category,
                price: Number(price),
                stock: Number(stock),
                description: document.getElementById('newDescription').value.trim() || '',
                images: images
            };
            products.push(newProduct);
            localStorage.setItem('products', JSON.stringify(products));
            
            // Save to cloud
            const saved = await saveProductsToCloud();
            if (saved) {
                alert('✅ Product added to cloud successfully!');
                hideAddForm();
                await loadProducts();
            } else {
                alert('⚠️ Product saved locally only. Cloud sync failed.');
            }
        }

        async function deleteProduct(id) {
            if (confirm('Delete this product?')) {
                const products = JSON.parse(localStorage.getItem('products') || '[]');
                const updatedProducts = products.filter(p => p.id != id);
                localStorage.setItem('products', JSON.stringify(updatedProducts));
                
                await saveProductsToCloud();
                await loadProducts();
                alert('✅ Product deleted');
            }
        }

        async function syncNow() {
            const statusDiv = document.getElementById('syncStatus');
            statusDiv.innerHTML = '<span>🔄 Syncing...</span><button class="admin-btn admin-btn-primary" onclick="syncNow()" disabled>Syncing...</button>';
            
            const saved = await saveProductsToCloud();
            await loadProducts();
            
            if (saved) {
                statusDiv.innerHTML = '<span>🟢 Connected to Cloud</span><button class="admin-btn admin-btn-primary" onclick="syncNow()">Sync Now</button>';
                alert('✅ Products synced to cloud successfully!');
            } else {
                statusDiv.innerHTML = '<span>🔴 Cloud connection failed</span><button class="admin-btn admin-btn-primary" onclick="syncNow()">Retry Sync</button>';
                alert('⚠️ Cloud sync failed. Check your internet connection.');
            }
        }

        function editProduct(id) {
            alert('Edit functionality - would open edit modal in production');
        }

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
