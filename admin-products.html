<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .image-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 15px 0; }
        .image-slot { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 6px; padding: 8px; text-align: center; }
        .url-input { width: 100%; padding: 6px; font-size: 11px; border: 1px solid #dee2e6; border-radius: 4px; }
    </style>
</head>
<body class="admin">
    <header class="admin-header">
        <div class="admin-logo">STYLE OF LIFE <span>ADMIN</span></div>
        <nav class="admin-nav">
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html" class="active">Products</a>
            <a href="admin-orders.html">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="admin-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1 style="color: var(--primary);">Product Management</h1>
            <button class="admin-btn admin-btn-primary" onclick="showAddForm()">+ Add Product</button>
        </div>

        <div id="addForm" class="admin-card" style="display: none;">
            <h2>Add New Product</h2>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px;">
                <input type="text" id="sku" class="admin-input" placeholder="SKU *">
                <input type="text" id="name" class="admin-input" placeholder="Name *">
                <input type="text" id="category" class="admin-input" placeholder="Category *">
            </div>
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 10px;">
                <input type="number" id="price" class="admin-input" placeholder="Price *">
                <input type="number" id="stock" class="admin-input" placeholder="Stock *">
            </div>
            <textarea id="description" class="admin-input" placeholder="Description" rows="2"></textarea>
            <div class="image-grid">
                <div class="image-slot"><input type="url" id="img1" class="url-input" placeholder="Image 1 URL"></div>
                <div class="image-slot"><input type="url" id="img2" class="url-input" placeholder="Image 2 URL"></div>
                <div class="image-slot"><input type="url" id="img3" class="url-input" placeholder="Image 3 URL"></div>
                <div class="image-slot"><input type="url" id="img4" class="url-input" placeholder="Image 4 URL"></div>
                <div class="image-slot"><input type="url" id="img5" class="url-input" placeholder="Image 5 URL"></div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="admin-btn admin-btn-primary" onclick="saveProduct()">Save</button>
                <button class="admin-btn admin-btn-danger" onclick="hideAddForm()">Cancel</button>
            </div>
        </div>

        <div id="productsGrid" class="admin-product-grid"></div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        if (!sessionStorage.getItem('adminLoggedIn')) window.location.href = 'login.html';
        
        document.addEventListener('DOMContentLoaded', loadProducts);
        
        async function loadProducts() {
            const products = await getProducts();
            displayProducts(products);
        }
        
        function displayProducts(products) {
            const grid = document.getElementById('productsGrid');
            if (!products || products.length === 0) {
                grid.innerHTML = '<div style="text-align:center; padding:50px;">No products found</div>';
                return;
            }
            
            let html = '';
            products.forEach(p => {
                const img = (p.images?.[0]) || 'https://via.placeholder.com/300x200?text=No+Image';
                html += `
                    <div class="admin-product-card">
                        <img src="${img}" class="admin-product-image" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
                        <div class="admin-product-info">
                            <h4>${p.name}</h4>
                            <div style="color:#6c757d;">${p.sku} | ${p.category}</div>
                            <div class="admin-product-price">₹${Number(p.price).toLocaleString()}</div>
                            <div>Stock: ${p.stock}</div>
                            <div style="display:flex; gap:10px; margin-top:10px;">
                                <button class="admin-btn admin-btn-danger" onclick="deleteProduct('${p.id}')">Delete</button>
                            </div>
                        </div>
                    </div>`;
            });
            grid.innerHTML = html;
        }
        
        function showAddForm() { document.getElementById('addForm').style.display = 'block'; }
        function hideAddForm() { document.getElementById('addForm').style.display = 'none'; }
        
        async function saveProduct() {
            const product = {
                sku: document.getElementById('sku').value,
                name: document.getElementById('name').value,
                category: document.getElementById('category').value,
                price: document.getElementById('price').value,
                stock: document.getElementById('stock').value,
                description: document.getElementById('description').value,
                images: [1,2,3,4,5].map(i => document.getElementById(`img${i}`).value)
            };
            
            const result = await addProduct(product);
            if (result.success) {
                alert('Product added!');
                hideAddForm();
                await loadProducts();
            } else {
                alert('Failed: ' + result.error);
            }
        }
        
        async function deleteProduct(id) {
            if (!confirm('Delete this product?')) return;
            const result = await deleteProduct(id);
            if (result.success) {
                alert('Product deleted');
                await loadProducts();
            }
        }
        
        function logout() { sessionStorage.removeItem('adminLoggedIn'); window.location.href = 'login.html'; }
    </script>
</body>
</html>
