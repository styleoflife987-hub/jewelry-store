<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
</head>
<body>
    <header>
        <div class="logo">✨ STYLE OF LIFE - PRODUCTS</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html" class="active">Products</a>
            <a href="admin-orders.html">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="admin-container">
        <h1 class="page-title">Product Management</h1>
        
        <div class="sync-status">
            <span class="status-indicator">🟢</span>
            <span>Live sync with Excel enabled</span>
            <button onclick="loadProducts()" class="refresh-btn">↻ Refresh</button>
        </div>
        
        <!-- Add Product Form -->
        <div class="add-product-form">
            <h2>Add New Product</h2>
            
            <div class="form-grid">
                <div class="form-group">
                    <label for="sku">SKU (Stock Keeping Unit)</label>
                    <input type="text" id="sku" placeholder="e.g., SKU001">
                </div>
                
                <div class="form-group">
                    <label for="name">Product Name *</label>
                    <input type="text" id="name" placeholder="e.g., Gold Necklace" required>
                </div>
                
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category">
                        <option value="Necklaces">Necklaces</option>
                        <option value="Rings">Rings</option>
                        <option value="Earrings">Earrings</option>
                        <option value="Bracelets">Bracelets</option>
                        <option value="Bangles">Bangles</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="price">Price (₹) *</label>
                    <input type="number" id="price" placeholder="e.g., 25000" required>
                </div>
                
                <div class="form-group">
                    <label for="stock">Stock Quantity</label>
                    <input type="number" id="stock" value="10" min="0">
                </div>
                
                <div class="form-group">
                    <label for="image">Image URL</label>
                    <input type="url" id="image" placeholder="https://...">
                </div>
                
                <div class="form-group full-width">
                    <label for="description">Description</label>
                    <textarea id="description" rows="2" placeholder="Product description"></textarea>
                </div>
            </div>
            
            <button onclick="addProduct()" class="submit-btn" id="addProductBtn">
                ➕ Add Product to Excel
            </button>
        </div>
        
        <!-- Products List -->
        <div class="products-list-section">
            <h2>Current Products</h2>
            <div id="productsList" class="products-grid-admin">
                <p>Loading products...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Style Of Life Jewelry - Product Management</p>
    </footer>

    <script>
        // Check authentication
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }
        
        // Load products on page load
        document.addEventListener('DOMContentLoaded', loadProducts);
        
        async function loadProducts() {
            const container = document.getElementById('productsList');
            container.innerHTML = '<p>Loading products...</p>';
            
            try {
                // Try server first
                const response = await fetch(`${CONFIG.API_URL}?action=products`);
                const products = await response.json();
                
                if (products && products.length > 0) {
                    displayProducts(products);
                    // Save to localStorage
                    localStorage.setItem('products', JSON.stringify(products));
                } else {
                    container.innerHTML = '<p>No products found. Add your first product above.</p>';
                }
            } catch (error) {
                // Fallback to localStorage
                const localProducts = JSON.parse(localStorage.getItem('products') || '[]');
                if (localProducts.length > 0) {
                    displayProducts(localProducts);
                } else {
                    container.innerHTML = '<p>No products found. Add your first product above.</p>';
                }
            }
        }
        
        function displayProducts(products) {
            const container = document.getElementById('productsList');
            
            if (products.length === 0) {
                container.innerHTML = '<p>No products found</p>';
                return;
            }
            
            let html = '';
            products.forEach(product => {
                html += `
                    <div class="product-card-admin">
                        <div class="product-card-image">
                            <img src="${product.mainImage || product.image || CONFIG.PLACEHOLDER_IMAGE}" 
                                 alt="${product.name}"
                                 onerror="this.src='${CONFIG.PLACEHOLDER_IMAGE}'">
                        </div>
                        <div class="product-card-info">
                            <h4>${product.name}</h4>
                            <p class="product-sku">SKU: ${product.sku}</p>
                            <p class="product-category">${product.category || 'Jewelry'}</p>
                            <p class="product-price">₹${(product.price || 0).toLocaleString()}</p>
                            <p class="product-stock">Stock: ${product.stock || 0}</p>
                        </div>
                        <div class="product-card-actions">
                            <button onclick="editProduct('${product.id}')" class="edit-btn">✏️ Edit</button>
                            <button onclick="deleteProduct('${product.id}')" class="delete-btn">🗑️ Delete</button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        async function addProduct() {
            // Get form values
            const sku = document.getElementById('sku').value.trim() || `SKU${Date.now()}`;
            const name = document.getElementById('name').value.trim();
            const category = document.getElementById('category').value;
            const price = document.getElementById('price').value;
            const stock = document.getElementById('stock').value || 10;
            const image = document.getElementById('image').value.trim() || CONFIG.PLACEHOLDER_IMAGE;
            const description = document.getElementById('description').value.trim() || '';
            
            // Validate
            if (!name) {
                alert('Please enter product name');
                return;
            }
            
            if (!price || isNaN(price) || price <= 0) {
                alert('Please enter a valid price');
                return;
            }
            
            // Disable button
            const btn = document.getElementById('addProductBtn');
            btn.disabled = true;
            btn.textContent = 'Adding...';
            
            try {
                // Try server first
                const params = new URLSearchParams({
                    action: 'addProduct',
                    sku: sku,
                    name: name,
                    category: category,
                    price: price,
                    stock: stock,
                    description: description
                });
                
                const response = await fetch(`${CONFIG.API_URL}?${params}`);
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ Product added successfully to Excel!');
                    
                    // Clear form
                    document.getElementById('sku').value = '';
                    document.getElementById('name').value = '';
                    document.getElementById('price').value = '';
                    document.getElementById('image').value = '';
                    document.getElementById('description').value = '';
                    
                    // Refresh list
                    loadProducts();
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                // Fallback: Save locally
                alert('⚠️ Server unavailable. Product saved locally.');
                
                // Create local product
                const newProduct = {
                    id: Date.now(),
                    sku: sku,
                    name: name,
                    category: category,
                    price: Number(price),
                    stock: Number(stock),
                    mainImage: image,
                    description: description,
                    lastUpdated: new Date().toISOString()
                };
                
                // Save to localStorage
                const products = JSON.parse(localStorage.getItem('products') || '[]');
                products.push(newProduct);
                localStorage.setItem('products', JSON.stringify(products));
                
                // Refresh display
                displayProducts(products);
                
                // Clear form
                document.getElementById('sku').value = '';
                document.getElementById('name').value = '';
                document.getElementById('price').value = '';
                document.getElementById('image').value = '';
                document.getElementById('description').value = '';
            } finally {
                btn.disabled = false;
                btn.textContent = '➕ Add Product to Excel';
            }
        }
        
        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;
            
            try {
                const response = await fetch(`${CONFIG.API_URL}?action=deleteProduct&id=${id}`);
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ Product deleted successfully');
                    loadProducts();
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                // Fallback: Remove locally
                const products = JSON.parse(localStorage.getItem('products') || '[]');
                const updatedProducts = products.filter(p => p.id != id);
                localStorage.setItem('products', JSON.stringify(updatedProducts));
                displayProducts(updatedProducts);
                alert('Product removed from local storage');
            }
        }
        
        function editProduct(id) {
            alert(`Edit functionality for product ID: ${id}\nIn production, this would open an edit form.`);
        }
        
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
