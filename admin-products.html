<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Product Management - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
</head>
<body onload="checkAuth(); loadProducts()">
    <header>
        <div class="logo">STYLE OF LIFE - LIVE ADMIN</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html">Products</a>
            <a href="admin-orders.html">Orders</a>
            <a href="admin-images.html">Images</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div style="max-width:1200px; margin:40px auto; padding:20px">
        <h1 style="color:#d4af37; margin-bottom:30px">Live Product Management</h1>
        
        <!-- Status Bar -->
        <div style="background:#1a1a1a; padding:15px; border-radius:8px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center">
            <span style="color:#4CAF50">🟢 Live - Connected to Google Sheets</span>
            <button onclick="loadProducts()" style="width:auto; padding:8px 20px">🔄 Refresh Now</button>
        </div>
        
        <!-- Add Product Form -->
        <div style="background:#1a1a1a; padding:30px; border-radius:15px; margin-bottom:30px">
            <h3 style="color:#d4af37; margin-bottom:20px">Add New Product</h3>
            
            <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:20px;">
                <div>
                    <label>SKU</label>
                    <input type="text" id="sku" placeholder="e.g., SKU001">
                </div>
                <div>
                    <label>Product Name *</label>
                    <input type="text" id="name" placeholder="e.g., Gold Necklace">
                </div>
                <div>
                    <label>Category</label>
                    <input type="text" id="category" placeholder="e.g., Necklaces">
                </div>
                <div>
                    <label>Price *</label>
                    <input type="number" id="price" placeholder="e.g., 25000">
                </div>
                <div>
                    <label>Stock</label>
                    <input type="number" id="stock" value="10">
                </div>
                <div>
                    <label>Description</label>
                    <input type="text" id="description" placeholder="Product description">
                </div>
            </div>
            
            <button onclick="addProduct()" style="margin-top:20px">Add Product to Google Sheets</button>
        </div>
        
        <!-- Products List -->
        <div style="background:#1a1a1a; padding:30px; border-radius:15px">
            <h3 style="color:#d4af37; margin-bottom:20px">Current Products in Excel</h3>
            <div id="productsList"></div>
        </div>
    </div>

    <script>
        function checkAuth() {
            if (!sessionStorage.getItem('adminLoggedIn')) {
                window.location.href = 'login.html';
            }
        }
        
        async function loadProducts() {
            try {
                const response = await fetch(`${CONFIG.API_URL}?action=products`);
                const products = await response.json();
                
                const container = document.getElementById('productsList');
                
                if (!products || products.length === 0) {
                    container.innerHTML = '<p>No products found in Excel</p>';
                    return;
                }
                
                let html = '<div style="overflow-x:auto"><table style="width:100%"><tr><th>Image</th><th>SKU</th><th>Name</th><th>Price</th><th>Stock</th><th>Actions</th></tr>';
                
                products.forEach(product => {
                    html += `
                        <tr>
                            <td><img src="${product.mainImage}" style="width:50px; height:50px; object-fit:cover; border-radius:4px;"></td>
                            <td>${product.sku}</td>
                            <td>${product.name}</td>
                            <td>₹${product.price}</td>
                            <td>${product.stock}</td>
                            <td>
                                <button onclick="editProduct('${product.id}')" style="width:auto; padding:5px 10px; margin-right:5px;">Edit</button>
                                <button onclick="deleteProduct('${product.id}')" style="width:auto; padding:5px 10px; background:#f44336;">Delete</button>
                            </td>
                        </tr>
                    `;
                });
                
                html += '</table></div>';
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('productsList').innerHTML = '<p style="color:#f44336">Error loading products</p>';
            }
        }
        
        async function addProduct() {
            const sku = document.getElementById('sku').value;
            const name = document.getElementById('name').value;
            const category = document.getElementById('category').value;
            const price = document.getElementById('price').value;
            const stock = document.getElementById('stock').value;
            const description = document.getElementById('description').value;
            
            if (!name || !price) {
                alert('Please fill required fields');
                return;
            }
            
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Adding...';
            
            try {
                const params = new URLSearchParams({
                    action: 'addProduct',
                    sku: sku || `SKU${Date.now()}`,
                    name: name,
                    category: category || 'Jewelry',
                    price: price,
                    stock: stock || 10,
                    description: description || ''
                });
                
                const response = await fetch(`${CONFIG.API_URL}?${params}`);
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ Product added to Excel successfully!');
                    document.getElementById('sku').value = '';
                    document.getElementById('name').value = '';
                    document.getElementById('category').value = '';
                    document.getElementById('price').value = '';
                    document.getElementById('description').value = '';
                    loadProducts(); // Live refresh
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Error adding product');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Add Product to Google Sheets';
            }
        }
        
        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product from Excel?')) return;
            
            try {
                const response = await fetch(`${CONFIG.API_URL}?action=deleteProduct&id=${id}`);
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ Product deleted from Excel');
                    loadProducts(); // Live refresh
                } else {
                    alert('Error deleting product');
                }
            } catch (error) {
                alert('Error deleting product');
            }
        }
        
        function editProduct(id) {
            alert('Edit functionality - would open edit form');
            // In production, open a modal with product details
        }
        
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        }
        
        // Auto-refresh every 30 seconds
        setInterval(loadProducts, 30000);
    </script>
</body>
</html>
