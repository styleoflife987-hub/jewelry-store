<!-- Add this before closing </body> tag -->
<script>
// Cloud sync functions
async function loadFromCloud() {
    try {
        const response = await fetch(`${CONFIG.API_URL}?action=getProducts&t=${Date.now()}`);
        const cloudProducts = await response.json();
        
        if (Array.isArray(cloudProducts)) {
            localStorage.setItem('products', JSON.stringify(cloudProducts));
            loadProducts(); // Reload display
            showNotification(`✅ Loaded ${cloudProducts.length} products from cloud`);
        }
    } catch (error) {
        console.error('Cloud load failed:', error);
        showNotification('⚠️ Using local data');
    }
}

async function saveToCloud() {
    const products = JSON.parse(localStorage.getItem('products') || '[]');
    
    try {
        const response = await fetch(`${CONFIG.API_URL}?action=saveProducts`, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: new URLSearchParams({
                products: JSON.stringify(products)
            })
        });
        
        showNotification('✅ Products saved to cloud');
    } catch (error) {
        console.error('Cloud save failed:', error);
        showNotification('⚠️ Failed to save to cloud');
    }
}

function showNotification(message) {
    const notification = document.createElement('div');
    notification.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        background: #d4af37;
        color: black;
        padding: 15px 25px;
        border-radius: 8px;
        z-index: 9999;
        animation: slideIn 0.3s;
    `;
    notification.textContent = message;
    document.body.appendChild(notification);
    
    setTimeout(() => notification.remove(), 3000);
}

// Add cloud buttons to toolbar
document.addEventListener('DOMContentLoaded', function() {
    const toolbar = document.querySelector('.excel-toolbar');
    if (toolbar) {
        const cloudDiv = document.createElement('div');
        cloudDiv.style.marginLeft = 'auto';
        cloudDiv.innerHTML = `
            <button onclick="loadFromCloud()" style="background: #2196f3; margin-right: 5px;">📥 Load from Cloud</button>
            <button onclick="saveToCloud()" style="background: #4CAF50;">☁️ Save to Cloud</button>
        `;
        toolbar.appendChild(cloudDiv);
    }
    
    // Auto-load from cloud on page load
    loadFromCloud();
});

// Auto-save after any change
const originalUpdateField = window.updateField;
window.updateField = function(rowId, field, value) {
    if (originalUpdateField) originalUpdateField(rowId, field, value);
    saveToCloud();
};

const originalUpdateImageUrl = window.updateImageUrl;
window.updateImageUrl = function(rowId, slot, url) {
    if (originalUpdateImageUrl) originalUpdateImageUrl(rowId, slot, url);
    saveToCloud();
};

const originalDeleteProduct = window.deleteProduct;
window.deleteProduct = function(rowId) {
    if (originalDeleteProduct) originalDeleteProduct(rowId);
    saveToCloud();
};

const originalAddNewProduct = window.addNewProduct;
window.addNewProduct = function() {
    if (originalAddNewProduct) originalAddNewProduct();
    saveToCloud();
};
</script>
