<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">✨ STYLE OF LIFE</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="cart.html">Cart <span class="cart-count" id="cartCount">0</span></a>
        </nav>
    </header>

    <div class="login-container">
        <div class="login-box">
            <h2>Admin Login</h2>
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            
            <button onclick="login()" class="login-btn">Login</button>
            
            <p class="login-hint">
                Default: admin / 1234
            </p>
        </div>
    </div>

    <footer>
        <p>© 2026 Style Of Life Jewelry</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    
    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === 'admin' && password === '1234') {
                sessionStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'admin.html';
            } else {
                alert('Invalid credentials! Use admin/1234');
            }
        }
    </script>
</body>
</html>
