<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">STYLE OF LIFE</div>
        <nav>
            <a href="index.html">Home</a>
        </nav>
    </header>

    <div style="max-width:400px; margin:100px auto; padding:40px; background:#1a1a1a; border-radius:15px">
        <h2 style="color:#d4af37; text-align:center; margin-bottom:30px">Admin Login</h2>
        
        <div class="admin-input">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>
        
        <div class="admin-input">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        
        <button onclick="login()">Login</button>
        
        <p style="text-align:center; margin-top:20px; color:#888; font-size:14px">
            Default: admin / 1234
        </p>
    </div>

    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Simple authentication (change in production)
            if (username === 'admin' && password === '1234') {
                sessionStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'admin.html';
            } else {
                alert('Invalid credentials');
            }
        }
    </script>
</body>
</html>
