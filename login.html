<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin">
    <div class="admin-login-container">
        <div class="admin-login-card">
            <h2>ADMIN LOGIN</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" class="admin-input">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="admin-input">
            </div>
            <button class="admin-btn admin-btn-primary" style="width: 100%;" onclick="login()">Login</button>
            <p style="text-align: center; margin-top: 20px; color: var(--gray-600);">Default: admin / 1234</p>
        </div>
    </div>

    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === 'admin' && password === '1234') {
                sessionStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'admin.html';
            } else {
                alert('Invalid credentials');
            }
        }
    </script>
</body>
</html>
