<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Track Order - Style Of Life | Order Status & Tracking</title>
    <meta name="description" content="Track your Style Of Life jewelry order status. Enter your order ID to view shipping status, delivery updates, and order details.">
    <meta name="robots" content="noindex, follow">
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --gold: #E8C47E; --gold-dark: #D4AF37; --gold-light: #F5E6C6; --charcoal: #2C2C2C; --dark: #1A1A1A; --light: #FFFFFF; --cream: #FAF7F2; --danger: #dc3545; --success: #28a745; --info: #17a2b8; --warning: #ffc107; }
        body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--charcoal); }
        
        .logo { display: inline-flex; align-items: center; justify-content: center; position: relative; }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; letter-spacing: 3px; background: linear-gradient(135deg, #C9A87C 0%, #E8C47E 50%, #D4AF37 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo-line { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 40px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), var(--gold-dark), var(--gold), transparent); transition: width 0.4s ease; }
        .logo-line-bottom { position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); width: 40px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), var(--gold-dark), var(--gold), transparent); transition: width 0.4s ease; }
        .logo:hover .logo-line, .logo:hover .logo-line-bottom { width: 80px; }
        .logo-container { display: flex; align-items: center; background: rgba(255,255,255,0.95); padding: 8px 28px; border-radius: 50px; backdrop-filter: blur(8px); border: 1px solid rgba(212,175,55,0.15); }
        
        header { background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); padding: 18px 60px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(232,196,126,0.2); }
        nav { display: flex; gap: 45px; align-items: center; }
        nav a { color: var(--charcoal); text-decoration: none; font-weight: 500; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; transition: all 0.3s; position: relative; }
        nav a::before { content: ''; position: absolute; bottom: -8px; left: 0; width: 0; height: 2px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); transition: width 0.4s ease; }
        nav a:hover::before, nav a.active::before { width: 100%; }
        nav a:hover, nav a.active { color: var(--gold-dark); }
        .cart-count { background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: var(--dark); padding: 2px 8px; border-radius: 30px; font-size: 11px; font-weight: 700; margin-left: 8px; }
        
        .track-container { max-width: 700px; margin: 80px auto; padding: 0 20px; }
        .track-card { background: white; border-radius: 32px; padding: 40px; border: 1px solid rgba(212,175,55,0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .track-title { text-align: center; margin-bottom: 30px; }
        .track-title h1 { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--gold-dark); margin-bottom: 10px; }
        .track-title p { color: #888; font-size: 14px; }
        
        .track-form { display: flex; gap: 12px; margin-bottom: 30px; }
        .track-input { flex: 1; padding: 16px 20px; border: 1px solid #ddd; border-radius: 50px; font-size: 16px; font-family: 'Inter', sans-serif; transition: all 0.3s; }
        .track-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,175,55,0.1); }
        .track-btn { padding: 16px 35px; background: linear-gradient(135deg, #D4AF37, #E8C47E); border: none; border-radius: 50px; color: #1A1A1A; font-weight: 600; cursor: pointer; transition: all 0.3s; font-size: 14px; }
        .track-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212,175,55,0.3); }
        
        .order-details { background: #f9f9f9; border-radius: 24px; padding: 25px; margin-top: 20px; border: 1px solid #efefef; }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #efefef; }
        .order-id { font-weight: 700; font-size: 18px; color: var(--gold-dark); }
        .order-status { display: inline-block; padding: 5px 15px; border-radius: 30px; font-size: 12px; font-weight: 600; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-processing { background: #d1ecf1; color: #0c5460; }
        .status-shipped { background: #d4edda; color: #155724; }
        .status-delivered { background: #c3e6cb; color: #155724; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        
        .order-info { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
        .info-item { background: white; padding: 12px 15px; border-radius: 12px; border: 1px solid #efefef; }
        .info-label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .info-value { font-weight: 600; font-size: 14px; }
        
        .items-list { margin-top: 20px; padding-top: 15px; border-top: 1px solid #efefef; }
        .items-title { font-weight: 600; margin-bottom: 15px; font-size: 14px; text-transform: uppercase; color: #888; }
        .track-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #efefef; }
        .track-item:last-child { border-bottom: none; }
        
        .track-timeline { margin-top: 25px; padding-top: 20px; border-top: 1px solid #efefef; }
        .timeline-steps { display: flex; justify-content: space-between; margin-top: 15px; }
        .timeline-step { text-align: center; flex: 1; position: relative; }
        .timeline-step .step-dot { width: 12px; height: 12px; background: #ddd; border-radius: 50%; margin: 0 auto 10px; }
        .timeline-step.active .step-dot { background: var(--success); box-shadow: 0 0 0 3px rgba(40,167,69,0.2); }
        .timeline-step.completed .step-dot { background: var(--success); }
        .timeline-step .step-label { font-size: 11px; color: #888; }
        .timeline-step.active .step-label { color: var(--success); font-weight: 500; }
        
        .not-found { text-align: center; padding: 40px; color: #888; }
        
        footer { background: #1A1A1A; color: #aaa; text-align: center; padding: 40px; margin-top: 60px; }
        
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 12px; padding: 15px 20px; }
            .track-card { padding: 25px; }
            .track-form { flex-direction: column; }
            .track-btn { width: 100%; }
            .order-info { grid-template-columns: 1fr; }
            .timeline-steps { flex-direction: column; gap: 15px; }
            .timeline-step { display: flex; align-items: center; gap: 15px; text-align: left; }
            .timeline-step .step-dot { margin: 0; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <div class="logo">
                <div class="logo-line"></div>
                <div class="logo-text">STYLE<span>·</span>OF<span>·</span>LIFE</div>
                <div class="logo-line-bottom"></div>
            </div>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="cart.html">Cart <span class="cart-count" id="cartCount">0</span></a>
            <a href="track.html" class="active">Track Order</a>
        </nav>
    </header>

    <div class="track-container">
        <div class="track-card">
            <div class="track-title">
                <h1>Track Your Order</h1>
                <p>Enter your order ID to check the current status</p>
            </div>
            <div class="track-form">
                <input type="text" id="orderId" class="track-input" placeholder="Enter Order ID (e.g., ORD1234567890)">
                <button class="track-btn" onclick="trackOrder()">Track Order</button>
            </div>
            <div id="trackResult"></div>
        </div>
    </div>

    <footer>
        <p>© 2026 STYLE OF LIFE. All rights reserved. | Luxury Jewelry Since 2020</p>
    </footer>

    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        
        async function trackOrder() {
            const orderId = document.getElementById('orderId').value.trim();
            if (!orderId) {
                alert('Please enter your Order ID');
                return;
            }
            
            const resultDiv = document.getElementById('trackResult');
            resultDiv.innerHTML = '<div style="text-align:center; padding:40px;"><div style="width:40px; height:40px; border:2px solid #efefef; border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 20px;"></div><p>Searching for your order...</p></div>';
            
            try {
                const { data, error } = await supabase
                    .from('orders')
                    .select('*')
                    .eq('order_id', orderId)
                    .maybeSingle();
                
                if (error || !data) {
                    resultDiv.innerHTML = `<div class="not-found"><p style="color: var(--danger);">❌ Order not found</p><p style="color:#888; margin-top:10px;">Please check your Order ID and try again.</p></div>`;
                    return;
                }
                
                displayOrderDetails(data);
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `<div class="not-found"><p style="color: var(--danger);">❌ Error tracking order</p><p style="color:#888; margin-top:10px;">Please try again later.</p></div>`;
            }
        }
        
        function displayOrderDetails(order) {
            const resultDiv = document.getElementById('trackResult');
            
            let itemsHtml = '';
            order.items.forEach(item => {
                itemsHtml += `
                    <div class="track-item">
                        <span>${item.name} <span style="color:#888;">x${item.quantity}</span></span>
                        <span style="color: var(--gold-dark); font-weight: 600;">₹${(item.price * item.quantity).toLocaleString('en-IN')}</span>
                    </div>
                `;
            });
            
            const statusClass = `status-${order.status?.toLowerCase()}`;
            const statusColors = {
                'Pending': '#ffc107',
                'Processing': '#17a2b8',
                'Shipped': '#28a745',
                'Delivered': '#20c997',
                'Cancelled': '#dc3545'
            };
            
            // Determine timeline steps based on status
            const steps = ['Order Placed', 'Processing', 'Shipped', 'Delivered'];
            let currentStep = 0;
            if (order.status === 'Processing') currentStep = 1;
            else if (order.status === 'Shipped') currentStep = 2;
            else if (order.status === 'Delivered') currentStep = 3;
            
            let timelineHtml = '<div class="timeline-steps">';
            steps.forEach((step, index) => {
                const isActive = index <= currentStep;
                timelineHtml += `
                    <div class="timeline-step ${isActive ? 'completed' : ''} ${index === currentStep ? 'active' : ''}">
                        <div class="step-dot"></div>
                        <div class="step-label">${step}</div>
                    </div>
                `;
            });
            timelineHtml += '</div>';
            
            resultDiv.innerHTML = `
                <div class="order-details">
                    <div class="order-header">
                        <span class="order-id">${order.order_id}</span>
                        <span class="order-status ${statusClass}">${order.status}</span>
                    </div>
                    
                    <div class="order-info">
                        <div class="info-item">
                            <div class="info-label">Customer Name</div>
                            <div class="info-value">${order.customer_name}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Phone Number</div>
                            <div class="info-value">${order.phone}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Email</div>
                            <div class="info-value">${order.email || 'Not provided'}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Order Date</div>
                            <div class="info-value">${new Date(order.created_at).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' })}</div>
                        </div>
                        <div class="info-item" style="grid-column: span 2;">
                            <div class="info-label">Shipping Address</div>
                            <div class="info-value">${order.address}</div>
                        </div>
                    </div>
                    
                    <div class="items-list">
                        <div class="items-title">Order Items (${order.items.length})</div>
                        ${itemsHtml}
                    </div>
                    
                    <div class="track-timeline">
                        <div class="items-title">Order Timeline</div>
                        ${timelineHtml}
                    </div>
                    
                    <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #efefef;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-weight: 600;">Order Total</span>
                            <span style="font-size: 24px; font-weight: 700; color: var(--gold-dark);">₹${order.total.toLocaleString('en-IN')}</span>
                        </div>
                        <div style="display: flex; gap: 15px; margin-top: 15px; font-size: 12px; color: #888;">
                            <span>Subtotal: ₹${order.subtotal?.toLocaleString() || 0}</span>
                            <span>Tax: ₹${order.tax?.toLocaleString() || 0}</span>
                            <span>Shipping: ₹${order.shipping?.toLocaleString() || 0}</span>
                        </div>
                    </div>
                    
                    <div style="margin-top: 20px; padding: 12px; background: #f5f5f5; border-radius: 12px; text-align: center;">
                        <p style="font-size: 12px; color: #888;">Need help? Contact us at <strong style="color: var(--gold-dark);">support@styleoflife.com</strong> or call <strong style="color: var(--gold-dark);">+91-98765-43210</strong></p>
                    </div>
                </div>
            `;
        }
        
        window.trackOrder = trackOrder;
        
        // Check URL for order ID on page load
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order');
        if (orderId) {
            document.getElementById('orderId').value = orderId;
            trackOrder();
        }
        
        // Also load cart count
        let sessionId = localStorage.getItem('sessionId');
        if (!sessionId) {
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('sessionId', sessionId);
        }
        
        async function loadCartCount() {
            const { data } = await supabase.from('carts').select('items').eq('session_id', sessionId).maybeSingle();
            const cart = data?.items || [];
            const count = cart.reduce((t, i) => t + i.quantity, 0);
            document.getElementById('cartCount').textContent = count;
        }
        loadCartCount();
    </script>
    
    <!-- Analytics Tracking -->
    <script src="js/analytics.js"></script>
</body>
</html>
