<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
</head>
<body>
    <header>
        <div class="logo">✨ STYLE OF LIFE</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="cart.html">Cart <span class="cart-count">0</span></a>
            <a href="track.html" class="active">Track Order</a>
        </nav>
    </header>

    <div class="container">
        <div class="track-container">
            <h1 class="page-title">Track Your Order</h1>
            
            <div class="track-form">
                <input type="text" id="orderId" placeholder="Enter Order ID (e.g., ORD1234567890)" class="track-input">
                <button onclick="trackOrder()" class="track-btn">Track Order</button>
            </div>
            
            <div id="trackingResult" class="tracking-result"></div>
        </div>
    </div>

    <footer>
        <p>© 2026 Style Of Life Jewelry</p>
    </footer>

    <script>
        async function trackOrder() {
            const orderId = document.getElementById('orderId').value.trim();
            if (!orderId) {
                alert('Please enter order ID');
                return;
            }
            
            const resultDiv = document.getElementById('trackingResult');
            resultDiv.innerHTML = '<p>Tracking your order...</p>';
            
            // First check Excel
            try {
                const response = await fetch(`${CONFIG.API_URL}?action=track&id=${orderId}`);
                const data = await response.json();
                
                if (data && !data.error) {
                    displayOrder(data);
                    return;
                }
            } catch (error) {
                console.log('Excel tracking failed, checking local...');
            }
            
            // Then check local storage
            const localOrders = JSON.parse(localStorage.getItem('orders') || '[]');
            const localOrder = localOrders.find(o => o.orderId === orderId);
            
            if (localOrder) {
                displayOrder(localOrder);
            } else {
                resultDiv.innerHTML = '<p style="color: #f44336;">Order not found</p>';
            }
        }
        
        function displayOrder(order) {
            const resultDiv = document.getElementById('trackingResult');
            
            const statusColors = {
                'Pending': '#ff9800',
                'Processing': '#2196f3',
                'Shipped': '#9c27b0',
                'Delivered': '#4caf50',
                'Cancelled': '#f44336'
            };
            
            let itemsHtml = '';
            if (order.items && order.items.length > 0) {
                itemsHtml = '<h4>Items:</h4>';
                order.items.forEach(item => {
                    itemsHtml += `
                        <div style="display: flex; justify-content: space-between; padding: 5px 0;">
                            <span>${item.name} x${item.quantity}</span>
                            <span>₹${(item.price * item.quantity).toLocaleString()}</span>
                        </div>
                    `;
                });
            }
            
            resultDiv.innerHTML = `
                <div style="background: #1a1a1a; padding: 20px; border-radius: 10px;">
                    <h3 style="color: #d4af37; margin-bottom: 15px;">Order Details</h3>
                    <p><strong>Order ID:</strong> ${order.orderId}</p>
                    <p><strong>Customer:</strong> ${order.name}</p>
                    <p><strong>Phone:</strong> ${order.phone}</p>
                    <p><strong>Address:</strong> ${order.address}</p>
                    <p><strong>Status:</strong> <span style="color: ${statusColors[order.status] || '#d4af37'}; font-weight: bold;">${order.status || 'Pending'}</span></p>
                    <p><strong>Total:</strong> ₹${(order.total || 0).toLocaleString()}</p>
                    <p><strong>Date:</strong> ${new Date(order.date).toLocaleDateString()}</p>
                    ${itemsHtml}
                </div>
            `;
        }
        
        // Check URL for order ID
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order');
        if (orderId) {
            document.getElementById('orderId').value = orderId;
            trackOrder();
        }
    </script>
</body>
</html>
