<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
</head>
<body>
    <header>
        <div class="logo">STYLE OF LIFE</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="cart.html">Cart <span class="cart-count">0</span></a>
            <a href="track.html">Track Order</a>
            <a href="login.html">Admin</a>
        </nav>
    </header>

    <div style="max-width:500px; margin:100px auto; padding:40px; background:#1a1a1a; border-radius:15px; text-align:center">
        <h2 style="color:#d4af37; margin-bottom:20px">Track Your Order</h2>
        <input type="text" id="orderId" placeholder="Enter Order ID (e.g., ORD1234567890)" 
               style="width:100%; padding:12px; background:#333; border:1px solid #444; border-radius:6px; color:white; margin-bottom:15px">
        <button onclick="trackOrder()" style="padding:12px">Track Order</button>
        
        <div id="trackingResult" style="margin-top:30px"></div>
    </div>

    <footer>
        © 2026 Style Of Life Jewelry
    </footer>

    <script>
        async function trackOrder() {
            const orderId = document.getElementById('orderId').value.trim();
            if (!orderId) {
                alert('Please enter order ID');
                return;
            }
            
            const resultDiv = document.getElementById('trackingResult');
            resultDiv.innerHTML = '<p>Tracking...</p>';
            
            try {
                const response = await fetch(`${CONFIG.API_URL}?action=track&id=${orderId}`);
                const data = await response.json();
                
                if (data.error) {
                    resultDiv.innerHTML = `<p style="color:#f44336">Order not found</p>`;
                } else {
                    let itemsHtml = '';
                    if (data.items && data.items.length > 0) {
                        itemsHtml = '<div style="margin:15px 0; text-align:left"><h4 style="color:#d4af37; margin-bottom:10px">Items:</h4>';
                        data.items.forEach(item => {
                            itemsHtml += `<p>${item.name} x${item.quantity || 1} - ₹${Number(item.price).toLocaleString('en-IN')}</p>`;
                        });
                        itemsHtml += '</div>';
                    }
                    
                    const statusColors = {
                        'Pending': '#ff9800',
                        'Processing': '#2196f3',
                        'Shipped': '#9c27b0',
                        'Delivered': '#4caf50',
                        'Cancelled': '#f44336'
                    };
                    
                    resultDiv.innerHTML = `
                        <div style="background:#222; padding:20px; border-radius:10px; text-align:left">
                            <p><strong>Order ID:</strong> ${data.orderId}</p>
                            <p><strong>Customer:</strong> ${data.name}</p>
                            <p><strong>Status:</strong> <span style="color: ${statusColors[data.status] || '#d4af37'}; font-weight: bold;">${data.status}</span></p>
                            <p><strong>Total:</strong> ₹${Number(data.total).toLocaleString('en-IN')}</p>
                            <p><strong>Date:</strong> ${new Date(data.date).toLocaleDateString()}</p>
                            ${itemsHtml}
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p style="color:#f44336">Error tracking order: ${error.message}</p>`;
            }
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order');
        if (orderId) {
            document.getElementById('orderId').value = orderId;
            trackOrder();
        }
    </script>
</body>
</html>
