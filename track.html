<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">✨ STYLE OF LIFE</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="cart.html">Cart <span class="cart-count" id="cartCount">0</span></a>
            <a href="track.html" class="active">Track Order</a>
        </nav>
    </header>

    <div class="container">
        <div class="track-container">
            <h1 class="page-title">Track Your Order</h1>
            <div class="track-form">
                <input type="text" id="orderId" placeholder="Enter Order ID" class="track-input">
                <button onclick="trackOrder()" class="track-btn">Track</button>
            </div>
            <div id="trackingResult" class="tracking-result"></div>
        </div>
    </div>

    <footer>
        <p>© 2026 Style Of Life Jewelry</p>
    </footer>

    <script>
        function trackOrder() {
            const orderId = document.getElementById('orderId').value.trim();
            if (!orderId) return alert('Enter order ID');
            
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const order = orders.find(o => o.orderId === orderId);
            
            const resultDiv = document.getElementById('trackingResult');
            
            if (order) {
                let itemsHtml = '';
                order.items.forEach(item => {
                    itemsHtml += `<div>${item.name} x${item.quantity} - ₹${item.price * item.quantity}</div>`;
                });
                
                resultDiv.innerHTML = `
                    <h3>Order Found</h3>
                    <p>ID: ${order.orderId}</p>
                    <p>Customer: ${order.name}</p>
                    <p>Status: ${order.status}</p>
                    <p>Total: ₹${order.total}</p>
                    <h4>Items:</h4>
                    ${itemsHtml}
                `;
            } else {
                resultDiv.innerHTML = '<p>Order not found</p>';
            }
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order');
        if (orderId) {
            document.getElementById('orderId').value = orderId;
            trackOrder();
        }
    </script>
</body>
</html>
