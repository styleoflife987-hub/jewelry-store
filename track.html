<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .order-details { background: white; border-radius: 12px; padding: 20px; margin-top: 20px; text-align: left; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-pending { background: #ffc107; color: #856404; }
        .status-processing { background: #17a2b8; color: white; }
        .status-shipped { background: #28a745; color: white; }
        .status-delivered { background: #20c997; color: white; }
        .status-cancelled { background: #dc3545; color: white; }
    </style>
</head>
<body class="customer">
    <header class="customer-header">
        <div class="customer-logo">STYLE OF LIFE</div>
        <nav class="customer-nav">
            <a href="index.html">Home</a>
            <a href="cart.html">Cart <span class="cart-count" id="cartCount">0</span></a>
            <a href="track.html" class="active">Track Order</a>
        </nav>
    </header>

    <div class="track-container">
        <h1 style="color: var(--primary); margin-bottom: 20px;">Track Your Order</h1>
        <div class="track-form">
            <input type="text" id="orderId" class="track-input" placeholder="Enter Order ID (e.g., ORD1234567890)">
            <button class="track-btn" onclick="trackOrder()">Track</button>
        </div>
        <div id="trackingResult"></div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        async function trackOrder() {
            const orderId = document.getElementById('orderId').value.trim();
            if (!orderId) return alert('Enter order ID');
            
            const resultDiv = document.getElementById('trackingResult');
            resultDiv.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><p>Searching...</p></div>';
            
            const orders = await getOrders();
            const order = orders.find(o => o.orderId === orderId);
            
            if (!order) {
                resultDiv.innerHTML = '<p style="color: var(--danger);">Order not found</p>';
                return;
            }
            
            let itemsHtml = '';
            order.items.forEach(i => {
                itemsHtml += `<div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #e9ecef;"><span>${i.name} x${i.quantity}</span><span>₹${(i.price * i.quantity).toLocaleString()}</span></div>`;
            });
            
            resultDiv.innerHTML = `
                <div class="order-details">
                    <h3 style="color: var(--primary);">Order Found</h3>
                    <p><strong>Order ID:</strong> ${order.orderId}</p>
                    <p><strong>Customer:</strong> ${order.name}</p>
                    <p><strong>Phone:</strong> ${order.phone}</p>
                    <p><strong>Address:</strong> ${order.address}</p>
                    <p><strong>Status:</strong> <span class="status-badge status-${order.status.toLowerCase()}">${order.status}</span></p>
                    <p><strong>Date:</strong> ${new Date(order.date).toLocaleString()}</p>
                    <h4 style="margin:15px 0 10px;">Items:</h4>
                    ${itemsHtml}
                    <div style="margin-top:15px; padding-top:10px; border-top:2px solid #e9ecef;">
                        <p><strong>Total:</strong> ₹${order.total.toLocaleString()}</p>
                    </div>
                </div>`;
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order');
        if (orderId) {
            document.getElementById('orderId').value = orderId;
            trackOrder();
        }
    </script>
</body>
</html>
