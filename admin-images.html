<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
    <script src="js/image-map.js"></script>
</head>
<body>
    <header>
        <div class="logo">STYLE OF LIFE - IMAGE MANAGER</div>
    </header>
    
    <div style="padding: 40px">
        <h2>Manage Product Images by SKU</h2>
        
        <div class="sku-manager">
            <h3>Add Image to SKU</h3>
            <input id="skuInput" placeholder="Enter SKU (e.g., SKU001)">
            <input id="fileIdInput" placeholder="Google Drive File ID">
            <select id="imageType">
                <option value="main">Main Image</option>
                <option value="gallery">Gallery Image</option>
            </select>
            <button onclick="addImageToSku()">Add Image</button>
        </div>
        
        <div id="skuList" class="sku-list">
            <!-- SKU list will appear here -->
        </div>
    </div>
    
    <script>
        function addImageToSku() {
            const sku = document.getElementById('skuInput').value;
            const fileId = document.getElementById('fileIdInput').value;
            const type = document.getElementById('imageType').value;
            
            // In real implementation, save to Google Sheets
            alert(`Added image to ${sku}`);
            
            // Update display
            displaySkuImages();
        }
        
        function displaySkuImages() {
            const container = document.getElementById('skuList');
            let html = '<h3>Current SKU Images</h3>';
            
            for(let sku in IMAGE_CONFIG.skuToGallery) {
                html += `
                    <div class="sku-item">
                        <h4>${sku}</h4>
                        <div class="sku-images">
                            ${IMAGE_CONFIG.skuToGallery[sku].map(fileId => `
                                <img src="${IMAGE_CONFIG.BASE_URL + fileId}" 
                                     class="thumbnail"
                                     onclick="copyFileId('${fileId}')">
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }
        
        function copyFileId(fileId) {
            navigator.clipboard.writeText(fileId);
            alert('File ID copied: ' + fileId);
        }
        
        // Display on load
        displaySkuImages();
    </script>
</body>
</html>
