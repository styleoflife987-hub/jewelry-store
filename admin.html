<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Of Life · Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #1a2634;
            color: white;
        }

        .admin-header {
            background: #0f1722;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #f39c12;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            background: #f39c12;
            color: #0f1722;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a2634;
            padding: 8px 20px;
            border-radius: 30px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #27ae60;
        }

        .status-dot.disconnected {
            background: #e74c3c;
        }

        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 40px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #0f1722;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #2c3e50;
        }

        .stat-icon {
            color: #f39c12;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .stat-info h3 {
            color: #95a5a6;
            font-size: 0.9rem;
            font-weight: 400;
        }

        .stat-info span {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: #0f1722;
            padding: 10px;
            border-radius: 10px;
        }

        .tab-btn {
            padding: 10px 25px;
            background: transparent;
            border: none;
            color: #95a5a6;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: #f39c12;
            color: #0f1722;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .admin-controls {
            background: #0f1722;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-success { background: #27ae60; color: white; }
        .btn-info { background: #3498db; color: white; }
        .btn-warning { background: #f1c40f; color: #0f1722; }

        .table-wrapper {
            background: #0f1722;
            border-radius: 15px;
            padding: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }

        th {
            background: #1a2634;
            color: #f39c12;
            padding: 15px;
            text-align: left;
            border-bottom: 2px solid #f39c12;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #2c3e50;
        }

        input, select {
            width: 100%;
            padding: 8px;
            background: #1a2634;
            border: 1px solid #2c3e50;
            border-radius: 5px;
            color: white;
        }

        .image-preview {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .preview-img {
            width: 50px;
            height: 50px;
            border-radius: 5px;
            object-fit: cover;
            cursor: pointer;
        }

        .upload-btn {
            background: #1a2634;
            border: 2px dashed #f39c12;
            border-radius: 5px;
            padding: 8px;
            color: #f39c12;
            cursor: pointer;
            text-align: center;
            font-size: 0.9rem;
        }

        .action-btn {
            background: #1a2634;
            border: 1px solid #2c3e50;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 2px;
        }

        .action-btn.delete:hover { background: #e74c3c; }

        .footer {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
            border-top: 1px solid #2c3e50;
            margin-top: 40px;
        }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: #0f1722;
            border-radius: 15px;
            padding: 30px;
            z-index: 2000;
            transition: 0.3s;
            border: 2px solid #f39c12;
        }

        .modal.show { transform: translate(-50%, -50%) scale(1); }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1999;
            display: none;
        }
        .modal-overlay.show { display: block; }
    </style>
</head>
<body>
    <header class="admin-header">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-crown"></i></div>
            <h1>Style Of Life · Admin</h1>
        </div>
        <div class="connection-status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Connecting...</span>
        </div>
    </header>

    <div class="container">
        <div class="stats-grid" id="stats">
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-box"></i></div><div class="stat-info"><h3>Products</h3><span id="totalProducts">0</span></div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-tags"></i></div><div class="stat-info"><h3>Categories</h3><span id="totalCategories">0</span></div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-shopping-cart"></i></div><div class="stat-info"><h3>Orders</h3><span id="totalOrders">0</span></div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-rupee-sign"></i></div><div class="stat-info"><h3>Revenue</h3><span id="totalRevenue">₹0</span></div></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('products')"><i class="fas fa-box"></i> Products</button>
            <button class="tab-btn" onclick="switchTab('orders')"><i class="fas fa-shopping-cart"></i> Orders</button>
        </div>

        <!-- Products Tab -->
        <div id="productsTab" class="tab-content active">
            <div class="admin-controls">
                <button class="btn btn-success" onclick="addProduct()"><i class="fas fa-plus"></i> Add Product</button>
                <button class="btn btn-info" onclick="loadProducts()"><i class="fas fa-sync"></i> Refresh</button>
                <button class="btn btn-warning" onclick="runSetup()"><i class="fas fa-cog"></i> Run Setup</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Images</th><th>Actions</th></tr></thead>
                    <tbody id="productsTable"></tbody>
                </table>
            </div>
        </div>

        <!-- Orders Tab -->
        <div id="ordersTab" class="tab-content">
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Order ID</th><th>Date</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody id="ordersTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeImageModal()"></div>
    <div class="modal" id="imageModal"><img id="modalImage" src="" style="max-width:100%;"><button class="action-btn" onclick="closeImageModal()" style="position:absolute; top:10px; right:10px;">×</button></div>

    <footer class="footer"><p>Style Of Life · Google Drive Integration</p></footer>

    <script>
        // ==================== CONFIGURATION ====================
        // REPLACE WITH YOUR ACTUAL GOOGLE APPS SCRIPT URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz6_of-vLu6MN4QDTH2EDJWCLfDjT7kls04iyo7XvF6kn3sVyo2SXN2zdQfhT-xCbIJaA/exec';
        
        let products = [], orders = [];

        // ==================== SIMPLE API CALL ====================
        async function apiCall(action, data = {}) {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ action, ...data })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                
                // Update connection status
                document.getElementById('statusDot').classList.remove('disconnected');
                document.getElementById('statusText').textContent = 'Connected';
                
                return result;
            } catch (error) {
                console.error('API Error:', error);
                document.getElementById('statusDot').classList.add('disconnected');
                document.getElementById('statusText').textContent = 'Disconnected';
                return null;
            }
        }

        // ==================== RUN SETUP ====================
        async function runSetup() {
            const result = await apiCall('setup');
            if (result && result.success) {
                alert('Setup completed successfully!');
                loadStats();
                loadProducts();
            } else {
                alert('Setup failed. Check console for errors.');
            }
        }

        // ==================== LOAD FUNCTIONS ====================
        async function loadStats() {
            const data = await apiCall('getDashboardStats');
            if (data?.stats) {
                document.getElementById('totalProducts').textContent = data.stats.totalProducts || 0;
                document.getElementById('totalCategories').textContent = data.stats.totalCategories || 0;
                document.getElementById('totalOrders').textContent = data.stats.totalOrders || 0;
                document.getElementById('totalRevenue').textContent = '₹' + (data.stats.totalRevenue || 0);
            }
        }

        async function loadProducts() {
            const data = await apiCall('getProducts');
            if (Array.isArray(data)) {
                products = data;
                renderProducts();
            }
        }

        function renderProducts() {
            const tbody = document.getElementById('productsTable');
            if (!products.length) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No products yet. Click "Add Product" to create one.</td></tr>';
                return;
            }
            
            let html = '';
            products.forEach((p, i) => {
                let imagesHtml = '<div class="image-preview">';
                if (p.images?.length) {
                    p.images.forEach(img => imagesHtml += `<img class="preview-img" src="${img.url}" onclick="openImageModal('${img.url}')">`);
                }
                imagesHtml += '</div>';
                
                html += `<tr>
                    <td>${p.id}</td>
                    <td>${p.name}</td>
                    <td>${p.category}</td>
                    <td>₹${p.price}</td>
                    <td>${p.stock}</td>
                    <td>${imagesHtml}</td>
                    <td><button class="action-btn delete" onclick="deleteProduct('${p.id}')">🗑️</button></td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        async function loadOrders() {
            const data = await apiCall('getOrders');
            if (Array.isArray(data)) {
                orders = data;
                renderOrders();
            }
        }

        function renderOrders() {
            const tbody = document.getElementById('ordersTable');
            if (!orders.length) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No orders yet</td></tr>';
                return;
            }
            
            let html = '';
            orders.slice().reverse().forEach(o => {
                html += `<tr>
                    <td>${o.id}</td>
                    <td>${new Date(o.date).toLocaleDateString()}</td>
                    <td>${o.customer}<br><small>${o.email}</small></td>
                    <td>${o.items.map(i => `${i.name} x${i.quantity}`).join(', ')}</td>
                    <td>₹${o.total}</td>
                    <td>${o.status}</td>
                    <td><button class="action-btn delete" onclick="deleteOrder('${o.id}')">🗑️</button></td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        // ==================== PRODUCT ACTIONS ====================
        async function addProduct() {
            // For now, just show an alert since we need full saveProduct implementation
            alert('Add product functionality - You need to implement saveProduct in Apps Script first');
        }

        async function deleteProduct(id) {
            if (confirm('Delete this product?')) {
                alert('Delete functionality - You need to implement deleteProduct in Apps Script first');
            }
        }

        async function deleteOrder(id) {
            if (confirm('Delete this order?')) {
                alert('Delete functionality - You need to implement deleteOrder in Apps Script first');
            }
        }

        // ==================== IMAGE FUNCTIONS ====================
        function openImageModal(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').classList.add('show');
            document.getElementById('modalOverlay').classList.add('show');
        }
        
        function closeImageModal() {
            document.getElementById('imageModal').classList.remove('show');
            document.getElementById('modalOverlay').classList.remove('show');
        }

        // ==================== TAB SWITCHING ====================
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            if (tab === 'products') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('productsTab').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('ordersTab').classList.add('active');
                loadOrders();
            }
        }

        // ==================== INITIALIZATION ====================
        window.onload = () => { 
            loadStats(); 
            loadProducts(); 
            setInterval(() => { 
                loadStats(); 
                loadProducts(); 
            }, 30000); 
        };
    </script>
</body>
</html>
