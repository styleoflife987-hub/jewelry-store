<!DOCTYPE html>
<html>

<body>

<h2>Orders</h2>

<button onclick="load()">Load Orders</button>

<pre id="orders"></pre>

<script>

const API="https://script.google.com/macros/s/AKfycbxovON-ZuRQ_zILbaDl739-c7XdVF7-PVZTPoq15dctzK3n9OqaV6ztPsDjayOYPY8v6Q/exec";

function load(){

fetch(API+"?action=orders")
.then(r=>r.json())
.then(data=>{

document.getElementById("orders").innerText=
JSON.stringify(data,null,2);

});

}

</script>

</body>
</html>
