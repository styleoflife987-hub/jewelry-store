<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin">
    <header class="admin-header">
        <div class="admin-logo">STYLE OF LIFE <span>ADMIN</span></div>
        <nav class="admin-nav">
            <a href="admin.html" class="active">Dashboard</a>
            <a href="admin-products.html">Products</a>
            <a href="admin-orders.html">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="admin-container">
        <h1 style="color: var(--primary); margin-bottom: 30px;">Dashboard Overview</h1>
        
        <div class="admin-stats-grid" id="statsGrid">
            <div class="admin-stat-card"><div class="admin-stat-icon">📦</div><div class="admin-stat-info"><h3>Products</h3><div class="stat-number" id="totalProducts">--</div></div></div>
            <div class="admin-stat-card"><div class="admin-stat-icon">🛍️</div><div class="admin-stat-info"><h3>Orders</h3><div class="stat-number" id="totalOrders">--</div></div></div>
            <div class="admin-stat-card"><div class="admin-stat-icon">💰</div><div class="admin-stat-info"><h3>Revenue</h3><div class="stat-number" id="totalRevenue">--</div></div></div>
            <div class="admin-stat-card"><div class="admin-stat-icon">⏳</div><div class="admin-stat-info"><h3>Pending</h3><div class="stat-number" id="pendingOrders">--</div></div></div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
            <div class="admin-card"><div class="admin-card-header"><h2>Recent Orders</h2><a href="admin-orders.html" class="admin-btn admin-btn-primary">View All</a></div><div id="recentOrders"></div></div>
            <div class="admin-card"><div class="admin-card-header"><h2>Low Stock Products</h2><a href="admin-products.html" class="admin-btn admin-btn-primary">Manage</a></div><div id="lowStock"></div></div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        if (!sessionStorage.getItem('adminLoggedIn')) window.location.href = 'login.html';
        
        document.addEventListener('DOMContentLoaded', async () => {
            await loadDashboard();
            setInterval(loadDashboard, 30000);
        });
        
        async function loadDashboard() {
            const data = await getDashboard();
            
            document.getElementById('totalProducts').textContent = data.totalProducts || 0;
            document.getElementById('totalOrders').textContent = data.totalOrders || 0;
            document.getElementById('totalRevenue').textContent = `₹${(data.totalRevenue || 0).toLocaleString()}`;
            document.getElementById('pendingOrders').textContent = data.pendingOrders || 0;
            
            let recentHtml = '';
            (data.recentOrders || []).forEach(o => {
                recentHtml += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #e9ecef;"><span style="color:var(--primary);">${o.orderId}</span><span>${o.name}</span><span class="admin-badge admin-badge-${o.status?.toLowerCase()}">${o.status}</span></div>`;
            });
            document.getElementById('recentOrders').innerHTML = recentHtml || '<p>No recent orders</p>';
            
            let stockHtml = '';
            (data.lowStock || []).forEach(p => {
                stockHtml += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #e9ecef;"><span style="color:var(--primary);">${p.name}</span><span style="color:var(--danger);">Stock: ${p.stock}</span></div>`;
            });
            document.getElementById('lowStock').innerHTML = stockHtml || '<p>All products well stocked</p>';
        }
        
        function logout() { sessionStorage.removeItem('adminLoggedIn'); window.location.href = 'login.html'; }
    </script>
</body>
</html>
