<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
</head>
<body>
    <header>
        <div class="logo">STYLE OF LIFE - ADMIN</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="admin.html">Dashboard</a>
            <a href="admin-folder.html">Folders</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="admin-panel">
        <h1 style="color:#d4af37; margin-bottom:30px">Admin Dashboard</h1>
        
        <!-- Add Product Section -->
        <div class="admin-section">
            <h3>Add New Product</h3>
            
            <div class="admin-input">
                <label>Product Name *</label>
                <input type="text" id="name" placeholder="e.g., Gold Necklace">
            </div>
            
            <div class="admin-input">
                <label>SKU (optional)</label>
                <input type="text" id="sku" placeholder="e.g., SKU001 (auto-generated if empty)">
            </div>
            
            <div class="admin-input">
                <label>Category</label>
                <select id="category">
                    <option>Necklaces</option>
                    <option>Rings</option>
                    <option>Earrings</option>
                    <option>Bracelets</option>
                    <option>Bangles</option>
                    <option>Other</option>
                </select>
            </div>
            
            <div class="admin-input">
                <label>Price (₹) *</label>
                <input type="number" id="price" placeholder="e.g., 25000">
            </div>
            
            <div class="admin-input">
                <label>Stock</label>
                <input type="number" id="stock" placeholder="e.g., 10" value="10">
            </div>
            
            <div class="admin-input">
                <label>Description</label>
                <textarea id="description" rows="3" placeholder="Product description"></textarea>
            </div>
            
            <button onclick="addProduct()" style="margin-top:20px">Add Product</button>
        </div>
        
        <!-- Orders Section -->
        <div class="admin-section">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                <h3>Recent Orders</h3>
                <button onclick="loadOrders()" style="width:auto; padding:10px 20px">Refresh Orders</button>
            </div>
            
            <div id="orders"></div>
        </div>
    </div>

    <footer>
        © 2026 Style Of Life Jewelry - Admin Panel
    </footer>

    <script src="js/admin.js"></script>
    <script>
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
