<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
</head>
<body onload="checkAuth(); loadDashboard()">
    <header>
        <div class="logo">STYLE OF LIFE - ADMIN</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html">Products</a>
            <a href="admin-orders.html">Orders</a>
            <a href="admin-images.html">Images</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div style="max-width:1200px; margin:40px auto; padding:20px">
        <h1 style="color:#d4af37; margin-bottom:30px">Admin Dashboard</h1>
        
        <!-- Stats Cards -->
        <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:30px">
            <div style="background:#1a1a1a; padding:20px; border-radius:10px; text-align:center">
                <h3 style="color:#d4af37">Total Products</h3>
                <p style="font-size:32px" id="totalProducts">0</p>
            </div>
            <div style="background:#1a1a1a; padding:20px; border-radius:10px; text-align:center">
                <h3 style="color:#d4af37">Total Orders</h3>
                <p style="font-size:32px" id="totalOrders">0</p>
            </div>
            <div style="background:#1a1a1a; padding:20px; border-radius:10px; text-align:center">
                <h3 style="color:#d4af37">Revenue</h3>
                <p style="font-size:32px" id="totalRevenue">₹0</p>
            </div>
            <div style="background:#1a1a1a; padding:20px; border-radius:10px; text-align:center">
                <h3 style="color:#d4af37">Pending Orders</h3>
                <p style="font-size:32px" id="pendingOrders">0</p>
            </div>
        </div>
        
        <!-- Quick Actions -->
        <div style="background:#1a1a1a; padding:30px; border-radius:15px">
            <h3 style="color:#d4af37; margin-bottom:20px">Quick Actions</h3>
            <div style="display:flex; gap:15px; flex-wrap:wrap">
                <a href="admin-products.html"><button style="width:auto; padding:10px 20px">➕ Add Product</button></a>
                <a href="admin-orders.html"><button style="width:auto; padding:10px 20px">📦 View Orders</button></a>
                <a href="admin-images.html"><button style="width:auto; padding:10px 20px">🖼️ Manage Images</button></a>
            </div>
        </div>
    </div>

    <script>
        function checkAuth() {
            if (!sessionStorage.getItem('adminLoggedIn')) {
                window.location.href = 'login.html';
            }
        }
        
        async function loadDashboard() {
            try {
                const response = await fetch(`${CONFIG.API_URL}?action=dashboard`);
                const stats = await response.json();
                
                document.getElementById('totalProducts').textContent = stats.totalProducts || 0;
                document.getElementById('totalOrders').textContent = stats.totalOrders || 0;
                document.getElementById('totalRevenue').textContent = `₹${stats.totalRevenue || 0}`;
                document.getElementById('pendingOrders').textContent = stats.pendingOrders || 0;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
