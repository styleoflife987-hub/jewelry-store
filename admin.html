<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Of Life · Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #1a2634;
            min-height: 100vh;
        }

        .admin-header {
            background: #0f1722;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #f39c12;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            background: #f39c12;
            color: #0f1722;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .logo-text h1 {
            color: white;
            font-size: 1.8rem;
        }

        .logo-text p {
            color: #f39c12;
            font-size: 0.9rem;
        }

        .admin-badge {
            background: #f39c12;
            color: #0f1722;
            padding: 10px 25px;
            border-radius: 40px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .customer-link {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #f39c12;
            color: #0f1722;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: 0.3s;
            font-weight: 600;
        }

        .customer-link:hover {
            background: white;
            transform: translateY(-3px);
        }

        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 40px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #0f1722;
            border-radius: 20px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            border: 1px solid #2c3e50;
            transition: 0.3s;
            cursor: pointer;
        }

        .stat-card:hover {
            border-color: #f39c12;
            transform: translateY(-5px);
        }

        .stat-icon {
            width: 70px;
            height: 70px;
            background: #1a2634;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #f39c12;
        }

        .stat-info h3 {
            color: #95a5a6;
            font-size: 1rem;
            font-weight: 400;
            margin-bottom: 5px;
        }

        .stat-info span {
            color: white;
            font-size: 2rem;
            font-weight: 700;
        }

        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 15px 30px;
            background: #0f1722;
            border: 1px solid #2c3e50;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tab-btn:hover {
            border-color: #f39c12;
        }

        .tab-btn.active {
            background: #f39c12;
            color: #0f1722;
            border-color: #f39c12;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .product-management {
            background: #0f1722;
            border-radius: 20px;
            padding: 30px;
            border: 2px solid #f39c12;
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            color: white;
        }

        .product-header h2 {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .product-header h2 i {
            color: #f39c12;
        }

        .btn-add-product {
            background: #27ae60;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-add-product:hover {
            background: #229954;
            transform: scale(1.02);
        }

        .products-admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 25px;
        }

        .product-admin-card {
            background: #1a2634;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #2c3e50;
        }

        .product-admin-card h3 {
            color: #f39c12;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .product-fields {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .product-fields input,
        .product-fields select,
        .product-fields textarea {
            padding: 12px;
            background: #0f1722;
            border: 1px solid #2c3e50;
            border-radius: 8px;
            color: white;
            width: 100%;
        }

        .product-fields textarea {
            min-height: 80px;
            resize: vertical;
        }

        .product-fields input:focus,
        .product-fields select:focus,
        .product-fields textarea:focus {
            outline: none;
            border-color: #f39c12;
        }

        .image-upload-section {
            margin: 20px 0;
            padding: 15px;
            background: #0f1722;
            border-radius: 10px;
        }

        .image-upload-section h4 {
            color: #f39c12;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
            max-height: 300px;
            overflow-y: auto;
            padding: 5px;
        }

        .image-preview {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #2c3e50;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-preview .remove-image {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 20px;
            height: 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            z-index: 10;
        }

        .image-preview .remove-image:hover {
            background: #c0392b;
        }

        .upload-multiple-btn {
            width: 100%;
            padding: 20px;
            border: 2px dashed #f39c12;
            border-radius: 10px;
            background: #0f1722;
            color: #f39c12;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .upload-multiple-btn:hover {
            background: #1a2634;
            border-color: #e67e22;
        }

        .upload-multiple-btn i {
            font-size: 2rem;
        }

        .product-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .product-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-save-product {
            background: #27ae60;
            color: white;
        }

        .btn-save-product:hover {
            background: #229954;
        }

        .btn-delete-product {
            background: #e74c3c;
            color: white;
        }

        .btn-delete-product:hover {
            background: #c0392b;
        }

        .save-status {
            position: fixed;
            top: 100px;
            right: 40px;
            background: #27ae60;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 25px;
        }

        .order-card {
            background: #0f1722;
            border-radius: 20px;
            padding: 25px;
            border: 1px solid #2c3e50;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #2c3e50;
        }

        .order-id {
            color: #f39c12;
            font-weight: 700;
        }

        .order-status {
            padding: 5px 15px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .status-confirmed {
            background: #27ae60;
            color: white;
        }

        .order-details {
            margin-bottom: 15px;
        }

        .order-detail {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            color: #95a5a6;
        }

        .order-detail i {
            color: #f39c12;
            width: 20px;
        }

        .order-items {
            background: #1a2634;
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            color: white;
            margin-bottom: 5px;
        }

        .order-total {
            display: flex;
            justify-content: space-between;
            color: #f39c12;
            font-weight: 700;
            font-size: 1.2rem;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #2c3e50;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: #7f8c8d;
            border-top: 1px solid #2c3e50;
            margin-top: 60px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #f39c12;
        }
    </style>
</head>
<body>
    <a href="customer.html" class="customer-link" target="_blank">
        <i class="fas fa-store"></i> View Customer Store
    </a>

    <div class="save-status" id="saveStatus">
        <i class="fas fa-check-circle"></i> Changes Saved!
    </div>

    <header class="admin-header">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-crown"></i>
            </div>
            <div class="logo-text">
                <h1>Style Of Life</h1>
                <p>Administration Panel</p>
            </div>
        </div>
        <div class="admin-badge">
            <i class="fas fa-lock"></i> Admin Access
        </div>
    </header>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-box"></i>
                </div>
                <div class="stat-info">
                    <h3>Total Products</h3>
                    <span id="totalProducts">0</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-tags"></i>
                </div>
                <div class="stat-info">
                    <h3>Categories</h3>
                    <span id="totalCategories">0</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-shopping-cart"></i>
                </div>
                <div class="stat-info">
                    <h3>Total Orders</h3>
                    <span id="totalOrders">0</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-rupee-sign"></i>
                </div>
                <div class="stat-info">
                    <h3>Revenue</h3>
                    <span id="totalRevenue">₹0</span>
                </div>
            </div>
        </div>

        <div class="admin-tabs">
            <button class="tab-btn active" onclick="switchTab('products')">
                <i class="fas fa-box"></i> Products
            </button>
            <button class="tab-btn" onclick="switchTab('orders')">
                <i class="fas fa-shopping-cart"></i> Orders
            </button>
        </div>

        <div class="tab-content active" id="productsTab">
            <div class="product-management">
                <div class="product-header">
                    <h2><i class="fas fa-box"></i> Product Management</h2>
                    <button class="btn-add-product" onclick="addNewProduct()">
                        <i class="fas fa-plus"></i> Add New Product
                    </button>
                </div>

                <div class="products-admin-grid" id="productsAdminGrid"></div>
            </div>
        </div>

        <div class="tab-content" id="ordersTab">
            <div class="orders-grid" id="ordersGrid">
                <div class="loading">Loading orders...</div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Style Of Life · Real-time updates active</p>
    </footer>

    <script>
        let products = [];
        let orders = JSON.parse(localStorage.getItem('sol_orders')) || [];

        const DEFAULT_PRODUCTS = [
            { 
                id: 'SOL001', 
                name: 'Golden Peacock Choker', 
                category: 'Necklace', 
                price: 1850, 
                stock: 'In Stock', 
                images: [
                    'https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80',
                    'https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80',
                    'https://images.unsplash.com/photo-1611591437281-460bfbe1220a?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80'
                ],
                description: 'Exquisite gold-plated choker with peacock design.'
            },
            { 
                id: 'SOL002', 
                name: 'Oxidized Jhumka Earrings', 
                category: 'Earrings', 
                price: 1299, 
                stock: 'In Stock', 
                images: [
                    'https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80',
                    'https://images.unsplash.com/photo-1611591437281-460bfbe1220a?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80'
                ],
                description: 'Traditional oxidized silver jhumkas.'
            }
        ];

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.tab-btn').classList.add('active');

            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            
            if (tabName === 'products') {
                document.getElementById('productsTab').classList.add('active');
                renderProductsGrid();
            } else {
                document.getElementById('ordersTab').classList.add('active');
                renderOrders();
            }
        }

        function loadProducts() {
            const saved = localStorage.getItem('sol_products');
            if (saved) {
                products = JSON.parse(saved);
            } else {
                products = [...DEFAULT_PRODUCTS];
                saveToLocalStorage();
            }
            updateStats();
        }

        function saveToLocalStorage() {
            localStorage.setItem('sol_products', JSON.stringify(products));
            
            // Show save status
            const status = document.getElementById('saveStatus');
            status.style.display = 'flex';
            setTimeout(() => {
                status.style.display = 'none';
            }, 2000);
            
            // Trigger storage event for customer portal
            window.dispatchEvent(new StorageEvent('storage', {
                key: 'sol_products',
                newValue: JSON.stringify(products)
            }));
            
            updateStats();
        }

        function updateStats() {
            document.getElementById('totalProducts').textContent = products.length;
            const categories = new Set(products.map(p => p.category)).size;
            document.getElementById('totalCategories').textContent = categories;
            document.getElementById('totalOrders').textContent = orders.length;
            const revenue = orders.reduce((sum, o) => sum + o.total, 0);
            document.getElementById('totalRevenue').textContent = '₹' + revenue;
        }

        function renderProductsGrid() {
            const grid = document.getElementById('productsAdminGrid');
            const categories = ['Necklace', 'Earrings', 'Bangles', 'Headpiece', 'Bracelet', 'Ring'];
            const stockOptions = ['In Stock', 'Limited', 'Out of Stock'];

            if (products.length === 0) {
                grid.innerHTML = '<div class="loading">No products yet. Click "Add New Product" to get started!</div>';
                return;
            }

            let html = '';
            products.forEach((product, index) => {
                let imagePreviews = '';
                if (product.images && product.images.length > 0) {
                    product.images.forEach((img, imgIndex) => {
                        imagePreviews += `
                            <div class="image-preview">
                                <img src="${img}" alt="Product image">
                                <button class="remove-image" onclick="removeProductImage(${index}, ${imgIndex})">×</button>
                            </div>
                        `;
                    });
                }

                html += `
                    <div class="product-admin-card">
                        <h3>${product.id}</h3>
                        <div class="product-fields">
                            <input type="text" placeholder="Product ID" value="${product.id}" onchange="updateField(${index}, 'id', this.value)">
                            <input type="text" placeholder="Product Name" value="${product.name}" onchange="updateField(${index}, 'name', this.value)">
                            <textarea placeholder="Description" onchange="updateField(${index}, 'description', this.value)">${product.description || ''}</textarea>
                            <select onchange="updateField(${index}, 'category', this.value)">
                                ${categories.map(c => `<option value="${c}" ${product.category === c ? 'selected' : ''}>${c}</option>`).join('')}
                            </select>
                            <input type="number" placeholder="Price" value="${product.price}" onchange="updateField(${index}, 'price', this.value)">
                            <select onchange="updateField(${index}, 'stock', this.value)">
                                ${stockOptions.map(s => `<option value="${s}" ${product.stock === s ? 'selected' : ''}>${s}</option>`).join('')}
                            </select>
                        </div>

                        <div class="image-upload-section">
                            <h4>Product Images (${product.images ? product.images.length : 0})</h4>
                            <div class="image-grid" id="imageGrid_${index}">
                                ${imagePreviews}
                            </div>
                            <div class="upload-multiple-btn" onclick="document.getElementById('fileInput_${index}').click()">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <span>Click to upload multiple images</span>
                                <input type="file" id="fileInput_${index}" multiple accept="image/*" style="display: none;" onchange="uploadImages(${index}, this.files)">
                            </div>
                        </div>

                        <div class="product-actions">
                            <button class="btn-save-product" onclick="saveProduct(${index})">
                                <i class="fas fa-save"></i> Save Changes
                            </button>
                            <button class="btn-delete-product" onclick="deleteProduct(${index})">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;
        }

        window.updateField = function(index, field, value) {
            if (field === 'price') value = parseFloat(value) || 0;
            products[index][field] = value;
        };

        window.uploadImages = function(index, files) {
            if (!products[index].images) {
                products[index].images = [];
            }

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    products[index].images.push(e.target.result);
                    
                    // Update image grid
                    const imageGrid = document.getElementById(`imageGrid_${index}`);
                    const imgHtml = `
                        <div class="image-preview">
                            <img src="${e.target.result}" alt="Product image">
                            <button class="remove-image" onclick="removeProductImage(${index}, ${products[index].images.length - 1})">×</button>
                        </div>
                    `;
                    imageGrid.insertAdjacentHTML('beforeend', imgHtml);
                    
                    // Auto-save after each image
                    saveToLocalStorage();
                };
                reader.readAsDataURL(file);
            });
        };

        window.removeProductImage = function(productIndex, imageIndex) {
            products[productIndex].images.splice(imageIndex, 1);
            saveToLocalStorage();
            renderProductsGrid(); // Re-render to update image grid
        };

        window.saveProduct = function(index) {
            // Get latest values from inputs
            const product = products[index];
            product.id = document.querySelector(`#productsAdminGrid .product-admin-card:nth-child(${index + 1}) input[placeholder="Product ID"]`).value;
            product.name = document.querySelector(`#productsAdminGrid .product-admin-card:nth-child(${index + 1}) input[placeholder="Product Name"]`).value;
            product.description = document.querySelector(`#productsAdminGrid .product-admin-card:nth-child(${index + 1}) textarea`).value;
            product.category = document.querySelector(`#productsAdminGrid .product-admin-card:nth-child(${index + 1}) select`).value;
            product.price = parseFloat(document.querySelector(`#productsAdminGrid .product-admin-card:nth-child(${index + 1}) input[type="number"]`).value) || 0;
            product.stock = document.querySelector(`#productsAdminGrid .product-admin-card:nth-child(${index + 1}) select:last-of-type`).value;
            
            saveToLocalStorage();
        };

        window.deleteProduct = function(index) {
            if (confirm('Delete this product?')) {
                products.splice(index, 1);
                saveToLocalStorage();
                renderProductsGrid();
            }
        };

        window.addNewProduct = function() {
            const newId = 'SOL' + String(products.length + 100).padStart(3, '0');
            products.push({
                id: newId,
                name: 'New Product',
                category: 'Necklace',
                price: 999,
                stock: 'In Stock',
                images: [],
                description: 'New product description'
            });
            saveToLocalStorage();
            renderProductsGrid();
        };

        function renderOrders() {
            const grid = document.getElementById('ordersGrid');
            
            if (orders.length === 0) {
                grid.innerHTML = '<div class="loading">No orders yet</div>';
                return;
            }

            let html = '';
            orders.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(order => {
                const date = new Date(order.date).toLocaleString();

                html += `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="order-id"><i class="fas fa-hashtag"></i> ${order.id}</span>
                            <span class="order-status status-confirmed">${order.status.toUpperCase()}</span>
                        </div>
                        <div class="order-details">
                            <div class="order-detail"><i class="fas fa-user"></i> ${order.customer.name}</div>
                            <div class="order-detail"><i class="fas fa-phone"></i> ${order.customer.phone}</div>
                            <div class="order-detail"><i class="fas fa-envelope"></i> ${order.customer.email}</div>
                            <div class="order-detail"><i class="fas fa-map-marker-alt"></i> ${order.customer.address}</div>
                            <div class="order-detail"><i class="fas fa-calendar"></i> ${date}</div>
                        </div>
                        <div class="order-items">
                            ${order.items.map(item => `
                                <div class="order-item">
                                    <span>${item.name} × ${item.quantity}</span>
                                    <span>₹${item.price * item.quantity}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="order-total">
                            <span>Total:</span>
                            <span>₹${order.total}</span>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;
        }

        // Listen for storage events
        window.addEventListener('storage', function(e) {
            if (e.key === 'sol_orders') {
                orders = JSON.parse(e.newValue) || [];
                updateStats();
                if (document.getElementById('ordersTab').classList.contains('active')) {
                    renderOrders();
                }
            }
        });

        // Initialize
        loadProducts();
        renderProductsGrid();
        updateStats();
    </script>
</body>
</html>
