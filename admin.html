<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
</head>
<body>
    <header>
        <div class="logo">✨ STYLE OF LIFE - ADMIN</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="admin.html" class="active">Dashboard</a>
            <a href="admin-products.html">Products</a>
            <a href="admin-orders.html">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="admin-container">
        <h1 class="page-title">Admin Dashboard</h1>
        
        <div class="stats-grid" id="dashboardStats">
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <div class="stat-info">
                    <h3>Total Products</h3>
                    <p class="stat-number" id="totalProducts">0</p>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">🛍️</div>
                <div class="stat-info">
                    <h3>Total Orders</h3>
                    <p class="stat-number" id="totalOrders">0</p>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-info">
                    <h3>Revenue</h3>
                    <p class="stat-number" id="totalRevenue">₹0</p>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">⏳</div>
                <div class="stat-info">
                    <h3>Pending Orders</h3>
                    <p class="stat-number" id="pendingOrders">0</p>
                </div>
            </div>
        </div>
        
        <div class="quick-actions">
            <h2>Quick Actions</h2>
            <div class="action-buttons">
                <a href="admin-products.html" class="action-btn">➕ Add New Product</a>
                <a href="admin-orders.html" class="action-btn">📋 View All Orders</a>
                <button onclick="syncWithExcel()" class="action-btn">🔄 Sync with Excel</button>
            </div>
        </div>
        
        <div class="recent-orders">
            <h2>Recent Orders</h2>
            <div id="recentOrdersList" class="orders-list">
                <p>Loading orders...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Style Of Life Jewelry - Admin Panel</p>
    </footer>

    <script>
        // Check authentication
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }
        
        // Load dashboard data
        document.addEventListener('DOMContentLoaded', function() {
            loadDashboardStats();
            loadRecentOrders();
        });
        
        async function loadDashboardStats() {
            try {
                // Try server first
                const response = await fetch(`${CONFIG.API_URL}?action=dashboard`);
                const stats = await response.json();
                
                document.getElementById('totalProducts').textContent = stats.totalProducts || 0;
                document.getElementById('totalOrders').textContent = stats.totalOrders || 0;
                document.getElementById('totalRevenue').textContent = `₹${(stats.totalRevenue || 0).toLocaleString()}`;
                document.getElementById('pendingOrders').textContent = stats.pendingOrders || 0;
            } catch (error) {
                // Fallback to local data
                const products = JSON.parse(localStorage.getItem('products') || '[]');
                const orders = JSON.parse(localStorage.getItem('orders') || '[]');
                
                document.getElementById('totalProducts').textContent = products.length;
                document.getElementById('totalOrders').textContent = orders.length;
                
                const revenue = orders.reduce((sum, order) => sum + (order.total || 0), 0);
                document.getElementById('totalRevenue').textContent = `₹${revenue.toLocaleString()}`;
                
                const pending = orders.filter(o => o.status === 'Pending').length;
                document.getElementById('pendingOrders').textContent = pending;
            }
        }
        
        async function loadRecentOrders() {
            const container = document.getElementById('recentOrdersList');
            
            try {
                const response = await fetch(`${CONFIG.API_URL}?action=orders`);
                const orders = await response.json();
                
                if (orders && orders.length > 0) {
                    displayOrders(orders.slice(0, 5));
                } else {
                    container.innerHTML = '<p>No orders found</p>';
                }
            } catch (error) {
                // Show local orders
                const localOrders = JSON.parse(localStorage.getItem('orders') || '[]');
                if (localOrders.length > 0) {
                    displayOrders(localOrders.slice(0, 5));
                } else {
                    container.innerHTML = '<p>No orders found</p>';
                }
            }
        }
        
        function displayOrders(orders) {
            const container = document.getElementById('recentOrdersList');
            let html = '';
            
            orders.forEach(order => {
                html += `
                    <div class="order-item">
                        <div class="order-info">
                            <strong>${order.orderId}</strong>
                            <span>${order.name}</span>
                        </div>
                        <div class="order-status status-${order.status?.toLowerCase() || 'pending'}">
                            ${order.status || 'Pending'}
                        </div>
                        <div class="order-total">₹${(order.total || 0).toLocaleString()}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function syncWithExcel() {
            alert('Syncing with Excel... This may take a moment.');
            location.reload();
        }
        
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
