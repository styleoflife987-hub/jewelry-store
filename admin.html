<!DOCTYPE html>
<html>

<body>

<h2>Admin Orders</h2>

<button onclick="load()">Load Orders</button>

<pre id="orders"></pre>

<script>

const API="PASTE_SCRIPT_URL";

function load(){

fetch(API+"?action=orders")

.then(res=>res.json())

.then(data=>{

document.getElementById("orders").innerText=
JSON.stringify(data,null,2);

});

}

</script>

</body>
</html>
