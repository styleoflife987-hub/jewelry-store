<!DOCTYPE html>
<html>
<head>
<title>Jewelry Store</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
}

.products{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{

background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ccc;

}

</style>

</head>

<body>

<h1>Jewelry Store</h1>

<div class="products" id="products"></div>

<script>

const API="PASTE_SCRIPT_URL_HERE";

fetch(API+"?action=getProducts")
.then(r=>r.json())
.then(data=>{

let html="";

data.forEach(p=>{

html+=`

<div class="card">

<h3>${p.name}</h3>

<p>Category : ${p.category}</p>

<h2>₹${p.price}</h2>

<p>${p.stock}</p>

</div>

`;

});

document.getElementById("products").innerHTML=html;

});

</script>

</body>
</html>
