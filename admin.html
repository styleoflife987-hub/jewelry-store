<!DOCTYPE html>
<html>
<head>
    <title>Style Of Life - Admin</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #1a2634; color: white; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .connected { background: #27ae60; }
        .disconnected { background: #e74c3c; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #0f1722; padding: 10px; border-radius: 5px; overflow: auto; color: #0f0; }
    </style>
</head>
<body>
    <h1>Style Of Life - Admin Panel</h1>
    
    <div class="status disconnected" id="status">Checking connection...</div>
    
    <button onclick="runSetup()">1. Run Setup First</button>
    <button onclick="checkConnection()">2. Check Connection</button>
    <button onclick="getProducts()">3. Get Products</button>
    
    <h3>Result:</h3>
    <pre id="result">Click a button to see result...</pre>

    <script>
        // YOUR CORRECT URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzzEdtAUNjl_FpMNqPWrj-qriMNl7eV_jM8Uw_ryWTs7Q_ikTETdD-6FoXMR4d3OjaDIg/exec';
        
        function jsonpCall(action, data, callback) {
            const callbackName = 'callback_' + Date.now();
            window[callbackName] = function(response) {
                document.getElementById('status').className = 'status connected';
                document.getElementById('status').innerHTML = '✅ Connected';
                delete window[callbackName];
                document.body.removeChild(document.getElementById('jsonpScript'));
                callback(response);
            };
            
            const script = document.createElement('script');
            script.id = 'jsonpScript';
            const url = SCRIPT_URL + '?action=' + action + '&data=' + encodeURIComponent(JSON.stringify(data)) + '&callback=' + callbackName;
            script.src = url;
            
            script.onerror = function() {
                document.getElementById('status').className = 'status disconnected';
                document.getElementById('status').innerHTML = '❌ Disconnected - Check URL';
                delete window[callbackName];
                document.body.removeChild(script);
                callback(null);
            };
            
            document.body.appendChild(script);
        }
        
        function runSetup() {
            document.getElementById('result').innerHTML = 'Running setup...';
            jsonpCall('setup', {}, function(result) {
                document.getElementById('result').innerHTML = JSON.stringify(result, null, 2);
            });
        }
        
        function checkConnection() {
            document.getElementById('result').innerHTML = 'Checking...';
            jsonpCall('getDashboardStats', {}, function(result) {
                document.getElementById('result').innerHTML = JSON.stringify(result, null, 2);
            });
        }
        
        function getProducts() {
            document.getElementById('result').innerHTML = 'Loading...';
            jsonpCall('getProducts', {}, function(result) {
                document.getElementById('result').innerHTML = JSON.stringify(result, null, 2);
            });
        }
        
        // Auto-check connection
        checkConnection();
    </script>
</body>
</html>
