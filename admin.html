<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
</head>

<body>

<h2>Jewelry Admin</h2>

<button onclick="setup()">Run Setup</button>
<button onclick="stats()">Check Stats</button>

<pre id="output"></pre>

<script>

const API="PASTE_SCRIPT_URL_HERE";

function setup(){

fetch(API+"?action=setup")
.then(r=>r.json())
.then(d=>{
document.getElementById("output").innerText=
JSON.stringify(d,null,2);
});

}

function stats(){

fetch(API+"?action=stats")
.then(r=>r.json())
.then(d=>{
document.getElementById("output").innerText=
JSON.stringify(d,null,2);
});

}

</script>

</body>
</html>
