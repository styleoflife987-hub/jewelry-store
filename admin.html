<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #d4af37; --dark: #1a1a1a; --darker: #0a0a0a; --light: #ffffff; --gray-100: #f8f9fa; --gray-200: #e9ecef; --gray-600: #6c757d; --success: #28a745; }
        body { font-family: 'Inter', sans-serif; background: var(--gray-100); }
        header { background: var(--darker); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 600; color: var(--primary); }
        .logo span { background: var(--primary); color: var(--darker); padding: 4px 8px; border-radius: 4px; }
        nav a { color: #aaa; text-decoration: none; margin-left: 20px; padding: 8px 15px; border-radius: 6px; }
        nav a:hover, nav a.active { background: rgba(212,175,55,0.1); color: var(--primary); }
        .container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        h1 { color: var(--primary); margin-bottom: 30px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid var(--gray-200); }
        .stat-icon { font-size: 32px; }
        .stat-info h3 { color: var(--gray-600); font-size: 14px; margin-bottom: 5px; }
        .stat-number { font-size: 28px; font-weight: 700; }
        .card { background: white; border-radius: 12px; padding: 20px; border: 1px solid var(--gray-200); margin-bottom: 30px; }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--gray-200); }
        .action-btn { background: var(--primary); color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 14px; }
        .order-item, .product-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--gray-200); }
        .empty-message { text-align: center; padding: 40px; color: var(--gray-600); }
        footer { background: var(--darker); color: white; text-align: center; padding: 30px; margin-top: 60px; }
        @media (max-width: 768px) { .stats { grid-template-columns: 1fr; } header { flex-direction: column; gap: 15px; padding: 15px; } }
    </style>
</head>
<body>
    <header>
        <div class="logo">STYLE OF LIFE <span>ADMIN</span></div>
        <nav>
            <a href="admin.html" class="active">Dashboard</a>
            <a href="admin-products.html">Products</a>
            <a href="admin-orders.html">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="container">
        <h1>Dashboard Overview</h1>
        <div class="stats" id="stats">
            <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-info"><h3>Products</h3><div class="stat-number">--</div></div></div>
            <div class="stat-card"><div class="stat-icon">🛍️</div><div class="stat-info"><h3>Orders</h3><div class="stat-number">--</div></div></div>
            <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-info"><h3>Revenue</h3><div class="stat-number">--</div></div></div>
            <div class="stat-card"><div class="stat-icon">⏳</div><div class="stat-info"><h3>Pending</h3><div class="stat-number">--</div></div></div>
        </div>
        
        <div class="card">
            <div class="card-header"><h2>Recent Orders</h2><a href="admin-orders.html" class="action-btn">View All</a></div>
            <div id="recentOrders"><div class="empty-message">No orders yet</div></div>
        </div>
        
        <div class="card">
            <div class="card-header"><h2>Products</h2><a href="admin-products.html" class="action-btn">Manage</a></div>
            <div id="productsList"><div class="empty-message">No products added yet</div></div>
        </div>
    </div>

    <footer><p>© 2026 STYLE OF LIFE</p></footer>

    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        if (!sessionStorage.getItem('adminLoggedIn')) window.location.href = 'login.html';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        
        async function loadDashboard() {
            const [products, orders] = await Promise.all([
                supabase.from('products').select('*'),
                supabase.from('orders').select('*').order('created_at', { ascending: false })
            ]);
            
            const productCount = products.data?.length || 0;
            const orderData = orders.data || [];
            const totalOrders = orderData.length;
            const totalRevenue = orderData.reduce((s, o) => s + (o.total || 0), 0);
            const pendingOrders = orderData.filter(o => o.status === 'Pending').length;
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="stat-icon">📦</div><div><div class="stat-info"><h3>Products</h3><div class="stat-number">${productCount}</div></div></div></div>
                <div class="stat-card"><div class="stat-icon">🛍️</div><div><div class="stat-info"><h3>Orders</h3><div class="stat-number">${totalOrders}</div></div></div></div>
                <div class="stat-card"><div class="stat-icon">💰</div><div><div class="stat-info"><h3>Revenue</h3><div class="stat-number">₹${totalRevenue.toLocaleString()}</div></div></div></div>
                <div class="stat-card"><div class="stat-icon">⏳</div><div><div class="stat-info"><h3>Pending</h3><div class="stat-number">${pendingOrders}</div></div></div></div>
            `;
            
            let recentHtml = '';
            if (orderData.length === 0) {
                recentHtml = '<div class="empty-message">No orders yet</div>';
            } else {
                orderData.slice(0, 5).forEach(o => {
                    recentHtml += `<div class="order-item"><span>${o.order_id}</span><span>${o.customer_name}</span><span style="background:#fff3cd;color:#856404;padding:2px 8px;border-radius:20px;">${o.status}</span><span>₹${o.total}</span></div>`;
                });
            }
            document.getElementById('recentOrders').innerHTML = recentHtml;
            
            let productsHtml = '';
            if (productCount === 0) {
                productsHtml = '<div class="empty-message">No products added yet. Click "Manage" to add your first product.</div>';
            } else {
                (products.data || []).slice(0, 5).forEach(p => {
                    productsHtml += `<div class="product-item"><span>${p.name}</span><span>SKU: ${p.sku}</span><span>Stock: ${p.stock}</span><span>₹${p.price}</span></div>`;
                });
            }
            document.getElementById('productsList').innerHTML = productsHtml;
        }
        
        window.logout = function() { sessionStorage.removeItem('adminLoggedIn'); window.location.href = 'login.html'; };
        
        loadDashboard();
    </script>
</body>
</html>
