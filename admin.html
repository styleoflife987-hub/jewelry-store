<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
</head>
<body>
    <header>
        <div class="logo">STYLE OF LIFE - ADMIN</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="admin.html">Products</a>
            <a href="admin-folder.html">Images</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div style="max-width:1000px; margin:40px auto; padding:20px">
        <h1 style="color:#d4af37; margin-bottom:30px">Admin Dashboard</h1>
        
        <!-- Add Product -->
        <div style="background:#1a1a1a; padding:30px; border-radius:15px; margin-bottom:30px">
            <h3 style="color:#d4af37; margin-bottom:20px">Add New Product</h3>
            
            <div style="margin-bottom:15px">
                <label style="color:#d4af37">SKU</label>
                <input type="text" id="sku" placeholder="e.g., SKU001" 
                       style="width:100%; padding:12px; background:#333; border:1px solid #444; border-radius:6px; color:white">
            </div>
            
            <div style="margin-bottom:15px">
                <label style="color:#d4af37">Product Name</label>
                <input type="text" id="name" placeholder="e.g., Gold Necklace" 
                       style="width:100%; padding:12px; background:#333; border:1px solid #444; border-radius:6px; color:white">
            </div>
            
            <div style="margin-bottom:15px">
                <label style="color:#d4af37">Category</label>
                <input type="text" id="category" placeholder="e.g., Necklaces" 
                       style="width:100%; padding:12px; background:#333; border:1px solid #444; border-radius:6px; color:white">
            </div>
            
            <div style="margin-bottom:15px">
                <label style="color:#d4af37">Price</label>
                <input type="number" id="price" placeholder="e.g., 25000" 
                       style="width:100%; padding:12px; background:#333; border:1px solid #444; border-radius:6px; color:white">
            </div>
            
            <div style="margin-bottom:15px">
                <label style="color:#d4af37">Stock</label>
                <input type="number" id="stock" value="10" 
                       style="width:100%; padding:12px; background:#333; border:1px solid #444; border-radius:6px; color:white">
            </div>
            
            <button onclick="addProduct()">Add Product</button>
        </div>
        
        <!-- Orders List -->
        <div style="background:#1a1a1a; padding:30px; border-radius:15px">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                <h3 style="color:#d4af37">Orders</h3>
                <button onclick="loadOrders()" style="width:auto; padding:8px 20px">Refresh</button>
            </div>
            <div id="orders"></div>
        </div>
    </div>

    <script>
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        }
        
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }
        
        async function addProduct() {
            const sku = document.getElementById('sku').value;
            const name = document.getElementById('name').value;
            const category = document.getElementById('category').value;
            const price = document.getElementById('price').value;
            const stock = document.getElementById('stock').value;
            
            if (!name || !price) {
                alert('Please fill required fields');
                return;
            }
            
            try {
                const params = new URLSearchParams({
                    action: 'addProduct',
                    sku: sku || `SKU${Date.now()}`,
                    name: name,
                    category: category || 'Jewelry',
                    price: price,
                    stock: stock
                });
                
                const response = await fetch(`${CONFIG.API_URL}?${params}`);
                const data = await response.json();
                
                if (data.success) {
                    alert('Product added successfully!');
                    document.getElementById('sku').value = '';
                    document.getElementById('name').value = '';
                    document.getElementById('category').value = '';
                    document.getElementById('price').value = '';
                }
            } catch (error) {
                alert('Error adding product');
            }
        }
        
        async function loadOrders() {
            try {
                const response = await fetch(`${CONFIG.API_URL}?action=orders`);
                const orders = await response.json();
                
                const container = document.getElementById('orders');
                
                if (orders.length === 0) {
                    container.innerHTML = '<p>No orders found</p>';
                    return;
                }
                
                let html = '<div style="overflow-x:auto"><table style="width:100%; border-collapse:collapse">';
                html += '<tr><th style="padding:10px; text-align:left">Order ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th></tr>';
                
                orders.forEach(order => {
                    html += `
                        <tr style="border-bottom:1px solid #333">
                            <td style="padding:10px">${order.orderId}</td>
                            <td style="padding:10px">${order.name}</td>
                            <td style="padding:10px">₹${order.total}</td>
                            <td style="padding:10px"><span style="color:#d4af37">${order.status}</span></td>
                            <td style="padding:10px">${new Date(order.date).toLocaleDateString()}</td>
                        </tr>
                    `;
                });
                
                html += '</table></div>';
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        }
        
        loadOrders();
    </script>
</body>
</html>
