<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Of Life · Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #1a2634;
            color: white;
        }

        .admin-header {
            background: #0f1722;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #f39c12;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            background: #f39c12;
            color: #0f1722;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a2634;
            padding: 8px 20px;
            border-radius: 30px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #27ae60;
        }

        .status-dot.disconnected {
            background: #e74c3c;
        }

        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 40px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #0f1722;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #2c3e50;
        }

        .stat-icon {
            color: #f39c12;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .stat-info h3 {
            color: #95a5a6;
            font-size: 0.9rem;
            font-weight: 400;
        }

        .stat-info span {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: #0f1722;
            padding: 10px;
            border-radius: 10px;
        }

        .tab-btn {
            padding: 10px 25px;
            background: transparent;
            border: none;
            color: #95a5a6;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: #f39c12;
            color: #0f1722;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .admin-controls {
            background: #0f1722;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-success { background: #27ae60; color: white; }
        .btn-info { background: #3498db; color: white; }
        .btn-warning { background: #f1c40f; color: #0f1722; }

        .table-wrapper {
            background: #0f1722;
            border-radius: 15px;
            padding: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }

        th {
            background: #1a2634;
            color: #f39c12;
            padding: 15px;
            text-align: left;
            border-bottom: 2px solid #f39c12;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #2c3e50;
        }

        input, select {
            width: 100%;
            padding: 8px;
            background: #1a2634;
            border: 1px solid #2c3e50;
            border-radius: 5px;
            color: white;
        }

        .image-preview {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .preview-img {
            width: 50px;
            height: 50px;
            border-radius: 5px;
            object-fit: cover;
            cursor: pointer;
        }

        .upload-btn {
            background: #1a2634;
            border: 2px dashed #f39c12;
            border-radius: 5px;
            padding: 8px;
            color: #f39c12;
            cursor: pointer;
            text-align: center;
            font-size: 0.9rem;
        }

        .action-btn {
            background: #1a2634;
            border: 1px solid #2c3e50;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 2px;
        }

        .action-btn.delete:hover { background: #e74c3c; }

        .footer {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
            border-top: 1px solid #2c3e50;
            margin-top: 40px;
        }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: #0f1722;
            border-radius: 15px;
            padding: 30px;
            z-index: 2000;
            transition: 0.3s;
            border: 2px solid #f39c12;
        }

        .modal.show { transform: translate(-50%, -50%) scale(1); }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1999;
            display: none;
        }
        .modal-overlay.show { display: block; }
    </style>
</head>
<body>
    <header class="admin-header">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-crown"></i></div>
            <h1>Style Of Life · Admin</h1>
        </div>
        <div class="connection-status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Connected</span>
        </div>
    </header>

    <div class="container">
        <div class="stats-grid" id="stats">
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-box"></i></div><div class="stat-info"><h3>Products</h3><span id="totalProducts">0</span></div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-tags"></i></div><div class="stat-info"><h3>Categories</h3><span id="totalCategories">0</span></div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-shopping-cart"></i></div><div class="stat-info"><h3>Orders</h3><span id="totalOrders">0</span></div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-rupee-sign"></i></div><div class="stat-info"><h3>Revenue</h3><span id="totalRevenue">₹0</span></div></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('products')"><i class="fas fa-box"></i> Products</button>
            <button class="tab-btn" onclick="switchTab('orders')"><i class="fas fa-shopping-cart"></i> Orders</button>
        </div>

        <!-- Products Tab -->
        <div id="productsTab" class="tab-content active">
            <div class="admin-controls">
                <button class="btn btn-success" onclick="addProduct()"><i class="fas fa-plus"></i> Add Product</button>
                <button class="btn btn-info" onclick="loadProducts()"><i class="fas fa-sync"></i> Refresh</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Images</th><th>Actions</th></tr></thead>
                    <tbody id="productsTable"></tbody>
                </table>
            </div>
        </div>

        <!-- Orders Tab -->
        <div id="ordersTab" class="tab-content">
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Order ID</th><th>Date</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody id="ordersTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeImageModal()"></div>
    <div class="modal" id="imageModal"><img id="modalImage" src="" style="max-width:100%;"><button class="action-btn" onclick="closeImageModal()" style="position:absolute; top:10px; right:10px;">×</button></div>

    <footer class="footer"><p>Style Of Life · Google Drive Integration</p></footer>

    <script>
        // ==================== CONFIGURATION ====================
        // REPLACE WITH YOUR ACTUAL GOOGLE APPS SCRIPT URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz_A3czd8n_8JkUXgN1XruA3tnWjYVs4b4wLf5ODk8sUaXy1RsgMldOJWo4IZM3HdNwQ/exec';
        
        let products = [], orders = [];

        // ==================== API CALL WITH JSONP (CORS FIX) ====================
        function apiCall(action, data = {}) {
            return new Promise((resolve) => {
                // Create a unique callback name
                const callbackName = 'callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                
                // Create script element
                const script = document.createElement('script');
                
                // Build URL with parameters
                const params = new URLSearchParams({
                    action: action,
                    data: JSON.stringify(data),
                    callback: callbackName
                });
                
                script.src = SCRIPT_URL + '?' + params.toString();
                
                // Define callback function
                window[callbackName] = function(response) {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    
                    if (response && response.error) {
                        console.error('API Error:', response.error);
                        document.getElementById('statusDot').classList.add('disconnected');
                        document.getElementById('statusText').textContent = 'Disconnected';
                        resolve(null);
                    } else {
                        document.getElementById('statusDot').classList.remove('disconnected');
                        document.getElementById('statusText').textContent = 'Connected';
                        resolve(response);
                    }
                };
                
                // Handle errors
                script.onerror = function() {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    document.getElementById('statusDot').classList.add('disconnected');
                    document.getElementById('statusText').textContent = 'Disconnected';
                    resolve(null);
                };
                
                // Add script to document
                document.body.appendChild(script);
            });
        }

        // ==================== LOAD FUNCTIONS ====================
        async function loadStats() {
            const data = await apiCall('getDashboardStats');
            if (data?.stats) {
                document.getElementById('totalProducts').textContent = data.stats.totalProducts;
                document.getElementById('totalCategories').textContent = data.stats.totalCategories;
                document.getElementById('totalOrders').textContent = data.stats.totalOrders;
                document.getElementById('totalRevenue').textContent = '₹' + data.stats.totalRevenue;
            }
        }

        async function loadProducts() {
            const data = await apiCall('getProducts');
            if (Array.isArray(data)) {
                products = data;
                renderProducts();
            }
        }

        function renderProducts() {
            const tbody = document.getElementById('productsTable');
            let html = '';
            products.forEach((p, i) => {
                let imagesHtml = '<div class="image-preview">';
                if (p.images?.length) {
                    p.images.forEach(img => imagesHtml += `<img class="preview-img" src="${img.url}" onclick="openImageModal('${img.url}')">`);
                }
                imagesHtml += '</div><div class="upload-btn" onclick="uploadImage(${i})">📷 Add Images</div>';
                html += `<tr>
                    <td><input value="${p.id}" onchange="updateProduct('${p.id}', 'id', this.value)"></td>
                    <td><input value="${p.name}" onchange="updateProduct('${p.id}', 'name', this.value)"></td>
                    <td><input value="${p.category}" onchange="updateProduct('${p.id}', 'category', this.value)"></td>
                    <td><input type="number" value="${p.price}" onchange="updateProduct('${p.id}', 'price', this.value)"></td>
                    <td><select onchange="updateProduct('${p.id}', 'stock', this.value)">
                        <option ${p.stock === 'In Stock' ? 'selected' : ''}>In Stock</option>
                        <option ${p.stock === 'Limited' ? 'selected' : ''}>Limited</option>
                        <option ${p.stock === 'Out of Stock' ? 'selected' : ''}>Out of Stock</option>
                    </select></td>
                    <td>${imagesHtml}</td>
                    <td><button class="action-btn delete" onclick="deleteProduct('${p.id}')">🗑️</button></td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        async function loadOrders() {
            const data = await apiCall('getOrders');
            if (Array.isArray(data)) {
                orders = data;
                renderOrders();
            }
        }

        function renderOrders() {
            const tbody = document.getElementById('ordersTable');
            let html = '';
            orders.slice().reverse().forEach(o => {
                html += `<tr>
                    <td>${o.id}</td><td>${new Date(o.date).toLocaleDateString()}</td>
                    <td>${o.customer}<br><small>${o.email}</small></td>
                    <td>${o.items.map(i => `${i.name} x${i.quantity}`).join(', ')}</td>
                    <td>₹${o.total}</td>
                    <td><select onchange="updateOrderStatus('${o.id}', this.value)">
                        <option ${o.status === 'Pending' ? 'selected' : ''}>Pending</option>
                        <option ${o.status === 'Processing' ? 'selected' : ''}>Processing</option>
                        <option ${o.status === 'Shipped' ? 'selected' : ''}>Shipped</option>
                        <option ${o.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                        <option ${o.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                    </select></td>
                    <td><button class="action-btn delete" onclick="deleteOrder('${o.id}')">🗑️</button></td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        // ==================== PRODUCT ACTIONS ====================
        async function addProduct() {
            const newId = 'SOL' + Date.now().toString().slice(-6);
            await apiCall('saveProduct', { data: { 
                id: newId, 
                name: 'New Product', 
                category: 'Necklace', 
                price: 999, 
                stock: 'In Stock', 
                images: [] 
            }});
            loadProducts(); 
            loadStats();
        }

        async function updateProduct(id, field, value) {
            const p = products.find(x => x.id === id);
            if (p) { 
                p[field] = field === 'price' ? Number(value) : value;
                await apiCall('saveProduct', { data: p });
            }
        }

        async function deleteProduct(id) {
            if (confirm('Delete this product?')) { 
                await apiCall('deleteProduct', { productId: id }); 
                loadProducts(); 
                loadStats(); 
            }
        }

        // ==================== ORDER ACTIONS ====================
        async function updateOrderStatus(id, status) {
            await apiCall('updateOrderStatus', { orderId: id, status });
            loadOrders(); 
            loadStats();
        }

        async function deleteOrder(id) {
            if (confirm('Delete this order?')) { 
                await apiCall('deleteOrder', { orderId: id }); 
                loadOrders(); 
                loadStats(); 
            }
        }

        // ==================== IMAGE FUNCTIONS ====================
        function uploadImage(index) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const result = await apiCall('uploadImage', { 
                        base64Data: e.target.result, 
                        fileName: file.name 
                    });
                    if (result?.success) {
                        const p = products[index];
                        if (!p.images) p.images = [];
                        p.images.push({ id: result.fileId, url: result.url });
                        await apiCall('saveProduct', { data: p });
                        loadProducts();
                    }
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        function openImageModal(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').classList.add('show');
            document.getElementById('modalOverlay').classList.add('show');
        }
        
        function closeImageModal() {
            document.getElementById('imageModal').classList.remove('show');
            document.getElementById('modalOverlay').classList.remove('show');
        }

        // ==================== TAB SWITCHING ====================
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            if (tab === 'products') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('productsTab').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('ordersTab').classList.add('active');
            }
        }

        // ==================== INITIALIZATION ====================
        window.onload = () => { 
            loadStats(); 
            loadProducts(); 
            loadOrders(); 
            setInterval(() => { 
                loadStats(); 
                loadProducts(); 
                loadOrders(); 
            }, 30000); 
        };
    </script>
</body>
</html>
