<!DOCTYPE html>
<html>

<body>

<h2>Track Order</h2>

<input id="orderId" placeholder="Enter Order ID">

<button onclick="track()">Track</button>

<div id="result"></div>

<script>

const API="PASTE_API_URL";

function track(){

let id=document.getElementById("orderId").value;

fetch(API+"?action=track&id="+id)

.then(r=>r.json())

.then(data=>{

document.getElementById("result").innerText=
JSON.stringify(data,null,2);

});

}

</script>

</body>

</html>
