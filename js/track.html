<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
</head>
<body>
    <header>
        <div class="logo">STYLE OF LIFE</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="cart.html">Cart</a>
            <a href="track.html">Track Order</a>
        </nav>
    </header>

    <div style="max-width:500px; margin:100px auto; padding:40px; background:#1a1a1a; border-radius:15px; text-align:center">
        <h2 style="color:#d4af37; margin-bottom:20px">Track Your Order</h2>
        <input type="text" id="orderId" placeholder="Enter Order ID" style="width:100%; padding:12px; background:#333; border:1px solid #444; border-radius:6px; color:white; margin-bottom:15px">
        <button onclick="trackOrder()" style="padding:12px">Track Order</button>
        <div id="trackingResult" style="margin-top:30px"></div>
    </div>

    <footer>
        © 2026 Style Of Life Jewelry
    </footer>

    <script>
        async function trackOrder() {
            const orderId = document.getElementById('orderId').value;
            if (!orderId) {
                alert('Please enter order ID');
                return;
            }
            
            try {
                const response = await fetch(`${CONFIG.API_URL}?action=track&id=${orderId}`);
                const data = await response.json();
                
                const resultDiv = document.getElementById('trackingResult');
                
                if (data.error) {
                    resultDiv.innerHTML = `<p style="color:#f44336">Order not found</p>`;
                } else {
                    resultDiv.innerHTML = `
                        <div style="background:#222; padding:20px; border-radius:10px">
                            <p><strong>Order ID:</strong> ${data.orderId}</p>
                            <p><strong>Status:</strong> <span style="color:#d4af37">${data.status}</span></p>
                            <p><strong>Total:</strong> ₹${data.total}</p>
                            <p><strong>Date:</strong> ${new Date(data.date).toLocaleDateString()}</p>
                        </div>
                    `;
                }
            } catch (error) {
                alert('Error tracking order');
            }
        }
    </script>
</body>
</html>
