<!DOCTYPE html>
<html>

<head>

<title>Style Of Life Jewelry</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.card{

background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px #ddd;

}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

</style>

</head>

<body>

<h1>Luxury Jewelry</h1>

<div class="products" id="products"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbxovON-ZuRQ_zILbaDl739-c7XdVF7-PVZTPoq15dctzK3n9OqaV6ztPsDjayOYPY8v6Q/exec";

fetch(API+"?action=products")

.then(res=>res.json())

.then(data=>{

let html="";

data.forEach(p=>{

html+=`

<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<p>₹${p.price}</p>

<p>Stock : ${p.stock}</p>

</div>

`;

});

document.getElementById("products").innerHTML=html;

});

</script>

</body>
</html>
