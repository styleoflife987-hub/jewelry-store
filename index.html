<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Of Life - Luxury Jewelry</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Product Gallery Styles */
        .product-gallery {
            position: relative;
            width: 100%;
            height: 300px;
            overflow: hidden;
        }
        
        .gallery-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        .gallery-main {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }
        
        .gallery-thumbnails {
            display: flex;
            gap: 5px;
            padding: 10px;
            background: rgba(0,0,0,0.8);
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            justify-content: center;
            z-index: 10;
        }
        
        .thumbnail {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
            border: 2px solid transparent;
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.3s ease;
        }
        
        .thumbnail:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        
        .thumbnail.active {
            border-color: #d4af37;
            opacity: 1;
        }
        
        .image-counter {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 10;
        }
        
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .product-gallery:hover .nav-arrow {
            opacity: 1;
        }
        
        .nav-arrow:hover {
            background: rgba(212, 175, 55, 0.8);
        }
        
        .nav-arrow.left {
            left: 10px;
        }
        
        .nav-arrow.right {
            right: 10px;
        }
        
        .no-images {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2a2a2a;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">✨ STYLE OF LIFE</div>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="cart.html">Cart <span class="cart-count" id="cartCount">0</span></a>
            <a href="track.html">Track Order</a>
        </nav>
    </header>

    <div class="hero">
        <h1>Luxury Jewelry Collection</h1>
        <p>Discover Premium Handcrafted Jewelry</p>
    </div>

    <footer>
        <p>© 2026 Style Of Life Jewelry. All rights reserved.</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
