<!DOCTYPE html>
<html>

<head>

<title>Style Of Life Jewelry</title>

<style>

body{

font-family:Arial;
background:#f4f4f4;
padding:20px;

}

.products{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;

}

.card{

background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px #ddd;

}

.card img{

width:100%;
height:200px;
object-fit:cover;

}

button{

background:#c9a227;
color:white;
border:none;
padding:10px;
width:100%;
cursor:pointer;

}

</style>

</head>

<body>

<h1>Luxury Jewelry</h1>

<div class="products" id="products"></div>

<script>

const API="PASTE_SCRIPT_URL";

fetch(API+"?action=products")

.then(res=>res.json())

.then(data=>{

let html="";

data.forEach(p=>{

html+=`

<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<p>₹${p.price}</p>

<button onclick="add('${p.name}',${p.price})">Order</button>

</div>

`;

});

document.getElementById("products").innerHTML=html;

});

function add(name,price){

let customer=prompt("Customer Name");

let phone=prompt("Phone");

let address=prompt("Address");

let order={

action:"placeOrder",

customer:customer,

phone:phone,

address:address,

items:[{name:name,price:price}],

total:price

};

fetch(API,{

method:"POST",

body:JSON.stringify(order)

})

.then(()=>alert("Order placed"));

}

</script>

</body>
</html>
