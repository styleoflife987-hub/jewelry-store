<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Of Life - Luxury Jewelry</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Gallery Styles */
        .product-gallery {
            position: relative;
            width: 100%;
            height: 300px;
            overflow: hidden;
            background: #2a2a2a;
        }
        
        .gallery-main {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s;
        }
        
        .gallery-thumbnails {
            display: flex;
            gap: 5px;
            padding: 10px;
            background: rgba(0,0,0,0.8);
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .thumbnail {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
            border: 2px solid transparent;
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.3s;
        }
        
        .thumbnail:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        
        .thumbnail.active {
            border-color: #d4af37;
            opacity: 1;
        }
        
        .image-counter {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 10;
        }
        
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .product-gallery:hover .nav-arrow {
            opacity: 1;
        }
        
        .nav-arrow:hover {
            background: #d4af37;
            color: black;
        }
        
        .nav-arrow.left {
            left: 10px;
        }
        
        .nav-arrow.right {
            right: 10px;
        }
        
        .no-images {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 14px;
        }

        .debug-info {
            background: #1a1a1a;
            color: #888;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            font-size: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">✨ STYLE OF LIFE</div>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="cart.html">Cart <span class="cart-count" id="cartCount">0</span></a>
            <a href="track.html">Track Order</a>
        </nav>
    </header>

    <!-- Debug Info (hidden by default) -->
    <div id="debugInfo" class="debug-info"></div>

    <div class="hero">
        <h1>Luxury Jewelry Collection</h1>
        <p>Discover Premium Handcrafted Jewelry</p>
    </div>

    <div class="products" id="products">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>Loading products...</p>
        </div>
    </div>

    <footer>
        <p>© 2026 Style Of Life Jewelry. All rights reserved.</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/cart.js"></script>
    <script>
        // Main app code
        let products = [];

        document.addEventListener('DOMContentLoaded', function() {
            console.log('✅ Customer portal loaded');
            loadProducts();
            updateCartCount();
        });

        function loadProducts() {
            const container = document.getElementById('products');
            const debugDiv = document.getElementById('debugInfo');
            
            try {
                // Load products from localStorage
                const storedProducts = localStorage.getItem('products');
                console.log('Raw products from localStorage:', storedProducts);
                
                if (storedProducts) {
                    products = JSON.parse(storedProducts);
                    console.log('Parsed products:', products);
                    
                    if (products.length > 0) {
                        console.log(`✅ Loaded ${products.length} products`);
                        displayProducts(products);
                    } else {
                        console.log('⚠️ No products found in localStorage');
                        container.innerHTML = '<div class="error-message">No products available. Please check back later.</div>';
                    }
                } else {
                    console.log('⚠️ No products key in localStorage');
                    container.innerHTML = '<div class="error-message">No products found. Please add products in admin panel.</div>';
                }
                
                // Show debug info (remove in production)
                debugDiv.style.display = 'block';
                debugDiv.innerHTML = `
                    <strong>Debug Info:</strong><br>
                    Products in storage: ${products.length}<br>
                    First product: ${products[0] ? products[0].name : 'None'}<br>
                    Last updated: ${new Date().toLocaleTimeString()}
                `;
                
            } catch (error) {
                console.error('❌ Error loading products:', error);
                container.innerHTML = '<div class="error-message">Error loading products. Please refresh the page.</div>';
            }
        }

        function displayProducts(products) {
            const container = document.getElementById('products');
            if (!container) return;
            
            if (!products || products.length === 0) {
                container.innerHTML = '<div class="error-message">No products available</div>';
                return;
            }
            
            let html = '';
            
            products.forEach(product => {
                const price = Number(product.price) || 0;
                const stock = Number(product.stock) || 0;
                const sku = product.sku || `SKU${product.id}`;
                
                // Get images array (ensure 5 slots)
                const images = product.images || Array(5).fill('');
                
                // Filter out empty URLs
                const validImages = images.filter(url => url && url.trim() !== '');
                const hasImages = validImages.length > 0;
                
                // Use first valid image or placeholder
                const mainImage = validImages[0] || CONFIG.PLACEHOLDER_IMAGE;
                
                html += `
                    <div class="card" data-product-id="${product.id}">
                        <div class="product-gallery" id="gallery-${product.id}">
                            ${hasImages ? `
                                <button class="nav-arrow left" onclick="changeImage('${product.id}', -1)">←</button>
                                <button class="nav-arrow right" onclick="changeImage('${product.id}', 1)">→</button>
                                
                                <img src="${mainImage}" 
                                     class="gallery-main" 
                                     id="main-${product.id}"
                                     alt="${product.name}"
                                     onerror="this.src='${CONFIG.PLACEHOLDER_IMAGE}'">
                                
                                <div class="image-counter" id="counter-${product.id}">
                                    1 / ${validImages.length}
                                </div>
                                
                                <div class="gallery-thumbnails">
                                    ${validImages.map((img, idx) => `
                                        <img src="${img}" 
                                             class="thumbnail ${idx === 0 ? 'active' : ''}" 
                                             onclick="setMainImage('${product.id}', ${idx})"
                                             onerror="this.style.display='none'">
                                    `).join('')}
                                </div>
                            ` : `
                                <img src="${CONFIG.PLACEHOLDER_IMAGE}" 
                                     class="gallery-main"
                                     alt="${product.name}">
                                <div class="no-images">No images available</div>
                            `}
                        </div>
                        
                        <div class="product-info">
                            <p class="sku">SKU: ${sku}</p>
                            <h3>${product.name}</h3>
                            <p class="category">${product.category || CONFIG.DEFAULT_CATEGORY}</p>
                            <div class="price">${CONFIG.CURRENCY}${price.toLocaleString('en-IN')}</div>
                            <p class="stock ${stock > 0 ? 'in-stock' : 'out-of-stock'}">
                                ${stock > 0 ? `In Stock (${stock})` : 'Out of Stock'}
                            </p>
                            <button onclick="addToCart('${sku}', '${product.name.replace(/'/g, "\\'")}', ${price}, '${mainImage}')" 
                                    class="add-to-cart-btn"
                                    ${stock <= 0 ? 'disabled' : ''}>
                                Add to Cart
                            </button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            
            // Initialize gallery data
            window.galleryData = {};
            products.forEach(product => {
                window.galleryData[product.id] = {
                    currentIndex: 0,
                    images: (product.images || []).filter(url => url && url.trim() !== '')
                };
            });
        }

        // Gallery functions
        window.changeImage = function(productId, direction) {
            if (!window.galleryData || !window.galleryData[productId]) return;
            
            const gallery = window.galleryData[productId];
            if (gallery.images.length === 0) return;
            
            let newIndex = gallery.currentIndex + direction;
            if (newIndex < 0) newIndex = gallery.images.length - 1;
            if (newIndex >= gallery.images.length) newIndex = 0;
            
            setMainImage(productId, newIndex);
        };

        window.setMainImage = function(productId, index) {
            if (!window.galleryData || !window.galleryData[productId]) return;
            
            const gallery = window.galleryData[productId];
            if (!gallery.images[index]) return;
            
            // Update main image
            const mainImg = document.getElementById(`main-${productId}`);
            if (mainImg) {
                mainImg.src = gallery.images[index];
            }
            
            // Update counter
            const counter = document.getElementById(`counter-${productId}`);
            if (counter) {
                counter.textContent = `${index + 1} / ${gallery.images.length}`;
            }
            
            // Update thumbnails
            const thumbnails = document.querySelectorAll(`#gallery-${productId} .thumbnail`);
            thumbnails.forEach((thumb, idx) => {
                if (idx === index) {
                    thumb.classList.add('active');
                } else {
                    thumb.classList.remove('active');
                }
            });
            
            // Update current index
            gallery.currentIndex = index;
        };

        // Add to cart function
        window.addToCart = function(sku, name, price, image) {
            if (!sku) {
                alert('Error: Invalid product');
                return false;
            }
            
            price = Number(price);
            if (isNaN(price) || price <= 0) {
                alert('Error: Invalid price');
                return false;
            }
            
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            
            const existingIndex = cart.findIndex(item => item.sku === sku);
            
            if (existingIndex >= 0) {
                cart[existingIndex].quantity = (cart[existingIndex].quantity || 1) + 1;
            } else {
                cart.push({
                    sku: sku,
                    name: name || 'Product',
                    price: price,
                    image: image || CONFIG.PLACEHOLDER_IMAGE,
                    quantity: 1
                });
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            alert(`${name} added to cart!`);
            return true;
        };

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const count = cart.reduce((total, item) => total + (item.quantity || 1), 0);
            
            document.querySelectorAll('.cart-count, #cartCount').forEach(el => {
                if (el) {
                    el.textContent = count;
                    el.style.display = count > 0 ? 'inline-block' : 'none';
                }
            });
        }
    </script>
</body>
</html>
