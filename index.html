<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Of Life - Luxury Jewelry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .loading-spinner { text-align: center; padding: 100px; }
        .spinner { width: 50px; height: 50px; border: 3px solid #f3f3f3; border-top: 3px solid #d4af37; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .sync-status { position: fixed; bottom: 20px; right: 20px; background: #1a1a1a; color: #4caf50; padding: 5px 12px; border-radius: 20px; font-size: 12px; z-index: 1000; }
        .retry-btn { background: #d4af37; color: black; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body class="customer">
    <header class="customer-header">
        <div class="customer-logo">STYLE OF LIFE</div>
        <nav class="customer-nav">
            <a href="index.html" class="active">Home</a>
            <a href="cart.html">Cart <span class="cart-count" id="cartCount">0</span></a>
            <a href="track.html">Track Order</a>
        </nav>
    </header>

    <div class="customer-hero" style="background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?auto=format&fit=crop&w=2000');">
        <div class="customer-hero-content">
            <h1>Luxury Jewelry</h1>
            <p>Discover exquisite handcrafted pieces for the discerning collector</p>
        </div>
    </div>

    <div class="customer-products" id="products">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>Loading products from cloud...</p>
        </div>
    </div>

    <div class="sync-status" id="syncStatus">🟢 Live Online</div>

    <footer style="background: var(--darker); color: white; text-align: center; padding: 60px; margin-top: 60px;">
        <p>© 2026 STYLE OF LIFE. All rights reserved.</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        let cart = [];

        document.addEventListener('DOMContentLoaded', async function() {
            await loadProducts();
            await loadCart();
            updateCartCount();
            
            // Auto-refresh every 30 seconds
            setInterval(loadProducts, 30000);
        });

        async function loadProducts() {
            const container = document.getElementById('products');
            const products = await getProducts();
            
            if (products.error) {
                container.innerHTML = `<div style="text-align:center; padding:100px;"><p style="color:#dc3545;">Failed to load products</p><button class="retry-btn" onclick="loadProducts()">Retry</button></div>`;
                return;
            }
            
            if (!products || products.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 100px;">No products available</div>';
                return;
            }
            
            let html = '';
            products.forEach(product => {
                const price = Number(product.price) || 0;
                const stock = Number(product.stock) || 0;
                const images = product.images || [];
                const mainImage = images[0] || 'https://via.placeholder.com/400x500?text=No+Image';
                
                html += `
                    <div class="customer-card">
                        <div class="customer-card-image">
                            <img src="${mainImage}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/400x500?text=No+Image'">
                        </div>
                        <div class="customer-card-info">
                            <div class="sku">${product.sku}</div>
                            <h3>${product.name}</h3>
                            <div class="category">${product.category || ''}</div>
                            <div class="price">₹${price.toLocaleString('en-IN')}</div>
                            <div class="stock ${stock > 0 ? 'in-stock' : 'out-of-stock'}">
                                ${stock > 0 ? `In Stock (${stock})` : 'Out of Stock'}
                            </div>
                            <button onclick="addToCart('${product.sku}', '${product.name.replace(/'/g, "\\'")}', ${price}, '${mainImage}')" 
                                    class="customer-btn"
                                    ${stock <= 0 ? 'disabled' : ''}>
                                Add to Cart
                            </button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        async function loadCart() {
            const cartData = await getCart();
            cart = cartData.items || [];
            updateCartCount();
            if (window.location.pathname.includes('cart.html')) displayCart();
        }

        async function saveCartToCloud() {
            const total = cart.reduce((sum, i) => sum + (i.price * (i.quantity || 1)), 0);
            await saveCart(cart, total);
        }

        async function addToCart(sku, name, price, image) {
            if (!sku) return false;
            price = Number(price);
            if (isNaN(price) || price <= 0) return false;
            
            const existingIndex = cart.findIndex(item => item.sku === sku);
            if (existingIndex >= 0) {
                cart[existingIndex].quantity = (cart[existingIndex].quantity || 1) + 1;
            } else {
                cart.push({ sku, name, price, image: image || '', quantity: 1 });
            }
            
            await saveCartToCloud();
            updateCartCount();
            showNotification(`${name} added to cart!`);
            return true;
        }

        async function removeFromCart(sku) {
            cart = cart.filter(item => item.sku !== sku);
            await saveCartToCloud();
            updateCartCount();
            if (window.location.pathname.includes('cart.html')) displayCart();
        }

        async function updateQuantity(sku, newQuantity) {
            const index = cart.findIndex(item => item.sku === sku);
            if (index === -1) return;
            
            newQuantity = parseInt(newQuantity);
            if (isNaN(newQuantity) || newQuantity < 1) {
                cart.splice(index, 1);
            } else {
                if (newQuantity > 10) newQuantity = 10;
                cart[index].quantity = newQuantity;
            }
            
            await saveCartToCloud();
            if (window.location.pathname.includes('cart.html')) displayCart();
        }

        async function clearCart() {
            if (cart.length === 0) return alert('Cart is empty');
            if (confirm('Clear cart?')) {
                cart = [];
                await saveCartToCloud();
                updateCartCount();
                if (window.location.pathname.includes('cart.html')) displayCart();
            }
        }

        function updateCartCount() {
            const count = cart.reduce((total, item) => total + (item.quantity || 1), 0);
            document.querySelectorAll('.cart-count, #cartCount').forEach(el => {
                if (el) {
                    el.textContent = count;
                    el.style.display = count > 0 ? 'inline-block' : 'none';
                }
            });
        }

        function displayCart() {
            const container = document.getElementById('cartItems');
            const subtotalEl = document.getElementById('cartSubtotal');
            const taxEl = document.getElementById('cartTax');
            const totalEl = document.getElementById('cartTotal');
            
            if (!container) return;
            
            if (cart.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 60px;">Your cart is empty</div>';
                if (subtotalEl) subtotalEl.textContent = '0';
                if (taxEl) taxEl.textContent = '0';
                if (totalEl) totalEl.textContent = '0';
                return;
            }
            
            let html = '', subtotal = 0;
            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;
                html += `
                    <div class="cart-item">
                        ${item.image ? `<img src="${item.image}" alt="${item.name}">` : '<div style="width:100px; height:100px; background:#f8f9fa;"></div>'}
                        <div><h4>${item.name}</h4><p style="color:#6c757d;">SKU: ${item.sku}</p></div>
                        <div style="color:var(--primary); font-weight:600;">₹${item.price.toLocaleString()}</div>
                        <div><input type="number" value="${item.quantity}" min="1" max="10" onchange="updateQuantity('${item.sku}', this.value)" style="width:60px; padding:5px; border:1px solid #dee2e6; border-radius:4px;"></div>
                        <div style="font-weight:600;">₹${itemTotal.toLocaleString()}</div>
                        <button onclick="removeFromCart('${item.sku}')" style="background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
                    </div>`;
            });
            container.innerHTML = html;
            
            const tax = Math.round(subtotal * 0.18);
            const total = subtotal + tax + 100;
            if (subtotalEl) subtotalEl.textContent = subtotal.toLocaleString();
            if (taxEl) taxEl.textContent = tax.toLocaleString();
            if (totalEl) totalEl.textContent = total.toLocaleString();
        }
        
        window.displayCart = displayCart;
        window.updateCartCount = updateCartCount;
        window.clearCart = clearCart;
        window.addToCart = addToCart;
        window.removeFromCart = removeFromCart;
        window.updateQuantity = updateQuantity;
    </script>
</body>
</html>
