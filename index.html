<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Of Life - Luxury Jewelry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="customer">
    <header class="customer-header">
        <div class="customer-logo">STYLE OF LIFE</div>
        <nav class="customer-nav">
            <a href="index.html" class="active">Home</a>
            <a href="cart.html">Cart <span class="cart-count" id="cartCount">0</span></a>
            <a href="track.html">Track Order</a>
        </nav>
    </header>

    <div class="customer-hero" style="background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?auto=format&fit=crop&w=2000');">
        <div class="customer-hero-content">
            <h1>Luxury Jewelry</h1>
            <p>Discover exquisite handcrafted pieces for the discerning collector</p>
        </div>
    </div>

    <div class="customer-products" id="products">
        <div class="loading-spinner"><div class="spinner"></div><p>Loading products...</p></div>
    </div>

    <footer style="background: var(--darker); color: white; text-align: center; padding: 60px; margin-top: 60px;">
        <p>© 2026 STYLE OF LIFE. All rights reserved.</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        let cart = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await loadProducts();
            await loadCart();
            updateCartCount();
        });

        async function loadProducts() {
            const products = await getProducts();
            const container = document.getElementById('products');
            
            if (!products || products.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:100px;">No products available</div>';
                return;
            }
            
            let html = '';
            products.forEach(p => {
                const price = Number(p.price) || 0;
                const stock = Number(p.stock) || 0;
                const img = (p.images?.[0]) || 'https://via.placeholder.com/400x500?text=No+Image';
                html += `
                    <div class="customer-card">
                        <div class="customer-card-image"><img src="${img}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/400x500?text=No+Image'"></div>
                        <div class="customer-card-info">
                            <div class="sku">${p.sku}</div>
                            <h3>${p.name}</h3>
                            <div class="category">${p.category || ''}</div>
                            <div class="price">₹${price.toLocaleString('en-IN')}</div>
                            <div class="stock ${stock > 0 ? 'in-stock' : 'out-of-stock'}">${stock > 0 ? `In Stock (${stock})` : 'Out of Stock'}</div>
                            <button onclick="addToCart('${p.sku}', '${p.name.replace(/'/g, "\\'")}', ${price}, '${img}')" class="customer-btn" ${stock <= 0 ? 'disabled' : ''}>Add to Cart</button>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        async function loadCart() {
            const data = await getCart();
            cart = data.items || [];
            updateCartCount();
        }

        async function saveCartToCloud() {
            const total = cart.reduce((s, i) => s + (i.price * (i.quantity || 1)), 0);
            await saveCart(cart, total);
        }

        async function addToCart(sku, name, price, image) {
            const existing = cart.find(i => i.sku === sku);
            if (existing) existing.quantity = (existing.quantity || 1) + 1;
            else cart.push({ sku, name, price, image, quantity: 1 });
            await saveCartToCloud();
            updateCartCount();
            showNotification(`${name} added to cart!`);
        }

        function updateCartCount() {
            const count = cart.reduce((t, i) => t + (i.quantity || 1), 0);
            document.querySelectorAll('.cart-count, #cartCount').forEach(el => {
                if (el) { el.textContent = count; el.style.display = count > 0 ? 'inline-block' : 'none'; }
            });
        }
    </script>
</body>
</html>
