<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Of Life - Luxury Jewelry</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .loading-spinner {
            text-align: center;
            padding: 100px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #c5a059;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            text-align: center;
            padding: 100px;
            color: #dc3545;
        }
        
        .retry-btn {
            background: #c5a059;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body class="customer">
    <header class="customer-header">
        <div class="customer-logo">STYLE OF LIFE</div>
        <nav class="customer-nav">
            <a href="index.html" class="active">Home</a>
            <a href="cart.html">Cart <span class="cart-count" id="cartCount">0</span></a>
            <a href="track.html">Track Order</a>
        </nav>
    </header>

    <div class="customer-hero" style="background-image: linear-gradient(135deg, rgba(44,44,44,0.7) 0%, rgba(139,115,85,0.7) 100%), url('https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?auto=format&fit=crop&w=2000');">
        <div class="customer-hero-content">
            <h1>Luxury Jewelry</h1>
            <p>Discover exquisite handcrafted pieces for the discerning collector</p>
        </div>
    </div>

    <div class="customer-products" id="products">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>Loading products from cloud...</p>
        </div>
    </div>

    <footer style="text-align: center; padding: 60px; background: var(--customer-charcoal); color: var(--customer-cream); margin-top: 60px;">
        <p style="font-size: 14px; letter-spacing: 2px;">© 2026 STYLE OF LIFE. ALL RIGHTS RESERVED.</p>
        <p style="font-size: 12px; margin-top: 20px; color: #888;">HANDCRAFTED LUXURY</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/cart.js"></script>
    <script>
        let products = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadProductsFromCloud();
            updateCartCount();
            
            // Refresh every 30 seconds
            setInterval(loadProductsFromCloud, 30000);
        });

        async function loadProductsFromCloud() {
            const container = document.getElementById('products');
            
            try {
                const response = await fetch(`${CONFIG.API_URL}?action=getProducts&t=${Date.now()}`);
                const data = await response.json();
                
                if (Array.isArray(data)) {
                    products = data;
                    // Save to localStorage as backup
                    localStorage.setItem('products', JSON.stringify(products));
                    displayProducts(products);
                } else {
                    throw new Error('Invalid data from cloud');
                }
            } catch (error) {
                console.error('Cloud fetch failed, using local backup:', error);
                
                // Fallback to localStorage
                const storedProducts = localStorage.getItem('products');
                if (storedProducts) {
                    products = JSON.parse(storedProducts);
                    displayProducts(products);
                } else {
                    container.innerHTML = `
                        <div class="error-message">
                            <p>Unable to load products. Please check your connection.</p>
                            <button class="retry-btn" onclick="loadProductsFromCloud()">Retry</button>
                        </div>
                    `;
                }
            }
        }

        function displayProducts(products) {
            const container = document.getElementById('products');
            if (!container) return;
            
            if (!products || products.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 100px; color: #888;">No products available</div>';
                return;
            }
            
            let html = '';
            
            products.forEach(product => {
                const price = Number(product.price) || 0;
                const stock = Number(product.stock) || 0;
                const sku = product.sku || `SKU${product.id}`;
                
                const images = product.images || [];
                const mainImage = images[0] || 'https://via.placeholder.com/400x500?text=No+Image';
                
                html += `
                    <div class="customer-card" data-product-id="${product.id}">
                        <div class="customer-card-image">
                            <img src="${mainImage}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/400x500?text=No+Image'">
                        </div>
                        <div class="customer-card-info">
                            <div class="sku">${sku}</div>
                            <h3>${product.name}</h3>
                            <div class="category">${product.category || ''}</div>
                            <div class="price">₹${price.toLocaleString('en-IN')}</div>
                            <div class="stock ${stock > 0 ? 'in-stock' : 'out-of-stock'}">
                                ${stock > 0 ? `In Stock (${stock})` : 'Out of Stock'}
                            </div>
                            <button onclick="addToCart('${sku}', '${product.name.replace(/'/g, "\\'")}', ${price}, '${mainImage}')" 
                                    class="customer-btn"
                                    ${stock <= 0 ? 'disabled' : ''}>
                                Add to Cart
                            </button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
    </script>
</body>
</html>
