<!DOCTYPE html>
<html>

<head>

<title>Style Of Life Jewelry</title>

<style>

body{
font-family:Arial;
background:#fafafa;
padding:20px;
}

h1{
text-align:center;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.card{

background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 10px #ddd;

}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

button{

background:#c9a227;
border:none;
padding:10px;
color:white;
width:100%;
cursor:pointer;

}

</style>

</head>

<body>

<h1>Luxury Jewelry</h1>

<div class="products" id="products"></div>

<script>

const API="PASTE_SCRIPT_URL";

fetch(API+"?action=products")
.then(r=>r.json())
.then(data=>{

let html="";

data.forEach(p=>{

html+=`

<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<p>₹${p.price}</p>

<button onclick="order('${p.name}',${p.price})">Buy Now</button>

</div>

`;

});

document.getElementById("products").innerHTML=html;

});

function order(name,price){

let customer=prompt("Name");
let phone=prompt("Phone");
let address=prompt("Address");

let data={

action:"placeOrder",
customer:customer,
phone:phone,
address:address,
items:[{name:name,price:price}],
total:price

};

fetch(API,{
method:"POST",
body:JSON.stringify(data)
})
.then(()=>alert("Order placed successfully"));

}

</script>

</body>
</html>
