<!DOCTYPE html>
<html>
<head>

<title>Style Of Life Jewelry</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f8f8f8;
}

header{
background:black;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
color:#d4af37;
}

.search{
padding:8px;
width:200px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 2px 10px #ddd;
overflow:hidden;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
padding:10px;
margin:0;
}

.price{
padding:0 10px;
color:#c9a227;
font-weight:bold;
}

button{
background:#c9a227;
border:none;
padding:10px;
color:white;
width:100%;
cursor:pointer;
}

.cart{
position:fixed;
right:20px;
bottom:20px;
background:black;
color:white;
padding:12px;
border-radius:50px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<div class="logo">Style Of Life</div>

<input class="search" placeholder="Search..." onkeyup="searchProduct(this.value)">

</header>

<div class="products" id="products"></div>

<div class="cart" onclick="openCart()">
Cart (<span id="cartCount">0</span>)
</div>

<script>

const API="https://script.google.com/macros/s/AKfycby3wzak-aaQ66x5UKbC2_htO6H-qt9dp0eEsyUblO2_5X5t5b1Nd0FtZY4HCiaV6QBf_g/exec";

let products=[];
let cart=[];

fetch(API+"?action=products")
.then(r=>r.json())
.then(data=>{
products=data;
showProducts(products);
});

function showProducts(list){

let html="";

list.forEach(p=>{

html+=`

<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<div class="price">₹${p.price}</div>

<button onclick="addCart('${p.name}',${p.price})">
Add To Cart
</button>

</div>

`;

});

document.getElementById("products").innerHTML=html;

}

function searchProduct(q){

let filtered=products.filter(p=>
p.name.toLowerCase().includes(q.toLowerCase())
);

showProducts(filtered);

}

function addCart(name,price){

cart.push({name,price});

document.getElementById("cartCount").innerText=cart.length;

alert("Added to cart");

}

function openCart(){

let total=0;

let items="";

cart.forEach(i=>{
total+=i.price;
items+=i.name+" ₹"+i.price+"\n";
});

let customer=prompt("Name");
let phone=prompt("Phone");
let address=prompt("Address");

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"placeOrder",
customer:customer,
phone:phone,
address:address,
items:cart,
total:total
})
})
.then(()=>{

alert("Order Placed");

cart=[];
document.getElementById("cartCount").innerText=0;

});

}

</script>

</body>
</html>
