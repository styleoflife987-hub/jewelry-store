<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Of Life - Luxury Jewelry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .loading-spinner {
            text-align: center;
            padding: 100px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .sync-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1a1a;
            color: #888;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 1000;
        }
    </style>
</head>
<body class="customer">
    <header class="customer-header">
        <div class="customer-logo">STYLE OF LIFE</div>
        <nav class="customer-nav">
            <a href="index.html" class="active">Home</a>
            <a href="cart.html">Cart <span class="cart-count" id="cartCount">0</span></a>
            <a href="track.html">Track Order</a>
        </nav>
    </header>

    <div class="customer-hero" style="background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?auto=format&fit=crop&w=2000');">
        <div class="customer-hero-content">
            <h1>Luxury Jewelry</h1>
            <p>Discover exquisite handcrafted pieces for the discerning collector</p>
        </div>
    </div>

    <div class="customer-products" id="products">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>Loading products from cloud...</p>
        </div>
    </div>

    <div class="sync-status" id="syncStatus">🟢 Live Sync</div>

    <footer style="background: var(--darker); color: white; text-align: center; padding: 60px; margin-top: 60px;">
        <p>© 2026 STYLE OF LIFE. All rights reserved.</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/cloud-sync.js"></script>
    <script src="js/cart.js"></script>
    <script>
        let products = [];

        document.addEventListener('DOMContentLoaded', async function() {
            await loadAndDisplayProducts();
            updateCartCount();
        });

        async function loadAndDisplayProducts() {
            const cloudProducts = await loadProductsFromCloud();
            if (cloudProducts && cloudProducts.length > 0) {
                products = cloudProducts;
                displayProducts(products);
                document.getElementById('syncStatus').innerHTML = '🟢 Cloud Sync Active';
            } else {
                const storedProducts = localStorage.getItem('products');
                if (storedProducts) {
                    products = JSON.parse(storedProducts);
                    displayProducts(products);
                    document.getElementById('syncStatus').innerHTML = '🟡 Using Local Cache';
                } else {
                    document.getElementById('products').innerHTML = '<div style="text-align: center; padding: 100px;">No products available</div>';
                }
            }
        }

        window.displayProducts = function(products) {
            const container = document.getElementById('products');
            if (!products || products.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 100px;">No products available</div>';
                return;
            }
            
            let html = '';
            products.forEach(product => {
                const price = Number(product.price) || 0;
                const stock = Number(product.stock) || 0;
                const sku = product.sku || `SKU${product.id}`;
                const images = product.images || [];
                const mainImage = images[0] || 'https://via.placeholder.com/400x500?text=No+Image';
                
                html += `
                    <div class="customer-card">
                        <div class="customer-card-image">
                            <img src="${mainImage}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/400x500?text=No+Image'">
                        </div>
                        <div class="customer-card-info">
                            <div class="sku">${sku}</div>
                            <h3>${product.name}</h3>
                            <div class="category">${product.category || ''}</div>
                            <div class="price">₹${price.toLocaleString('en-IN')}</div>
                            <div class="stock ${stock > 0 ? 'in-stock' : 'out-of-stock'}">
                                ${stock > 0 ? `In Stock (${stock})` : 'Out of Stock'}
                            </div>
                            <button onclick="addToCart('${sku}', '${product.name.replace(/'/g, "\\'")}', ${price}, '${mainImage}')" 
                                    class="customer-btn"
                                    ${stock <= 0 ? 'disabled' : ''}>
                                Add to Cart
                            </button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        };
    </script>
</body>
</html>
