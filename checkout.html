<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
</head>
<body>
    <header>
        <div class="logo">STYLE OF LIFE</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="cart.html">Cart <span class="cart-count">0</span></a>
        </nav>
    </header>

    <div style="max-width:800px; margin:40px auto; padding:20px">
        <h1 style="color:#d4af37; margin-bottom:30px">Checkout</h1>
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:30px;">
            <div style="background:#1a1a1a; padding:30px; border-radius:15px;">
                <h3 style="color:#d4af37; margin-bottom:20px">Shipping Information</h3>
                
                <div style="margin-bottom:15px">
                    <label style="color:#d4af37; display:block; margin-bottom:5px">Full Name *</label>
                    <input type="text" id="name" placeholder="Enter your full name" 
                           style="width:100%; padding:12px; background:#333; border:1px solid #444; border-radius:6px; color:white;">
                </div>
                
                <div style="margin-bottom:15px">
                    <label style="color:#d4af37; display:block; margin-bottom:5px">Phone Number *</label>
                    <input type="tel" id="phone" placeholder="10 digit mobile number" 
                           style="width:100%; padding:12px; background:#333; border:1px solid #444; border-radius:6px; color:white;">
                </div>
                
                <div style="margin-bottom:15px">
                    <label style="color:#d4af37; display:block; margin-bottom:5px">Address *</label>
                    <textarea id="address" rows="3" placeholder="Complete address with pincode" 
                              style="width:100%; padding:12px; background:#333; border:1px solid #444; border-radius:6px; color:white;"></textarea>
                </div>
            </div>
            
            <div style="background:#1a1a1a; padding:30px; border-radius:15px;">
                <h3 style="color:#d4af37; margin-bottom:20px">Order Summary</h3>
                <div id="cartSummary"></div>
                
                <button onclick="processOrder()" style="margin-top:20px; padding:15px;">
                    Place Order
                </button>
            </div>
        </div>
    </div>

    <footer>
        © 2026 Style Of Life Jewelry
    </footer>

    <script src="js/cart.js"></script>
    <script>
        async function processOrder() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            
            if (!name || !phone || !address) {
                alert('Please fill all fields');
                return;
            }
            
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Processing...';
            
            const result = await placeOrder({ name, phone, address });
            
            if (result.success) {
                alert(`Order placed successfully! Order ID: ${result.orderId}`);
                window.location.href = `track.html?order=${result.orderId}`;
            } else {
                alert('Failed to place order: ' + (result.error || 'Unknown error'));
                btn.disabled = false;
                btn.textContent = 'Place Order';
            }
        }
    </script>
</body>
</html>
