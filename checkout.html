<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
</head>
<body>
    <header>
        <div class="logo">STYLE OF LIFE</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="cart.html">Cart</a>
        </nav>
    </header>

    <div style="max-width:600px; margin:40px auto; padding:30px; background:#1a1a1a; border-radius:15px">
        <h2 style="color:#d4af37; margin-bottom:30px">Checkout</h2>
        
        <div id="cartSummary" style="margin-bottom:30px"></div>
        
        <div style="margin-bottom:15px">
            <label style="color:#d4af37">Full Name</label>
            <input type="text" id="name" style="width:100%; padding:12px; background:#333; border:1px solid #444; border-radius:6px; color:white; margin-top:5px">
        </div>
        
        <div style="margin-bottom:15px">
            <label style="color:#d4af37">Phone Number</label>
            <input type="tel" id="phone" style="width:100%; padding:12px; background:#333; border:1px solid #444; border-radius:6px; color:white; margin-top:5px">
        </div>
        
        <div style="margin-bottom:15px">
            <label style="color:#d4af37">Address</label>
            <textarea id="address" rows="3" style="width:100%; padding:12px; background:#333; border:1px solid #444; border-radius:6px; color:white; margin-top:5px"></textarea>
        </div>
        
        <div style="margin:30px 0">
            <h3 style="color:#d4af37">Order Summary</h3>
            <div id="orderItems" style="margin:15px 0"></div>
            <h3>Total: ₹<span id="orderTotal">0</span></h3>
        </div>
        
        <button onclick="processCheckout()" style="padding:15px">Proceed to Payment</button>
    </div>

    <footer>
        © 2026 Style Of Life Jewelry
    </footer>

    <script src="js/cart.js"></script>
    <script src="js/payment.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const cart = JSON.parse(localStorage.getItem("cart") || "[]");
            const orderItems = document.getElementById('orderItems');
            const orderTotal = document.getElementById('orderTotal');
            
            if (cart.length === 0) {
                window.location.href = 'index.html';
                return;
            }
            
            let itemsHtml = '';
            let total = 0;
            
            cart.forEach(item => {
                itemsHtml += `
                    <div style="display:flex; justify-content:space-between; margin:10px 0">
                        <span>${item.name} x${item.quantity || 1}</span>
                        <span>₹${item.price * (item.quantity || 1)}</span>
                    </div>
                `;
                total += item.price * (item.quantity || 1);
            });
            
            orderItems.innerHTML = itemsHtml;
            orderTotal.textContent = total;
        });
        
        function processCheckout() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const total = document.getElementById('orderTotal').textContent;
            
            if (!name || !phone || !address) {
                alert('Please fill all fields');
                return;
            }
            
            payNow(total, { name, phone, address });
        }
    </script>
</body>
</html>
