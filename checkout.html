<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Checkout - Style Of Life | Secure Luxury Jewelry Purchase</title>
    <meta name="description" content="Complete your secure checkout for premium handcrafted jewelry. Free shipping on orders above ₹50,000. 100% secure payment.">
    <meta name="robots" content="noindex, follow">
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --gold: #E8C47E; --gold-dark: #D4AF37; --gold-light: #F5E6C6; --charcoal: #2C2C2C; --dark: #1A1A1A; --light: #FFFFFF; --cream: #FAF7F2; --danger: #dc3545; --success: #28a745; }
        body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--charcoal); }
        
        .logo { display: inline-flex; align-items: center; justify-content: center; position: relative; }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; letter-spacing: 3px; background: linear-gradient(135deg, #C9A87C 0%, #E8C47E 50%, #D4AF37 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo-line { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 40px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), var(--gold-dark), var(--gold), transparent); transition: width 0.4s ease; }
        .logo-line-bottom { position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); width: 40px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), var(--gold-dark), var(--gold), transparent); transition: width 0.4s ease; }
        .logo:hover .logo-line, .logo:hover .logo-line-bottom { width: 80px; }
        .logo-container { display: flex; align-items: center; background: rgba(255,255,255,0.95); padding: 8px 28px; border-radius: 50px; backdrop-filter: blur(8px); border: 1px solid rgba(212,175,55,0.15); }
        
        header { background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); padding: 18px 60px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(232,196,126,0.2); }
        nav { display: flex; gap: 45px; align-items: center; }
        nav a { color: var(--charcoal); text-decoration: none; font-weight: 500; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; transition: all 0.3s; position: relative; }
        nav a::before { content: ''; position: absolute; bottom: -8px; left: 0; width: 0; height: 2px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); transition: width 0.4s ease; }
        nav a:hover::before, nav a.active::before { width: 100%; }
        nav a:hover, nav a.active { color: var(--gold-dark); }
        .cart-count { background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: var(--dark); padding: 2px 8px; border-radius: 30px; font-size: 11px; font-weight: 700; margin-left: 8px; }
        
        .checkout-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .page-title { color: var(--gold-dark); margin-bottom: 30px; font-size: 32px; font-family: 'Playfair Display', serif; }
        .checkout-grid { display: grid; grid-template-columns: 1fr 380px; gap: 30px; }
        
        /* Form Styles */
        .checkout-form { background: white; border-radius: 24px; padding: 30px; border: 1px solid rgba(212,175,55,0.15); }
        .form-section { margin-bottom: 30px; }
        .form-section h3 { font-size: 18px; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid var(--gold); color: var(--charcoal); }
        .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--charcoal); font-size: 13px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 12px; font-size: 14px; transition: all 0.3s; font-family: 'Inter', sans-serif; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,175,55,0.1); }
        
        /* Order Summary */
        .order-summary { background: white; border-radius: 24px; padding: 30px; border: 1px solid rgba(212,175,55,0.15); position: sticky; top: 100px; }
        .summary-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--gold); }
        .order-items { max-height: 300px; overflow-y: auto; margin-bottom: 20px; }
        .order-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #efefef; }
        .order-item-name { font-size: 14px; }
        .order-item-price { font-weight: 500; color: var(--gold-dark); }
        .summary-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #efefef; }
        .summary-row.total { border-bottom: none; font-size: 18px; font-weight: 700; color: var(--gold-dark); padding-top: 15px; margin-top: 5px; }
        
        .place-order-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #D4AF37, #E8C47E); border: none; border-radius: 50px; color: #1A1A1A; font-weight: 700; cursor: pointer; margin-top: 20px; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .place-order-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(212,175,55,0.3); letter-spacing: 1.5px; }
        .place-order-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        
        .secure-badge { display: flex; justify-content: center; gap: 15px; margin-top: 20px; padding-top: 15px; border-top: 1px solid #efefef; font-size: 12px; color: #888; }
        
        footer { background: #1A1A1A; color: #aaa; text-align: center; padding: 40px; margin-top: 60px; }
        
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 12px; padding: 15px 20px; }
            .checkout-grid { grid-template-columns: 1fr; }
            .order-summary { position: static; margin-top: 20px; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <div class="logo">
                <div class="logo-line"></div>
                <div class="logo-text">STYLE<span>·</span>OF<span>·</span>LIFE</div>
                <div class="logo-line-bottom"></div>
            </div>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="cart.html">Cart <span class="cart-count" id="cartCount">0</span></a>
        </nav>
    </header>

    <div class="checkout-container">
        <h1 class="page-title">Secure Checkout</h1>
        <div class="checkout-grid">
            <div class="checkout-form">
                <div class="form-section">
                    <h3>Shipping Information</h3>
                    <div class="form-row">
                        <div class="form-group"><label>Full Name *</label><input type="text" id="fullName" placeholder="Enter your full name" required></div>
                        <div class="form-group"><label>Phone Number *</label><input type="tel" id="phone" placeholder="10 digit mobile number" maxlength="10" required></div>
                    </div>
                    <div class="form-group"><label>Email Address</label><input type="email" id="email" placeholder="your@email.com"></div>
                    <div class="form-group"><label>Street Address *</label><input type="text" id="address" placeholder="House number and street name" required></div>
                    <div class="form-row">
                        <div class="form-group"><label>City *</label><input type="text" id="city" placeholder="City" required></div>
                        <div class="form-group"><label>State *</label><input type="text" id="state" placeholder="State" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Pincode *</label><input type="text" id="pincode" placeholder="6 digit pincode" maxlength="6" required></div>
                        <div class="form-group"><label>Country</label><input type="text" id="country" value="India" readonly></div>
                    </div>
                </div>
                
                <div class="form-section">
                    <h3>Payment Method</h3>
                    <div class="form-group">
                        <select id="paymentMethod" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:12px;">
                            <option value="cod">Cash on Delivery (COD)</option>
                            <option value="card">Credit/Debit Card</option>
                            <option value="upi">UPI / Google Pay / PhonePe</option>
                            <option value="netbanking">Net Banking</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="order-summary" id="orderSummary">
                <div class="summary-title">Your Order</div>
                <div class="order-items" id="orderItems"></div>
                <div class="summary-row"><span>Subtotal</span><span>₹<span id="subtotal">0</span></span></div>
                <div class="summary-row"><span>Shipping</span><span id="shippingText">₹100</span></div>
                <div class="summary-row"><span>GST (18%)</span><span>₹<span id="tax">0</span></span></div>
                <div class="summary-row total"><span>Total</span><span>₹<span id="total">0</span></span></div>
                <button class="place-order-btn" id="placeOrderBtn" onclick="placeOrder()">Place Order</button>
                <div class="secure-badge">
                    <span>🔒 Secure SSL Encryption</span>
                    <span>💳 100% Secure Payment</span>
                    <span>🚚 Free Shipping*</span>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 STYLE OF LIFE. All rights reserved. | Luxury Jewelry Since 2020</p>
    </footer>

    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let cart = [];
        let sessionId = localStorage.getItem('sessionId');
        
        if (!sessionId) {
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('sessionId', sessionId);
        }
        
        async function loadCart() {
            const { data } = await supabase.from('carts').select('items').eq('session_id', sessionId).maybeSingle();
            cart = data?.items || [];
            updateCartCount();
            updateOrderSummary();
        }
        
        function updateCartCount() {
            const count = cart.reduce((t, i) => t + i.quantity, 0);
            document.getElementById('cartCount').textContent = count;
        }
        
        function updateOrderSummary() {
            let subtotal = 0;
            let itemsHtml = '';
            
            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;
                itemsHtml += `
                    <div class="order-item">
                        <div class="order-item-name">${item.name} <span style="color:#888;">x${item.quantity}</span></div>
                        <div class="order-item-price">₹${itemTotal.toLocaleString('en-IN')}</div>
                    </div>
                `;
            });
            
            const tax = Math.round(subtotal * 0.18);
            const shipping = subtotal >= 50000 ? 0 : 100;
            const total = subtotal + tax + shipping;
            
            document.getElementById('orderItems').innerHTML = itemsHtml || '<p style="text-align:center; padding:20px; color:#888;">Your cart is empty</p>';
            document.getElementById('subtotal').textContent = subtotal.toLocaleString('en-IN');
            document.getElementById('tax').textContent = tax.toLocaleString('en-IN');
            document.getElementById('total').textContent = total.toLocaleString('en-IN');
            document.getElementById('shippingText').textContent = shipping === 0 ? 'Free' : '₹' + shipping;
        }
        
        window.placeOrder = async function() {
            const fullName = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const address = document.getElementById('address').value.trim();
            const city = document.getElementById('city').value.trim();
            const state = document.getElementById('state').value.trim();
            const pincode = document.getElementById('pincode').value.trim();
            
            if (!fullName || !phone || !address || !city || !state || !pincode) {
                alert('Please fill all required fields');
                return;
            }
            
            if (phone.length !== 10 || !/^\d+$/.test(phone)) {
                alert('Please enter a valid 10-digit phone number');
                return;
            }
            
            if (pincode.length !== 6 || !/^\d+$/.test(pincode)) {
                alert('Please enter a valid 6-digit pincode');
                return;
            }
            
            if (cart.length === 0) {
                alert('Your cart is empty');
                return;
            }
            
            const btn = document.getElementById('placeOrderBtn');
            btn.disabled = true;
            btn.textContent = 'Processing...';
            
            const subtotal = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            const tax = Math.round(subtotal * 0.18);
            const shipping = subtotal >= 50000 ? 0 : 100;
            const total = subtotal + tax + shipping;
            const fullAddress = `${address}, ${city}, ${state} - ${pincode}`;
            
            const order = {
                orderId: 'ORD' + Date.now(),
                name: fullName,
                phone: phone,
                email: email || '',
                address: fullAddress,
                items: cart.map(i => ({ id: i.id, sku: i.sku, name: i.name, price: i.price, quantity: i.quantity })),
                subtotal: subtotal,
                tax: tax,
                shipping: shipping,
                total: total,
                status: 'Pending',
                date: new Date().toISOString()
            };
            
            try {
                const { data, error } = await supabase.from('orders').insert([{
                    order_id: order.orderId,
                    customer_name: order.name,
                    phone: order.phone,
                    email: order.email,
                    address: order.address,
                    items: order.items,
                    subtotal: order.subtotal,
                    tax: order.tax,
                    shipping: order.shipping,
                    total: order.total,
                    status: order.status,
                    date: order.date
                }]).select();
                
                if (error) throw error;
                
                // Clear cart
                await supabase.from('carts').upsert({ session_id: sessionId, items: [], total: 0 });
                
                alert(`✅ Order placed successfully!\nOrder ID: ${order.orderId}`);
                window.location.href = `track.html?order=${order.orderId}`;
            } catch (error) {
                console.error('Order failed:', error);
                alert('❌ Failed to place order. Please try again.');
                btn.disabled = false;
                btn.textContent = 'Place Order';
            }
        };
        
        loadCart();
    </script>
    
    <!-- Analytics Tracking -->
    <script src="js/analytics.js"></script>
</body>
</html>
