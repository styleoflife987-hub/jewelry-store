<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="customer">
    <header class="customer-header">
        <div class="customer-logo">STYLE OF LIFE</div>
        <nav class="customer-nav">
            <a href="index.html">Home</a>
            <a href="cart.html">Cart <span class="cart-count" id="cartCount">0</span></a>
        </nav>
    </header>

    <div class="checkout-grid">
        <div class="checkout-form">
            <h2 style="color: var(--primary); margin-bottom: 20px;">Shipping Information</h2>
            <div class="form-group"><label>Full Name *</label><input type="text" id="name" required></div>
            <div class="form-group"><label>Phone Number *</label><input type="tel" id="phone" maxlength="10" required></div>
            <div class="form-group"><label>Email Address</label><input type="email" id="email"></div>
            <div class="form-group"><label>Street Address *</label><input type="text" id="address" required></div>
            <div class="form-group"><label>City *</label><input type="text" id="city" required></div>
            <div class="form-group"><label>Pincode *</label><input type="text" id="pincode" maxlength="6" required></div>
        </div>
        
        <div class="order-summary">
            <h2 style="color: var(--primary); margin-bottom: 20px;">Your Order</h2>
            <div id="cartSummary"></div>
            <div style="margin-top: 20px;">
                <div class="summary-row"><span>Subtotal:</span><span>₹<span id="orderSubtotal">0</span></span></div>
                <div class="summary-row"><span>Shipping:</span><span>₹100</span></div>
                <div class="summary-row"><span>GST (18%):</span><span>₹<span id="orderTax">0</span></span></div>
                <div class="summary-row total"><span>Total:</span><span>₹<span id="orderTotal">0</span></span></div>
            </div>
            <button onclick="processOrder()" class="checkout-btn">Place Order</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        let cart = [];
        
        document.addEventListener('DOMContentLoaded', async () => {
            const data = await getCart();
            cart = data.items || [];
            updateCheckoutSummary();
        });
        
        async function processOrder() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            const city = document.getElementById('city').value.trim();
            const pincode = document.getElementById('pincode').value.trim();
            if (!name || !phone || !address || !city || !pincode) return alert('Please fill all required fields');
            
            if (cart.length === 0) return alert('Your cart is empty');
            
            const subtotal = cart.reduce((s, i) => s + (i.price * (i.quantity || 1)), 0);
            const tax = Math.round(subtotal * 0.18);
            const total = subtotal + tax + 100;
            
            const order = {
                name, phone, email: document.getElementById('email').value.trim(),
                address: `${address}, ${city} - ${pincode}`,
                items: cart, total
            };
            
            const result = await placeOrder(order);
            if (result.success) {
                await saveCart([], 0);
                alert(`✅ Order placed! ID: ${result.orderId}`);
                window.location.href = `track.html?order=${result.orderId}`;
            } else {
                alert('❌ Failed: ' + (result.error || 'Unknown error'));
            }
        }
        
        function updateCheckoutSummary() {
            const subtotal = cart.reduce((s, i) => s + (i.price * (i.quantity || 1)), 0);
            const tax = Math.round(subtotal * 0.18);
            const total = subtotal + tax + 100;
            
            let itemsHtml = '';
            cart.forEach(i => itemsHtml += `<div style="display:flex;justify-content:space-between;margin:5px 0;"><span>${i.name} x${i.quantity}</span><span>₹${(i.price * i.quantity).toLocaleString()}</span></div>`);
            document.getElementById('cartSummary').innerHTML = itemsHtml || '<p>Your cart is empty</p>';
            document.getElementById('orderSubtotal').textContent = subtotal.toLocaleString();
            document.getElementById('orderTax').textContent = tax.toLocaleString();
            document.getElementById('orderTotal').textContent = total.toLocaleString();
        }
    </script>
</body>
</html>
