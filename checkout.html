<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
</head>
<body>
    <header>
        <div class="logo">STYLE OF LIFE</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="cart.html">Cart</a>
        </nav>
    </header>

    <div class="checkout-form">
        <h2 style="color:#d4af37; margin-bottom:30px">Checkout</h2>
        
        <div id="cartSummary" style="margin-bottom:30px"></div>
        
        <div class="admin-input">
            <label>Full Name *</label>
            <input type="text" id="name" placeholder="Enter your full name" required>
        </div>
        
        <div class="admin-input">
            <label>Phone Number *</label>
            <input type="tel" id="phone" placeholder="10 digit mobile number" required>
        </div>
        
        <div class="admin-input">
            <label>Email (optional)</label>
            <input type="email" id="email" placeholder="your@email.com">
        </div>
        
        <div class="admin-input">
            <label>Shipping Address *</label>
            <textarea id="address" rows="4" placeholder="Complete address with pincode" required></textarea>
        </div>
        
        <div style="margin-top:30px">
            <h3 style="color:#d4af37">Order Summary</h3>
            <div id="orderItems" style="margin:20px 0"></div>
            <h3>Total: ₹<span id="orderTotal">0</span></h3>
        </div>
        
        <button onclick="processCheckout()" style="margin-top:30px; padding:15px">
            Pay Now
        </button>
    </div>

    <footer>
        © 2026 Style Of Life Jewelry. All rights reserved.
    </footer>

    <script src="js/cart.js"></script>
    <script src="js/payment.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    
    <script>
        // Display cart summary on checkout page
        document.addEventListener('DOMContentLoaded', function() {
            const cart = getCart();
            const cartSummary = document.getElementById('cartSummary');
            const orderItems = document.getElementById('orderItems');
            const orderTotal = document.getElementById('orderTotal');
            
            if (cart.length === 0) {
                cartSummary.innerHTML = '<p style="color:#f44336">Your cart is empty. <a href="index.html">Continue shopping</a></p>';
                return;
            }
            
            let itemsHtml = '';
            let total = 0;
            
            cart.forEach(item => {
                itemsHtml += `
                    <div style="display:flex; justify-content:space-between; margin:10px 0">
                        <span>${item.name} x${item.quantity || 1}</span>
                        <span>₹${item.price * (item.quantity || 1)}</span>
                    </div>
                `;
                total += item.price * (item.quantity || 1);
            });
            
            orderItems.innerHTML = itemsHtml;
            orderTotal.textContent = total;
        });
    </script>
</body>
</html>
