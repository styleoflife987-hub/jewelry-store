<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Style Of Life</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">✨ STYLE OF LIFE</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="cart.html">Cart <span class="cart-count" id="cartCount">0</span></a>
        </nav>
    </header>

    <div class="container">
        <h1 class="page-title">Checkout</h1>
        
        <div class="checkout-grid">
            <div class="checkout-form">
                <h3>Shipping Information</h3>
                
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" maxlength="10" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email">
                </div>
                
                <div class="form-group">
                    <label for="address">Street Address *</label>
                    <input type="text" id="address" required>
                </div>
                
                <div class="form-group">
                    <label for="city">City *</label>
                    <input type="text" id="city" required>
                </div>
                
                <div class="form-group">
                    <label for="pincode">Pincode *</label>
                    <input type="text" id="pincode" maxlength="6" required>
                </div>
            </div>
            
            <div class="order-summary">
                <h3>Your Order</h3>
                <div id="cartSummary" class="summary-items"></div>
                
                <div class="summary-totals">
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span>₹<span id="orderSubtotal">0</span></span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping:</span>
                        <span>₹100</span>
                    </div>
                    <div class="summary-row">
                        <span>GST (18%):</span>
                        <span>₹<span id="orderTax">0</span></span>
                    </div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span>₹<span id="orderTotal">0</span></span>
                    </div>
                </div>
                
                <button onclick="processOrder()" class="place-order-btn" id="placeOrderBtn">
                    Place Order
                </button>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Style Of Life Jewelry</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/cart.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', updateCheckoutSummary);

        function processOrder() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            const city = document.getElementById('city').value.trim();
            const pincode = document.getElementById('pincode').value.trim();
            
            if (!name || !phone || !address || !city || !pincode) {
                alert('Please fill all required fields');
                return;
            }
            
            const cart = getCart();
            if (cart.length === 0) {
                alert('Your cart is empty');
                return;
            }
            
            const subtotal = getCartTotal();
            const tax = Math.round(subtotal * 0.18);
            const shipping = 100;
            const total = subtotal + tax + shipping;
            const fullAddress = `${address}, ${city} - ${pincode}`;
            
            const orderId = 'ORD' + Date.now();
            const order = {
                orderId: orderId,
                name: name,
                phone: phone,
                address: fullAddress,
                items: cart,
                subtotal: subtotal,
                tax: tax,
                shipping: shipping,
                total: total,
                status: 'Pending',
                date: new Date().toISOString()
            };
            
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            orders.push(order);
            localStorage.setItem('orders', JSON.stringify(orders));
            
            localStorage.removeItem('cart');
            updateCartCount();
            
            alert(`Order placed! ID: ${orderId}`);
            window.location.href = `track.html?order=${orderId}`;
        }

        function updateCheckoutSummary() {
            const cart = getCart();
            const subtotal = getCartTotal();
            const tax = Math.round(subtotal * 0.18);
            const total = subtotal + tax + 100;
            
            let itemsHtml = '';
            cart.forEach(item => {
                itemsHtml += `
                    <div style="display: flex; justify-content: space-between; margin: 5px 0;">
                        <span>${item.name} x${item.quantity}</span>
                        <span>₹${(item.price * item.quantity).toLocaleString()}</span>
                    </div>
                `;
            });
            
            document.getElementById('cartSummary').innerHTML = itemsHtml;
            document.getElementById('orderSubtotal').textContent = subtotal.toLocaleString();
            document.getElementById('orderTax').textContent = tax.toLocaleString();
            document.getElementById('orderTotal').textContent = total.toLocaleString();
        }
    </script>
</body>
</html>
